<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Finanza Pro - App</title>
<script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-database.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
:root{--bg:#070b18;--bg2:#0d1225;--s1:rgba(255,255,255,.04);--b1:rgba(255,255,255,.08);--ac:#6c63ff;--ac2:#00d4ff;--gr:#00e5a0;--re:#ff4f6d;--tx:#f0f4ff;--tx2:#8892b0}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:system-ui,-apple-system,sans-serif;overflow:hidden}
.hidden{display:none!important}
#app{display:flex;height:100vh}
.sidebar{width:240px;background:var(--bg2);border-right:1px solid var(--b1);padding:16px;display:flex;flex-direction:column;overflow-y:auto}
.sb-title{font-size:14px;font-weight:800;margin-bottom:20px}
.nav{flex:1}
.ni{padding:10px;border-radius:8px;color:var(--tx2);cursor:pointer;font-size:12px;margin-bottom:4px;transition:all .2s}
.ni:hover{background:rgba(255,255,255,.07);color:var(--tx)}
.ni.active{background:linear-gradient(135deg,rgba(108,99,255,.15),rgba(0,212,255,.08));color:var(--tx)}
.main{flex:1;display:flex;flex-direction:column}
.topbar{background:rgba(13,18,37,.95);border-bottom:1px solid var(--b1);padding:0 16px;height:50px;display:flex;align-items:center;justify-content:space-between}
.topbar h1{font-size:16px;font-weight:800}
.btn-add{padding:8px 14px;background:linear-gradient(135deg,var(--ac),var(--ac2));border:none;border-radius:8px;color:#fff;font-size:11px;font-weight:700;cursor:pointer}
.content{flex:1;overflow-y:auto;padding:16px}
.card{background:var(--s1);border:1px solid var(--b1);border-radius:12px;padding:12px;margin-bottom:12px}
.card-title{font-size:12px;font-weight:700;margin-bottom:10px}
.ir{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--b1);font-size:11px}
.ir:last-child{border-bottom:none}
.ir-ico{width:28px;height:28px;border-radius:8px;background:var(--s1);display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
.ir-info{flex:1}
.ir-name{font-weight:600}
.ir-cat{font-size:9px;color:#4a5580;margin-top:1px}
.ir-amt{font-weight:700;white-space:nowrap}
.ir-del{width:22px;height:22px;border-radius:6px;background:rgba(255,79,109,.1);border:none;color:var(--re);cursor:pointer;font-size:9px}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:flex-end;justify-content:center;z-index:500}
.modal.active{display:flex}
.modal-sheet{background:var(--bg2);border-radius:16px 16px 0 0;padding:16px;width:100%;max-height:80vh;overflow-y:auto}
.modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.modal-title{font-size:14px;font-weight:800}
.modal-close{width:26px;height:26px;border-radius:6px;background:var(--s1);border:none;color:var(--tx2);cursor:pointer}
.form-group{margin-bottom:10px}
.form-label{display:block;font-size:9px;color:var(--tx2);font-weight:700;text-transform:uppercase;margin-bottom:4px}
.form-input,.form-select{width:100%;padding:8px;background:var(--s1);border:1px solid var(--b1);border-radius:8px;color:var(--tx);font-size:11px;font-family:inherit}
.form-actions{display:flex;gap:8px;margin-top:12px}
.btn-save{flex:1;padding:10px;background:linear-gradient(135deg,var(--ac),var(--ac2));border:none;border-radius:8px;color:#fff;font-weight:700;cursor:pointer;font-size:12px;font-family:inherit}
.btn-cancel{flex:1;padding:10px;background:var(--s1);border:1px solid var(--b1);border-radius:8px;color:var(--tx2);cursor:pointer;font-family:inherit}
.stat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px}
.stat{background:var(--s1);border:1px solid var(--b1);border-radius:10px;padding:10px;text-align:center;font-size:10px}
.stat-val{font-size:16px;font-weight:800}
.prev-table{overflow-x:auto;margin:10px 0}
.prev-table table{width:100%;border-collapse:collapse;font-size:10px}
.prev-table th{background:rgba(108,99,255,.1);padding:8px;text-align:left;font-weight:700;border-bottom:1px solid var(--b1)}
.prev-table td{padding:6px;border-bottom:1px solid var(--b1)}
.prev-table input{width:100%;padding:4px;background:var(--s1);border:1px solid var(--b1);border-radius:4px;color:var(--tx);font-size:10px;font-family:inherit}
.logo-preview{width:100px;height:100px;border:2px dashed var(--b1);border-radius:10px;display:flex;align-items:center;justify-content:center;overflow:hidden;background:var(--s1);margin-top:8px}
.logo-preview img{width:100%;height:100%;object-fit:contain}
.notif{position:fixed;bottom:16px;right:16px;background:rgba(13,18,37,.95);border:1px solid var(--b1);border-radius:8px;padding:10px 14px;font-size:10px;font-weight:600;z-index:999;display:none}
@media(max-width:640px){.sidebar{display:none}.stat-grid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>

<div id="app">
  <div class="sidebar">
    <div class="sb-title">💰 Finanza Pro</div>
    <nav class="nav" id="nav"></nav>
  </div>

  <div class="main">
    <div class="topbar">
      <h1 id="title">Dashboard</h1>
      <button class="btn-add" onclick="openModal()">➕ Aggiungi</button>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<!-- TRANSAZIONE MODAL -->
<div class="modal" id="modal-tx">
  <div class="modal-sheet">
    <div class="modal-head"><div class="modal-title">💸 Transazione</div><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="form-group"><label class="form-label">Descrizione</label><input type="text" id="tx-desc" class="form-input"></div>
    <div class="form-group"><label class="form-label">Importo</label><input type="number" id="tx-amt" class="form-input" step="0.01"></div>
    <div class="form-group"><label class="form-label">Tipo</label><select id="tx-type" class="form-select"><option value="income">Entrata</option><option value="expense">Uscita</option></select></div>
    <div class="form-group"><label class="form-label">Categoria</label><select id="tx-cat" class="form-select"></select></div>
    <div class="form-actions"><button class="btn-save" onclick="saveTx()">Salva</button><button class="btn-cancel" onclick="closeModal()">Annulla</button></div>
  </div>
</div>

<!-- PREVENTIVO MODAL -->
<div class="modal" id="modal-prev">
  <div class="modal-sheet">
    <div class="modal-head"><div class="modal-title">📄 Preventivo</div><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="form-group"><label class="form-label">Cliente</label><input type="text" id="prev-client" class="form-input"></div>
    <div class="form-group"><label class="form-label">Email</label><input type="email" id="prev-email" class="form-input"></div>
    <div class="prev-table"><table><thead><tr><th>Desc</th><th>Qtà</th><th>Prezzo</th><th>Tot</th><th></th></tr></thead><tbody id="prev-items"><tr><td><input type="text" placeholder="Desc"></td><td><input type="number" value="1" step="0.01"></td><td><input type="number" placeholder="0.00" step="0.01"></td><td style="font-weight:700">€0.00</td><td><button class="ir-del" onclick="delRow(this)">🗑️</button></td></tr></tbody></table></div>
    <button class="btn-add" onclick="addRow()" style="width:100%;margin-bottom:10px;padding:8px">➕ Riga</button>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px"><div class="form-group"><label class="form-label">IVA?</label><select id="prev-iva" class="form-select" onchange="calcTotals()"><option value="no">No</option><option value="yes">Sì</option></select></div><div class="form-group"><label class="form-label">%</label><input type="number" id="prev-iva-rate" class="form-input" value="22" step="0.1" onchange="calcTotals()"></div></div>
    <div style="background:var(--s1);border:1px solid var(--b1);border-radius:10px;padding:10px;margin:10px 0;display:grid;grid-template-columns:1fr 1fr;gap:10px;font-size:10px"><div><div style="color:var(--tx2)">Subtotale</div><div style="font-size:14px;font-weight:700" id="prev-sub">€0.00</div></div><div><div style="color:var(--tx2)">IVA</div><div style="font-size:14px;font-weight:700;color:#ffd166" id="prev-iva-amt">€0.00</div></div><div><div style="color:var(--tx2)">Totale</div><div style="font-size:16px;font-weight:900;color:var(--gr)" id="prev-tot">€0.00</div></div></div>
    <div class="form-actions"><button class="btn-save" onclick="savePrev()">Salva</button><button class="btn-cancel" onclick="closeModal()">Annulla</button></div>
    <button class="btn-add" onclick="genPDF()" style="width:100%;margin-top:8px;background:linear-gradient(135deg,#ff9f43,#ff7f50)">📥 PDF</button>
  </div>
</div>

<!-- PROFILO MODAL -->
<div class="modal" id="modal-prof">
  <div class="modal-sheet">
    <div class="modal-head"><div class="modal-title">👤 Profilo</div><button class="modal-close" onclick="closeModal()">✕</button></div>
    <div class="form-group"><label class="form-label">Nome Azienda</label><input type="text" id="prof-name" class="form-input"></div>
    <div class="form-group"><label class="form-label">P.IVA</label><input type="text" id="prof-piva" class="form-input"></div>
    <div class="form-group"><label class="form-label">Telefono</label><input type="tel" id="prof-phone" class="form-input"></div>
    <div class="form-group"><label class="form-label">Email</label><input type="email" id="prof-email" class="form-input"></div>
    <div class="form-group"><label class="form-label">Logo</label><input type="file" id="prof-logo" class="form-input" accept="image/*" onchange="prevLogo()"></div>
    <div class="logo-preview" id="logo-prev"><div style="color:#4a5580;font-size:9px">Preview</div></div>
    <div class="form-actions"><button class="btn-save" onclick="saveProf()">Salva</button><button class="btn-cancel" onclick="closeModal()">Annulla</button></div>
  </div>
</div>

<div class="notif" id="notif"></div>

<script>
const CATS=[
  {id:'food',name:'🍕 Cibo'},{id:'home',name:'🏠 Casa'},{id:'transport',name:'🚗 Trasporti'},
  {id:'health',name:'💊 Salute'},{id:'fun',name:'🎮 Svago'},{id:'shopping',name:'🛍️ Shopping'},
  {id:'work',name:'💼 Lavoro'},{id:'travel',name:'✈️ Viaggi'},{id:'other',name:'📦 Altro'}
];

const NAV=[
  {id:'dash',name:'📊 Dashboard'},{id:'tx',name:'💸 Transazioni'},
  {id:'report',name:'📈 Report'},{id:'prev',name:'📄 Preventivi'},
  {id:'prof',name:'👤 Profilo'}
];

const firebaseConfig={
  apiKey:"AIzaSyCMPawrAL5tT_bH6YEcNe_UEEyIwLIgHIQ",
  databaseURL:"https://financeapp-556ae-default-rtdb.europe-west1.firebasedatabase.app",
  projectId:"financeapp-556ae"
};

try{firebase.initializeApp(firebaseConfig)}catch(e){console.log('Firebase init:',e)}
const db=firebase.database();

let tx=[],prev=[],profile={},uid='u'+Math.random().toString(36).substr(2,9),page='dash';

window.addEventListener('load',()=>{
  buildNav();
  buildCat();
  loadProf();
  loadTx();
  goPage('dash');
});

function buildNav(){
  document.getElementById('nav').innerHTML=NAV.map(n=>`<div class="ni" onclick="goPage('${n.id}')">${n.name}</div>`).join('');
}

function buildCat(){
  document.getElementById('tx-cat').innerHTML=CATS.map(c=>`<option value="${c.id}">${c.name}</option>`).join('');
}

function loadProf(){
  db.ref('users/'+uid+'/profile').on('value',s=>profile=s.val()||{});
}

function loadTx(){
  db.ref('users/'+uid+'/tx').on('value',s=>tx=Object.values(s.val()||{}));
  db.ref('users/'+uid+'/prev').on('value',s=>prev=Object.values(s.val()||{}));
}

function goPage(p){
  page=p;
  document.querySelectorAll('.ni').forEach(e=>e.classList.remove('active'));
  event.target?.classList.add('active');
  const titles={dash:'Dashboard',tx:'Transazioni',report:'Report',prev:'Preventivi',prof:'Profilo'};
  document.getElementById('title').textContent=titles[p];
  render(p);
}

function openModal(){
  if(page==='tx')document.getElementById('modal-tx').classList.add('active');
  else if(page==='prev')document.getElementById('modal-prev').classList.add('active');
  else if(page==='prof')document.getElementById('modal-prof').classList.add('active');
}

function closeModal(){
  document.querySelectorAll('.modal').forEach(m=>m.classList.remove('active'));
}

function notify(m){const n=document.getElementById('notif');n.textContent=m;n.style.display='block';clearTimeout(n._t);n._t=setTimeout(()=>n.style.display='none',2500)}
function fmt(v){return'€'+parseFloat(v||0).toFixed(2)}

function saveTx(){
  const desc=document.getElementById('tx-desc').value.trim();
  const amt=parseFloat(document.getElementById('tx-amt').value);
  const type=document.getElementById('tx-type').value;
  const cat=document.getElementById('tx-cat').value;
  if(!desc||!amt||amt<=0){notify('❌ Compila');return}
  db.ref('users/'+uid+'/tx/'+Date.now()).set({desc,amount:amt,type,cat,date:new Date().toISOString().split('T')[0]});
  closeModal();
  document.getElementById('tx-desc').value='';
  document.getElementById('tx-amt').value='';
  notify('✅ Aggiunta!');
}

function delTx(id){db.ref('users/'+uid+'/tx/'+id).remove();notify('🗑️ Eliminata')}

function addRow(){
  const tr=document.createElement('tr');
  tr.innerHTML=`<td><input type="text" placeholder="Desc"></td><td><input type="number" value="1" step="0.01" min="0.01"></td><td><input type="number" placeholder="0.00" step="0.01" min="0"></td><td style="font-weight:700">€0.00</td><td><button class="ir-del" onclick="delRow(this)">🗑️</button></td>`;
  document.getElementById('prev-items').appendChild(tr);
}

function delRow(btn){btn.closest('tr').remove();calcTotals()}

function calcTotals(){
  const rows=document.querySelectorAll('#prev-items tr');
  let sub=0;
  rows.forEach(row=>{
    const qty=parseFloat(row.cells[1].querySelector('input').value)||0;
    const price=parseFloat(row.cells[2].querySelector('input').value)||0;
    const tot=qty*price;
    row.cells[3].textContent=fmt(tot);
    sub+=tot;
  });
  const iva=document.getElementById('prev-iva').value==='yes'?parseFloat(document.getElementById('prev-iva-rate').value)||0:0;
  const ivaAmt=sub*(iva/100);
  const total=sub+ivaAmt;
  document.getElementById('prev-sub').textContent=fmt(sub);
  document.getElementById('prev-iva-amt').textContent=fmt(ivaAmt);
  document.getElementById('prev-tot').textContent=fmt(total);
}

function savePrev(){
  const client=document.getElementById('prev-client').value.trim();
  const items=[];
  document.querySelectorAll('#prev-items tr').forEach(row=>{
    items.push({
      desc:row.cells[0].querySelector('input').value,
      qty:parseFloat(row.cells[1].querySelector('input').value)||0,
      price:parseFloat(row.cells[2].querySelector('input').value)||0
    });
  });
  if(!client||items.length===0){notify('❌ Compila');return}
  const iva=document.getElementById('prev-iva').value==='yes'?parseFloat(document.getElementById('prev-iva-rate').value)||0:0;
  const sub=items.reduce((s,i)=>s+(i.qty*i.price),0);
  const ivaAmt=sub*(iva/100);
  const tot=sub+ivaAmt;
  const num='PREV-'+new Date().getFullYear()+'-'+(prev.length+1).toString().padStart(3,'0');
  db.ref('users/'+uid+'/prev/'+Date.now()).set({num,client,email:document.getElementById('prev-email').value,items,sub,iva,ivaAmt,tot,date:new Date().toISOString().split('T')[0]});
  closeModal();
  notify('✅ Preventivo #'+num);
  goPage('prev');
}

function genPDF(){
  if(!profile.name||!profile.email||!profile.phone){notify('⚠️ Completa profilo');return}
  const items=Array.from(document.querySelectorAll('#prev-items tr')).map(row=>({
    desc:row.cells[0].querySelector('input').value,
    qty:row.cells[1].querySelector('input').value,
    price:row.cells[2].querySelector('input').value
  }));
  const html=`<div style="font-family:Arial;padding:40px;color:#333"><h1 style="color:#6c63ff">PREVENTIVO</h1><p><strong>${profile.name}</strong><br>P.IVA: ${profile.piva}<br>Tel: ${profile.phone}<br>Email: ${profile.email}</p><p><strong>Cliente: ${document.getElementById('prev-client').value}</strong></p><table style="width:100%;border-collapse:collapse"><tr style="background:#f0f4ff"><th style="border:1px solid #ccc;padding:8px;text-align:left">Descrizione</th><th style="border:1px solid #ccc;padding:8px">Qtà</th><th style="border:1px solid #ccc;padding:8px">Prezzo</th><th style="border:1px solid #ccc;padding:8px">Totale</th></tr>${items.map(i=>`<tr><td style="border:1px solid #ccc;padding:8px">${i.desc}</td><td style="border:1px solid #ccc;padding:8px">${i.qty}</td><td style="border:1px solid #ccc;padding:8px">€${parseFloat(i.price||0).toFixed(2)}</td><td style="border:1px solid #ccc;padding:8px">€${(parseFloat(i.qty||0)*parseFloat(i.price||0)).toFixed(2)}</td></tr>`).join('')}</table><p style="margin-top:20px"><strong>Totale: ${document.getElementById('prev-tot').textContent}</strong></p></div>`;
  const opt={margin:10,filename:'Preventivo.pdf',html2canvas:{scale:2},jsPDF:{orientation:'portrait',unit:'mm',format:'a4'}};
  html2pdf().set(opt).from(html).save();
  notify('📥 PDF generato!');
}

function prevLogo(){
  const f=document.getElementById('prof-logo').files[0];
  if(!f)return;
  const r=new FileReader();
  r.onload=e=>{
    document.getElementById('logo-prev').innerHTML=`<img src="${e.target.result}" style="width:100%;height:100%;object-fit:contain">`;
    localStorage.setItem('fp_logo',e.target.result);
  };
  r.readAsDataURL(f);
}

function saveProf(){
  profile={
    name:document.getElementById('prof-name').value,
    piva:document.getElementById('prof-piva').value,
    phone:document.getElementById('prof-phone').value,
    email:document.getElementById('prof-email').value,
    logo:localStorage.getItem('fp_logo')||''
  };
  db.ref('users/'+uid+'/profile').set(profile);
  notify('✅ Profilo salvato!');
  closeModal();
  goPage(page);
}

function render(p){
  const con=document.getElementById('content');
  const bal=tx.reduce((s,t)=>s+(t.type==='income'?t.amount:-t.amount),0);
  const inc=tx.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const exp=tx.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);

  if(p==='dash'){
    con.innerHTML=`<div class="stat-grid"><div class="stat"><div>Saldo</div><div class="stat-val" style="color:${bal>=0?'var(--gr)':'var(--re)'}">${fmt(bal)}</div></div><div class="stat"><div>Entrate</div><div class="stat-val" style="color:var(--gr)">${fmt(inc)}</div></div><div class="stat"><div>Uscite</div><div class="stat-val" style="color:var(--re)">${fmt(exp)}</div></div></div><div class="card"><div class="card-title">Ultimi Movimenti</div>${tx.length===0?'<div style="padding:20px;text-align:center;color:var(--tx2)">Nessuno</div>':tx.slice(-5).reverse().map(t=>`<div class="ir"><div class="ir-ico">${CATS.find(c=>c.id===t.cat)?.name?.split(' ')[0]||'📦'}</div><div class="ir-info"><div class="ir-name">${t.desc}</div><div class="ir-cat">${t.date}</div></div><div class="ir-amt" style="color:${t.type==='income'?'var(--gr)':'var(--re)'}">${t.type==='income'?'+':'-'}${fmt(t.amount)}</div><button class="ir-del" onclick="delTx(${t.id||Date.now()})">🗑️</button></div>`).join('')}</div>`;
  }
  else if(p==='tx'){
    con.innerHTML=`<div class="card"><div class="card-title">Transazioni (${tx.length})</div>${tx.length===0?'<div style="padding:20px;text-align:center;color:var(--tx2)">Nessuna</div>':tx.map(t=>`<div class="ir"><div class="ir-ico">${CATS.find(c=>c.id===t.cat)?.name?.split(' ')[0]||'📦'}</div><div class="ir-info"><div class="ir-name">${t.desc}</div><div class="ir-cat">${t.date} • ${CATS.find(c=>c.id===t.cat)?.name}</div></div><div class="ir-amt" style="color:${t.type==='income'?'var(--gr)':'var(--re)'}">${t.type==='income'?'+':'-'}${fmt(t.amount)}</div><button class="ir-del" onclick="delTx(${t.id||Date.now()})">🗑️</button></div>`).join('')}</div>`;
  }
  else if(p==='prev'){
    con.innerHTML=`<div class="card"><div class="card-title">Preventivi (${prev.length})</div>${prev.length===0?'<div style="padding:20px;text-align:center;color:var(--tx2)">Nessuno</div>':prev.map(pv=>`<div class="ir"><div class="ir-ico">📄</div><div class="ir-info"><div class="ir-name">${pv.num} - ${pv.client}</div><div class="ir-cat">${pv.date}</div></div><div class="ir-amt" style="color:var(--gr)">${fmt(pv.tot)}</div></div>`).join('')}</div>`;
  }
  else if(p==='report'){
    const byCat={};
    tx.filter(t=>t.type==='expense').forEach(t=>{const c=t.cat||'other';byCat[c]=(byCat[c]||0)+t.amount});
    const sorted=Object.entries(byCat).sort((a,b)=>b[1]-a[1]);
    const max=sorted[0]?sorted[0][1]:1;
    con.innerHTML=`<div class="card"><div class="card-title">Spese</div>${sorted.map(([cid,val])=>{const cat=CATS.find(c=>c.id===cid);const pct=Math.round(val/max*100);return`<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;font-size:10px;margin-bottom:3px"><span>${cat?.name}</span><strong>${fmt(val)}</strong></div><div style="height:4px;background:var(--s1);border-radius:2px;overflow:hidden"><div style="height:100%;width:${pct}%;background:linear-gradient(90deg,var(--ac),var(--ac2))"></div></div></div>`}).join('')}</div>`;
  }
  else if(p==='prof'){
    con.innerHTML=`<div class="card"><div class="card-title">Profilo Azienda</div><div style="font-size:11px;line-height:1.8"><div><strong>Nome:</strong> ${profile.name||'—'}</div><div><strong>P.IVA:</strong> ${profile.piva||'—'}</div><div><strong>Telefono:</strong> ${profile.phone||'—'}</div><div><strong>Email:</strong> ${profile.email||'—'}</div></div><button class="btn-add" onclick="openModal()" style="width:100%;margin-top:12px;padding:10px">✏️ Modifica</button></div>`;
  }
  calcTotals();
}
</script>

</body>
</html>
