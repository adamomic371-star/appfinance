<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kazka — Repo Cleaner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#050912;--bg2:#090f1e;--bg3:#0d1528;--b1:rgba(255,255,255,.07);--b2:rgba(255,255,255,.13);--ac:#7B68EE;--ac2:#00E5FF;--gr:#00F0A0;--re:#FF3355;--ye:#FFD166;--or:#FF8C42;--tx:#EEF2FF;--tx2:#7A85A8;--grad:linear-gradient(135deg,#7B68EE,#00E5FF);--r:14px}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;padding:2rem 1rem}
h1{font-family:'Syne',sans-serif;font-size:1.8rem;font-weight:800;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:.25rem}
h2{font-size:1.05rem;font-weight:600;color:var(--tx2);margin-bottom:1.5rem}
.card{background:var(--bg2);border:1px solid var(--b1);border-radius:var(--r);padding:1.25rem;margin-bottom:1rem}
.file-list{list-style:none}
.file-item{display:flex;align-items:center;gap:.75rem;padding:.6rem .75rem;border-bottom:1px solid var(--b1);font-size:.875rem}
.file-item:last-child{border-bottom:none}
.file-item .cb{width:18px;height:18px;accent-color:var(--ac);cursor:pointer}
.file-path{flex:1;font-family:monospace;font-size:.8rem;color:var(--tx);word-break:break-all}
.file-desc{flex:0 0 200px;font-size:.78rem;color:var(--tx2);text-align:right}
.badge{display:inline-block;padding:.15rem .5rem;border-radius:99px;font-size:.68rem;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.badge-essential{background:rgba(0,240,160,.15);color:var(--gr)}
.badge-superfluous{background:rgba(255,51,85,.15);color:var(--re)}
.badge-optional{background:rgba(255,209,102,.15);color:var(--ye)}
.btn{padding:.6rem 1.25rem;border-radius:var(--r);font-weight:600;font-size:.85rem;cursor:pointer;border:none;transition:opacity .2s;display:inline-flex;align-items:center;gap:.5rem}
.btn:hover{opacity:.85}
.btn-primary{background:var(--grad);color:#fff}
.btn-danger{background:var(--re);color:#fff}
.btn-outline{background:transparent;border:1px solid var(--b2);color:var(--tx2)}
.toolbar{display:flex;gap:.625rem;flex-wrap:wrap;margin:1rem 0}
.summary{display:flex;gap:1rem;flex-wrap:wrap;margin-bottom:1rem}
.stat{padding:1rem;background:var(--bg3);border-radius:var(--r);text-align:center;flex:1;min-width:100px}
.stat-value{font-size:1.5rem;font-weight:700;font-family:'Syne',sans-serif}
.stat-label{font-size:.72rem;color:var(--tx2);margin-top:.2rem}
#output{background:var(--bg3);border:1px solid var(--b1);border-radius:var(--r);padding:1.15rem;font-family:monospace;font-size:.78rem;white-space:pre-wrap;color:var(--tx2);max-height:400px;overflow:auto;margin-top:.5rem}
.tabs{display:flex;gap:.25rem;margin-bottom:.75rem;flex-wrap:wrap}
.tab{padding:.45rem 1rem;border-radius:99px;font-size:.78rem;font-weight:600;cursor:pointer;background:var(--bg3);color:var(--tx2);border:1px solid transparent;transition:all .15s}
.tab:hover{border-color:var(--b2)}
.tab.active{background:rgba(123,104,238,.15);color:var(--ac);border-color:var(--ac)}
.toast{position:fixed;bottom:2rem;right:2rem;background:var(--bg2);border:1px solid var(--b2);border-radius:var(--r);padding:1rem 1.5rem;font-size:.85rem;box-shadow:0 4px 24px rgba(0,0,0,.4);z-index:999;transform:translateY(120%);transition:transform .3s ease}
.toast.show{transform:translateY(0)}
.toast.ok{border-color:var(--gr)}
.toast.err{border-color:var(--re)}
.hidden{display:none!important}
@media(max-width:640px){
  .file-desc{flex:0 0 100px;font-size:.7rem}
  body{padding:1rem}
  .toolbar .btn{flex:1;justify-content:center}
}
</style>
</head>
<body>

<h1>KAZKA Repo Cleaner</h1>
<h2>Analisi e pulizia dei file superflui nel repository</h2>

<div class="summary" id="summary"></div>

<div class="tabs" id="tabs">
  <div class="tab active" data-filter="all" onclick="setFilter('all')">Tutti</div>
  <div class="tab" data-filter="essential" onclick="setFilter('essential')">Essenziali</div>
  <div class="tab" data-filter="superfluous" onclick="setFilter('superfluous')">Superflui</div>
  <div class="tab" data-filter="optional" onclick="setFilter('optional')">Opzionali</div>
</div>

<div class="toolbar">
  <button class="btn btn-primary" onclick="generateScript()">Genera script pulizia</button>
  <button class="btn btn-outline" onclick="selectSuperfluous()">Seleziona superflui</button>
  <button class="btn btn-outline" onclick="deselectAll()">Deseleziona tutto</button>
  <button class="btn btn-outline" onclick="toggleGitHub()" id="gh-btn">Mostra script GitHub</button>
</div>

<div class="card">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem">
    <strong style="font-size:.9rem">File del repository</strong>
    <span id="counter" style="font-size:.8rem;color:var(--tx2)"></span>
  </div>
  <ul class="file-list" id="file-list"></ul>
</div>

<div class="card">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem">
    <strong style="font-size:.9rem">Script di pulizia</strong>
    <div style="display:flex;gap:.5rem">
      <button class="btn btn-outline" onclick="copyOutput()" style="padding:.35rem .75rem;font-size:.72rem">Copia</button>
      <button class="btn btn-outline" onclick="downloadScript('ps1')" style="padding:.35rem .75rem;font-size:.72rem">Scarica .ps1</button>
      <button class="btn btn-outline" onclick="downloadScript('sh')" style="padding:.35rem .75rem;font-size:.72rem">Scarica .sh</button>
    </div>
  </div>
  <pre id="output">Nessun file selezionato.</pre>
</div>

<div id="toast" class="toast"></div>

<script>
// FILE LIST — aggiornato allo stato attuale del repo
const FILES = [
  // === ESSENZIALI ===
  { path: 'index.html', cat: 'root', desc: 'Landing page SEO', status: 'essential' },
  { path: '404.html', cat: 'root', desc: 'Pagina errore 404', status: 'essential' },
  { path: 'manifest.json', cat: 'root', desc: 'PWA manifest', status: 'essential' },
  { path: 'sw.js', cat: 'root', desc: 'Service Worker', status: 'essential' },
  { path: 'database.rules.json', cat: 'root', desc: 'Regole Firebase DB', status: 'essential' },
  { path: 'privacy.html', cat: 'root', desc: 'Privacy Policy', status: 'essential' },
  { path: 'termini.html', cat: 'root', desc: 'Termini e condizioni', status: 'essential' },
  { path: 'package.json', cat: 'root', desc: 'Dipendenze Node (dev)', status: 'essential' },
  { path: 'tsconfig.json', cat: 'root', desc: 'Config TypeScript', status: 'essential' },
  { path: '.gitignore', cat: 'root', desc: 'Git ignore rules', status: 'essential' },
  { path: '.github/workflows/static.yml', cat: 'root', desc: 'CI/CD GitHub Actions', status: 'essential' },
  { path: 'app/index.html', cat: 'app', desc: 'App principale (produzione)', status: 'essential' },
  { path: 'admin/index.html', cat: 'admin', desc: 'Pannello admin', status: 'essential' },
  { path: 'assets/icon-192.png', cat: 'assets', desc: 'Icona PWA 192px', status: 'essential' },
  { path: 'assets/icon-512.png', cat: 'assets', desc: 'Icona PWA 512px', status: 'essential' },
  { path: 'tests/app.spec.js', cat: 'test', desc: 'Test Playwright', status: 'essential' },
  { path: 'tests/playwright.config.js', cat: 'test', desc: 'Config Playwright', status: 'essential' },

  // === SUPERFLUI ===
  { path: 'admin.html', cat: 'root', desc: 'Redirect ridondante (usa admin/)', status: 'superfluous' },
  { path: 'capacitor.config.json', cat: 'root', desc: 'Config Capacitor — mai usato', status: 'superfluous' },
  { path: 'capacitor-setup.ps1', cat: 'root', desc: 'Setup Capacitor — mai usato', status: 'superfluous' },
  { path: 'cleaner/clean-repo.ps1', cat: 'root', desc: 'Sostituito da cleaner.html', status: 'superfluous' },
  { path: 'app/app.html', cat: 'app', desc: 'Sostituito da app/index.html', status: 'superfluous' },

  // === OPZIONALI ===
  { path: 'cleaner.html', cat: 'root', desc: 'Questo file — cleaner stesso', status: 'optional' },
  { path: 'github/', cat: 'github', desc: 'Copia deploy (ridondante vs CI/CD)', status: 'optional' },
];

const STATUS = { essential: 'Essenziale', superfluous: 'Superfluo', optional: 'Opzionale' };
const BADGES = { essential: 'badge-essential', superfluous: 'badge-superfluous', optional: 'badge-optional' };

let selected = {};
let filter = 'all';
let showGitHubScript = false;

function setFilter(f) {
  filter = f;
  document.querySelectorAll('#tabs .tab').forEach(t => t.classList.toggle('active', t.dataset.filter === f));
  render();
}

function render() {
  const list = document.getElementById('file-list');
  list.innerHTML = '';
  let counts = { essential: 0, superfluous: 0, optional: 0, total: FILES.length };
  FILES.forEach(f => {
    counts[f.status]++;
    if (filter !== 'all' && f.status !== filter) return;
    selected[f.path] = (selected[f.path] !== undefined) ? selected[f.path] : (f.status === 'superfluous');
    const li = document.createElement('li');
    li.className = 'file-item';
    li.innerHTML = `
      <input type="checkbox" class="cb" ${selected[f.path] ? 'checked' : ''} onchange="sel('${f.path}')">
      <span class="file-path">${f.path}</span>
      <span class="badge ${BADGES[f.status]}">${STATUS[f.status]}</span>
      <span class="file-desc">${f.desc}</span>
    `;
    list.appendChild(li);
  });
  document.getElementById('summary').innerHTML = `
    <div class="stat"><div class="stat-value" style="color:var(--gr)">${counts.essential}</div><div class="stat-label">Essenziali</div></div>
    <div class="stat"><div class="stat-value" style="color:var(--re)">${counts.superfluous}</div><div class="stat-label">Superflui</div></div>
    <div class="stat"><div class="stat-value" style="color:var(--ye)">${counts.optional}</div><div class="stat-label">Opzionali</div></div>
    <div class="stat"><div class="stat-value">${counts.total}</div><div class="stat-label">Totale</div></div>
  `;
  updateCounter();
}

function sel(p) { selected[p] = !selected[p]; updateCounter(); }

function updateCounter() {
  const n = Object.entries(selected).filter(([k,v])=>v && FILES.some(f=>f.path===k)).length;
  document.getElementById('counter').textContent = `${n} selezionati`;
}

function selectSuperfluous() {
  FILES.forEach(f => { if (f.status === 'superfluous') selected[f.path] = true; });
  render();
}

function deselectAll() {
  FILES.forEach(f => { selected[f.path] = false; });
  render();
}

function generateScript() {
  const toRemove = FILES.filter(f => selected[f.path]);
  const output = document.getElementById('output');
  if (!toRemove.length) { output.textContent = 'Nessun file selezionato.'; return; }
  const lines = ['# Kazka Cleaner Script', '$repo = Split-Path -Parent $MyInvocation.MyCommand.Path', 'Set-Location $repo', 'Write-Output "Pulizia KAZKA..."', ''];

  toRemove.forEach(f => {
    const path = f.path.replace(/\//g, '\\');
    if (f.path.endsWith('/')) {
      lines.push(`if (Test-Path '${path}') { Remove-Item -Recurse -Force '${path}'; Write-Output "  [DEL] ${f.path}" }`);
    } else {
      lines.push(`if (Test-Path '${path}') { Remove-Item -Force '${path}'; Write-Output "  [DEL] ${f.path}" }`);
    }
  });
  lines.push('', 'Write-Output "Pulizia completata."');
  output.textContent = lines.join('\n');
}

function toggleGitHub() {
  showGitHubScript = !showGitHubScript;
  document.getElementById('gh-btn').textContent = showGitHubScript ? 'Mostra script PowerShell' : 'Mostra script GitHub';
  generateScript();
  if (showGitHubScript) renderGitHubScript();
}

function renderGitHubScript() {
  const toRemove = FILES.filter(f => selected[f.path]);
  if (!toRemove.length) { document.getElementById('output').textContent = 'Nessun file selezionato.'; return; }
  const lines = [
    '#!/bin/bash',
    '# Kazka Cleaner — GitHub CLI script',
    '# Prerequisito: gh auth login',
    'REPO="adamomic371-star/appfinance"',
    'BRANCH="cleanup/remove-superfluous-files"',
    'BASE="main"',
    '',
    '# Crea branch pulito',
    'git checkout $BASE',
    'git pull origin $BASE',
    'git checkout -b $BRANCH',
    ''
  ];
  toRemove.forEach(f => {
    if (f.path.endsWith('/')) {
      lines.push(`rm -rf "${f.path}"`);
    } else {
      lines.push(`rm -f "${f.path}"`);
    }
  });
  lines.push(
    '',
    'git add -A',
    'git commit -m "chore: remove superfluous files"',
    'git push origin $BRANCH',
    '',
    '# Crea PR su GitHub',
    'gh pr create --repo $REPO --base $BASE --head $BRANCH --title "Pulizia: rimozione file superflui" --body "Rimossi file non necessari identificati da cleaner.html"',
    ''
  );
  document.getElementById('output').textContent = lines.join('\n');
}

function copyOutput() {
  const text = document.getElementById('output').textContent;
  navigator.clipboard.writeText(text).then(() => toast('Copiato!', 'ok')).catch(() => toast('Errore copia', 'err'));
}

function downloadScript(ext) {
  const text = document.getElementById('output').textContent;
  const blob = new Blob([text], { type: ext === 'ps1' ? 'text/plain' : 'text/x-shellscript' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `kazka-cleaner.${ext}`;
  a.click();
  URL.revokeObjectURL(a.href);
  toast(`Scaricato kazka-cleaner.${ext}`, 'ok');
}

function toast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast ' + type + ' show';
  setTimeout(() => t.classList.remove('show'), 2500);
}

render();
</script>
</body>
</html>
