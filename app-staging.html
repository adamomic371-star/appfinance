<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#070b18">
<title>Kazka – Smart Finance</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #070b18;
  --bg2: #0d1225;
  --ac: #6c63ff;
  --ac2: #00d4ff;
  --gr: #00e5a0;
  --re: #ff4f6d;
  --tx: #f0f4ff;
  --tx2: #8892b0;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  height: 100%;
  background: linear-gradient(135deg, var(--bg), #0a0e1a);
  color: var(--tx);
  font-family: 'Outfit', system-ui, sans-serif;
  overflow: hidden;
}

/* ANIMATIONS */
@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.6; transform: scale(1.1); }
}

@keyframes fadeOut {
  to { opacity: 0; visibility: hidden; }
}

@keyframes slideUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

/* SPLASH */
#splash {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, var(--bg), #0a0e1a);
  z-index: 9999;
  animation: pulse 1.5s ease-in-out infinite;
}

#splash.hide {
  animation: fadeOut 0.5s ease forwards;
}

.splash-logo {
  font-size: 120px;
  animation: pulse 1.5s ease-in-out infinite;
}

/* MAIN LAYOUT */
#app {
  display: flex;
  height: 100vh;
  flex-direction: column;
}

.topbar {
  background: rgba(13, 18, 37, 0.8);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid rgba(255, 244, 255, 0.08);
  padding: 12px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  height: 60px;
  z-index: 100;
}

.topbar-title {
  font-size: 18px;
  font-weight: 800;
  background: linear-gradient(135deg, #fff, var(--ac2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.sync-btn {
  padding: 8px 14px;
  background: linear-gradient(135deg, var(--ac), var(--ac2));
  border: none;
  border-radius: 8px;
  color: #fff;
  font-weight: 700;
  cursor: pointer;
  font-size: 11px;
  display: flex;
  align-items: center;
  gap: 6px;
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}

.sync-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 20px rgba(108, 99, 255, 0.4);
}

.sync-icon.spinning {
  animation: spin 1s linear infinite;
}

.main {
  display: flex;
  flex: 1;
  overflow: hidden;
}

.sidebar {
  width: 220px;
  background: rgba(13, 18, 37, 0.5);
  border-right: 1px solid rgba(255, 244, 255, 0.08);
  padding: 16px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.nav-item {
  padding: 12px 14px;
  background: none;
  border: none;
  color: var(--tx2);
  text-align: left;
  cursor: pointer;
  border-radius: 10px;
  font-size: 12px;
  font-weight: 600;
  transition: all 0.3s;
}

.nav-item:hover {
  background: rgba(108, 99, 255, 0.1);
  color: var(--tx);
  transform: translateX(4px);
}

.nav-item.active {
  background: linear-gradient(135deg, rgba(108, 99, 255, 0.2), rgba(0, 212, 255, 0.1));
  color: var(--tx);
  font-weight: 700;
  box-shadow: inset 0 0 20px rgba(108, 99, 255, 0.15);
}

.content {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  scroll-behavior: smooth;
}

.content::-webkit-scrollbar {
  width: 8px;
}

.content::-webkit-scrollbar-track {
  background: transparent;
}

.content::-webkit-scrollbar-thumb {
  background: rgba(108, 99, 255, 0.3);
  border-radius: 4px;
}

/* CARDS */
.card {
  background: linear-gradient(135deg, rgba(255, 244, 255, 0.04), rgba(108, 99, 255, 0.03));
  border: 1px solid rgba(255, 244, 255, 0.08);
  border-radius: 14px;
  padding: 16px;
  margin-bottom: 16px;
  transition: all 0.3s ease;
  animation: slideUp 0.4s ease;
  backdrop-filter: blur(4px);
}

.card:hover {
  border-color: rgba(108, 99, 255, 0.2);
  box-shadow: 0 10px 30px rgba(108, 99, 255, 0.1);
  transform: translateY(-2px);
}

.card h3 {
  font-size: 13px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--tx);
  margin-bottom: 12px;
}

/* STATS */
.stat-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
  gap: 12px;
  margin-bottom: 16px;
}

.stat {
  background: linear-gradient(135deg, rgba(108, 99, 255, 0.1), rgba(0, 212, 255, 0.05));
  border: 1px solid rgba(108, 99, 255, 0.2);
  border-radius: 12px;
  padding: 14px;
  text-align: center;
  transition: all 0.3s ease;
  animation: slideUp 0.4s ease;
}

.stat:hover {
  transform: translateY(-4px);
  border-color: rgba(0, 212, 255, 0.4);
  box-shadow: 0 10px 25px rgba(0, 212, 255, 0.15);
}

.stat-label {
  font-size: 9px;
  color: var(--tx2);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 6px;
}

.stat-value {
  font-size: 18px;
  font-weight: 800;
  color: var(--tx);
  font-family: 'Courier New', monospace;
}

/* BUTTONS */
.btn {
  padding: 10px 16px;
  background: linear-gradient(135deg, var(--ac), var(--ac2));
  border: none;
  border-radius: 10px;
  color: #fff;
  font-weight: 700;
  font-size: 11px;
  cursor: pointer;
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  font-family: inherit;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 25px rgba(108, 99, 255, 0.3);
}

.btn-small {
  padding: 6px 10px;
  font-size: 10px;
  background: rgba(255, 244, 255, 0.08);
  color: var(--tx);
  border: 1px solid rgba(255, 244, 255, 0.12);
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.3s;
}

.btn-small:hover {
  background: rgba(255, 244, 255, 0.12);
}

.btn-danger {
  background: linear-gradient(135deg, rgba(255, 79, 109, 0.3), rgba(255, 79, 109, 0.1));
  color: var(--re);
  border: 1px solid rgba(255, 79, 109, 0.2);
}

/* MODALS */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.7);
  display: none;
  align-items: flex-end;
  z-index: 500;
  animation: fadeUp 0.3s ease;
}

.modal.show {
  display: flex;
}

.modal-sheet {
  background: linear-gradient(135deg, var(--bg2), #111827);
  border: 1px solid rgba(255, 244, 255, 0.08);
  border-radius: 20px 20px 0 0;
  padding: 20px;
  width: 100%;
  max-height: 85vh;
  overflow-y: auto;
  animation: slideUp 0.3s ease;
}

/* FORMS */
.form-group {
  margin-bottom: 14px;
}

.form-label {
  font-size: 9px;
  color: var(--tx2);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 6px;
  display: block;
}

.form-input {
  width: 100%;
  padding: 10px 12px;
  background: rgba(255, 244, 255, 0.04);
  border: 1px solid rgba(255, 244, 255, 0.08);
  border-radius: 10px;
  color: var(--tx);
  font-size: 11px;
  font-family: inherit;
  transition: all 0.3s ease;
}

.form-input:focus {
  outline: none;
  border-color: var(--ac);
  background: rgba(108, 99, 255, 0.08);
  box-shadow: 0 0 15px rgba(108, 99, 255, 0.2);
}

/* PROGRESS BAR */
.progress-bar {
  width: 100%;
  height: 6px;
  background: rgba(255, 244, 255, 0.08);
  border-radius: 3px;
  overflow: hidden;
  margin: 8px 0;
}

.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--ac), var(--ac2));
  transition: width 0.4s ease;
  border-radius: 3px;
}

/* NOTIFICATIONS */
.notif {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: linear-gradient(135deg, rgba(0, 229, 160, 0.9), rgba(0, 212, 255, 0.8));
  border: 1px solid rgba(0, 229, 160, 0.3);
  border-radius: 12px;
  padding: 14px 18px;
  font-size: 11px;
  font-weight: 600;
  color: #fff;
  z-index: 1000;
  animation: slideUp 0.3s ease;
  box-shadow: 0 10px 30px rgba(0, 229, 160, 0.2);
}

.notif.error {
  background: linear-gradient(135deg, rgba(255, 79, 109, 0.9), rgba(255, 107, 107, 0.8));
  border-color: rgba(255, 79, 109, 0.3);
  box-shadow: 0 10px 30px rgba(255, 79, 109, 0.2);
}

/* RESPONSIVE */
@media (max-width: 768px) {
  .sidebar {
    width: 70px;
  }
  
  .nav-item {
    padding: 10px;
    font-size: 10px;
  }
  
  .stat-grid {
    grid-template-columns: 1fr;
  }
}
</style>
</head>
<body>

<!-- SPLASH SCREEN -->
<div id="splash">
  <div class="splash-logo">💰</div>
</div>

<!-- APP -->
<div id="app">
  <!-- TOPBAR -->
  <div class="topbar">
    <div class="topbar-title">💰 Kazka</div>
    <button class="sync-btn" id="syncBtn" onclick="triggerSync()">
      <span id="syncIcon">🔄</span>
      <span id="syncText">Sync</span>
    </button>
  </div>

  <!-- MAIN -->
  <div class="main">
    <!-- SIDEBAR -->
    <div class="sidebar">
      <button class="nav-item active" onclick="goPage('dashboard')">📊 Dashboard</button>
      <button class="nav-item" onclick="goPage('transazioni')">💸 Transazioni</button>
      <button class="nav-item" onclick="goPage('ricorrenti')">🔄 Ricorrenti</button>
      <button class="nav-item" onclick="goPage('obiettivi')">🎯 Obiettivi</button>
      <button class="nav-item" onclick="goPage('report')">📈 Report</button>
      <button class="nav-item" onclick="goPage('impostazioni')">⚙️ Impostazioni</button>
    </div>

    <!-- CONTENT -->
    <div class="content" id="content"></div>
  </div>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<script>
"use strict";

let db = null, user = null, currentPage = "dashboard", isSyncing = false;
let tx = [], recurring = [], goals = [];

const FB = {
  apiKey: "AIzaSyCMPawrAL5tT_bH6YEcNe_UEEyIwLIgHIQ",
  databaseURL: "https://financeapp-556ae-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "financeapp-556ae"
};

window.addEventListener("load", () => {
  hideSplash();
  initFirebase();
  loadLocalData();
  renderUI();
});

function hideSplash() {
  setTimeout(() => {
    const splash = document.getElementById("splash");
    if (splash) splash.classList.add("hide");
  }, 1500);
}

function initFirebase() {
  if (typeof firebase === "undefined") return;
  try {
    if (!firebase.apps.length) firebase.initializeApp(FB);
    db = firebase.database();
    firebase.auth().onAuthStateChanged(u => {
      if (!u) firebase.auth().signInAnonymously();
      else {
        user = {id: u.uid, email: u.email};
        syncFromFirebase();
      }
    });
  } catch(e) {
    console.log("Firebase warning:", e.message);
  }
}

function loadLocalData() {
  tx = JSON.parse(localStorage.getItem("stg_tx") || "[]");
  recurring = JSON.parse(localStorage.getItem("stg_recurring") || "[]");
  goals = JSON.parse(localStorage.getItem("stg_goals") || "[]");
}

function saveLocalData() {
  localStorage.setItem("stg_tx", JSON.stringify(tx));
  localStorage.setItem("stg_recurring", JSON.stringify(recurring));
  localStorage.setItem("stg_goals", JSON.stringify(goals));
}

function syncFromFirebase() {
  if (!db || !user) return;
  db.ref("staging/" + user.id).on("value", snap => {
    const data = snap.val();
    if (data) {
      if (data.tx) tx = data.tx;
      if (data.recurring) recurring = data.recurring;
      if (data.goals) goals = data.goals;
      saveLocalData();
      renderUI();
    }
  });
}

function triggerSync() {
  if (isSyncing) return;
  isSyncing = true;
  const icon = document.getElementById("syncIcon");
  const text = document.getElementById("syncText");
  
  icon.classList.add("spinning");
  text.textContent = "Sincronizzando...";
  
  if (db && user) {
    db.ref("staging/" + user.id).set({
      tx, recurring, goals,
      lastSync: new Date().toISOString()
    }).then(() => {
      icon.classList.remove("spinning");
      icon.textContent = "✅";
      text.textContent = "Sincronizzato";
      notify("✅ Sincronizzato!");
      
      setTimeout(() => {
        isSyncing = false;
        icon.textContent = "🔄";
        text.textContent = "Sync";
      }, 2000);
    }).catch(() => {
      isSyncing = false;
      text.textContent = "❌ Errore";
      notify("❌ Errore sync", "error");
    });
  } else {
    setTimeout(() => {
      isSyncing = false;
      icon.classList.remove("spinning");
      icon.textContent = "✅";
      text.textContent = "Sincronizzato";
      notify("✅ Sincronizzato (locale)");
      
      setTimeout(() => {
        icon.textContent = "🔄";
        text.textContent = "Sync";
      }, 2000);
    }, 1000);
  }
}

function goPage(p) {
  currentPage = p;
  document.querySelectorAll(".nav-item").forEach(b => b.classList.remove("active"));
  event.target.classList.add("active");
  renderUI();
}

function renderUI() {
  const content = document.getElementById("content");
  
  if (currentPage === "dashboard") renderDashboard(content);
  else if (currentPage === "transazioni") renderTransazioni(content);
  else if (currentPage === "ricorrenti") renderRicorrenti(content);
  else if (currentPage === "obiettivi") renderObiettivi(content);
  else if (currentPage === "report") renderReport(content);
  else if (currentPage === "impostazioni") renderImpostazioni(content);
}

function renderDashboard(el) {
  const balance = getBalance();
  const income = tx.filter(t => t.type === "income").reduce((s, t) => s + t.amt, 0);
  const expense = tx.filter(t => t.type === "expense").reduce((s, t) => s + t.amt, 0);
  const goalSaved = goals.reduce((s, g) => s + (g.saved || 0), 0);
  
  el.innerHTML = `
    <div class="card">
      <h3>💰 Saldo</h3>
      <div style="font-size:28px;font-weight:900;color:var(--gr);margin-top:10px">€${balance.toFixed(2)}</div>
    </div>
    
    <div class="stat-grid">
      <div class="stat">
        <div class="stat-label">Entrate</div>
        <div class="stat-value" style="color:var(--gr)">€${income.toFixed(2)}</div>
      </div>
      <div class="stat">
        <div class="stat-label">Uscite</div>
        <div class="stat-value" style="color:var(--re)">€${expense.toFixed(2)}</div>
      </div>
      <div class="stat">
        <div class="stat-label">Obiettivi</div>
        <div class="stat-value" style="color:var(--ac2)">€${goalSaved.toFixed(2)}</div>
      </div>
      <div class="stat">
        <div class="stat-label">Transazioni</div>
        <div class="stat-value">${tx.length}</div>
      </div>
    </div>
    
    <div class="card">
      <h3>📋 Ultime Transazioni</h3>
      ${tx.length === 0 ? '<p style="color:var(--tx2);font-size:10px">Nessuna transazione</p>' : 
        tx.slice(-5).reverse().map(t => `
          <div style="padding:10px;border-bottom:1px solid rgba(255,244,255,.08);display:flex;justify-content:space-between;align-items:center">
            <div>
              <div style="font-weight:600;font-size:11px">${t.desc}</div>
              <div style="font-size:9px;color:var(--tx2)">${t.date}</div>
            </div>
            <div style="color:${t.type === 'income' ? 'var(--gr)' : 'var(--re)'};font-weight:700">${t.type === 'income' ? '+' : '-'}€${t.amt.toFixed(2)}</div>
          </div>
        `).join('')}
    </div>
    
    <button class="btn" style="width:100%" onclick="addTransaction()">➕ Aggiungi Transazione</button>
  `;
}

function renderTransazioni(el) {
  el.innerHTML = `
    <button class="btn" style="width:100%;margin-bottom:14px" onclick="addTransaction()">➕ Aggiungi Transazione</button>
    <div class="card">
      <h3>💸 Transazioni (${tx.length})</h3>
      ${tx.length === 0 ? '<p style="color:var(--tx2);font-size:10px">Nessuna transazione</p>' :
        tx.slice().reverse().map(t => `
          <div style="padding:10px;border-bottom:1px solid rgba(255,244,255,.08);display:flex;justify-content:space-between;align-items:center">
            <div style="flex:1">
              <div style="font-weight:600;font-size:11px">${t.desc}</div>
              <div style="font-size:9px;color:var(--tx2)">${t.date}</div>
            </div>
            <div style="color:${t.type === 'income' ? 'var(--gr)' : 'var(--re)'};font-weight:700;margin:0 12px">${t.type === 'income' ? '+' : '-'}€${t.amt.toFixed(2)}</div>
            <button class="btn-small btn-danger" onclick="delTransaction('${t.id}')">🗑️</button>
          </div>
        `).join('')}
    </div>
  `;
}

function renderRicorrenti(el) {
  el.innerHTML = `
    <button class="btn" style="width:100%;margin-bottom:14px" onclick="addRecurring()">➕ Nuova Ricorrente</button>
    <div class="card">
      <h3>🔄 Ricorrenti (${recurring.length})</h3>
      ${recurring.length === 0 ? '<p style="color:var(--tx2);font-size:10px">Nessuna ricorrente</p>' :
        recurring.map(r => `
          <div style="padding:10px;border-bottom:1px solid rgba(255,244,255,.08);display:flex;justify-content:space-between;align-items:center">
            <div>
              <div style="font-weight:600;font-size:11px">${r.desc}</div>
              <div style="font-size:9px;color:var(--tx2)">${r.freq} - €${r.amt.toFixed(2)}</div>
            </div>
            <button class="btn-small btn-danger" onclick="delRecurring('${r.id}')">🗑️</button>
          </div>
        `).join('')}
    </div>
  `;
}

function renderObiettivi(el) {
  el.innerHTML = `
    <button class="btn" style="width:100%;margin-bottom:14px;background:linear-gradient(135deg,#00e5a0,#00d4ff);color:#000;font-weight:800" onclick="addGoal()">➕ Nuovo Obiettivo</button>
    <div class="card">
      <h3>🎯 Obiettivi (${goals.length})</h3>
      ${goals.length === 0 ? '<p style="color:var(--tx2);font-size:10px">Nessun obiettivo</p>' :
        goals.map(g => {
          const pct = Math.min((g.saved || 0) / g.target * 100, 100);
          const mancante = Math.max(g.target - (g.saved || 0), 0);
          return `
            <div style="padding:12px;background:linear-gradient(135deg,rgba(108,99,255,.08),rgba(0,212,255,.04));border:1px solid rgba(108,99,255,.15);border-radius:12px;margin-bottom:12px">
              <div style="display:flex;justify-content:space-between;margin-bottom:10px">
                <div>
                  <div style="font-weight:800;font-size:12px">${g.name}</div>
                  <div style="font-size:9px;color:var(--tx2);margin-top:4px">📅 ${g.months || 12} mesi | 💰 €${(g.monthlyAmount || 0).toFixed(2)}/mese</div>
                </div>
                <button class="btn-small btn-danger" onclick="delGoal('${g.id}')" style="height:fit-content">🗑️</button>
              </div>
              <div class="progress-bar">
                <div class="progress-fill" style="width:${pct}%"></div>
              </div>
              <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:8px;margin-top:8px">
                <div style="background:rgba(0,229,160,.1);border:1px solid rgba(0,229,160,.2);border-radius:8px;padding:8px;text-align:center">
                  <div style="color:var(--tx2)">Versato</div>
                  <div style="font-weight:800;color:var(--gr)">€${(g.saved || 0).toFixed(2)}</div>
                </div>
                <div style="background:rgba(255,79,109,.1);border:1px solid rgba(255,79,109,.2);border-radius:8px;padding:8px;text-align:center">
                  <div style="color:var(--tx2)">Mancano</div>
                  <div style="font-weight:800;color:var(--re)">€${mancante.toFixed(2)}</div>
                </div>
              </div>
            </div>
          `;
        }).join('')}
    </div>
  `;
}

function renderReport(el) {
  el.innerHTML = '<div class="card"><h3>📈 Report</h3><p style="color:var(--tx2);font-size:10px">Feature in arrivo...</p></div>';
}

function renderImpostazioni(el) {
  el.innerHTML = `
    <div class="card">
      <h3>⚙️ Impostazioni</h3>
      <button class="btn" style="width:100%;margin-top:12px;background:rgba(255,79,109,.3);color:var(--re)" onclick="if(confirm('❌ CANCELLARE TUTTI I DATI?')){localStorage.clear();location.reload()}">Cancella Tutti i Dati</button>
    </div>
  `;
}

function addTransaction() {
  const desc = prompt("📝 Descrizione:");
  if (!desc) return;
  const amt = parseFloat(prompt("💰 Importo:"));
  if (!amt || amt <= 0) return;
  const type = confirm("✅ Entrata? (OK=Sì, Cancel=No)") ? "income" : "expense";
  
  tx.push({
    id: Date.now().toString(),
    desc,
    amt,
    type,
    date: new Date().toISOString().split("T")[0]
  });
  
  saveLocalData();
  triggerSync();
  notify("✅ Transazione aggiunta");
  renderUI();
}

function delTransaction(id) {
  if (!confirm("❌ Eliminare?")) return;
  tx = tx.filter(t => t.id !== id);
  saveLocalData();
  triggerSync();
  notify("🗑️ Eliminata");
  renderUI();
}

function addRecurring() {
  const desc = prompt("📝 Descrizione:");
  if (!desc) return;
  const amt = parseFloat(prompt("💰 Importo:"));
  if (!amt || amt <= 0) return;
  const freq = prompt("📅 Frequenza (daily/weekly/monthly):", "monthly");
  
  recurring.push({
    id: Date.now().toString(),
    desc, amt, freq,
    lastApplied: new Date().toISOString()
  });
  
  saveLocalData();
  triggerSync();
  notify("✅ Ricorrente aggiunta");
  renderUI();
}

function delRecurring(id) {
  if (!confirm("❌ Eliminare?")) return;
  recurring = recurring.filter(r => r.id !== id);
  saveLocalData();
  triggerSync();
  notify("🗑️ Eliminata");
  renderUI();
}

function addGoal() {
  const name = prompt("🎯 Nome obiettivo:");
  if (!name) return;
  const target = parseFloat(prompt("💰 Target €:"));
  if (!target || target <= 0) return;
  const months = parseInt(prompt("📅 In quanti mesi?", "12")) || 12;
  const monthly = target / months;
  
  const msg = `🎯 ${name}\n💰 €${target.toFixed(2)}\n📅 ${months} mesi\n📊 €${monthly.toFixed(2)}/mese`;
  if (!confirm("✅ Creare?\n" + msg)) return;
  
  goals.push({
    id: Date.now().toString(),
    name, target, saved: 0, months, monthlyAmount: monthly,
    created: new Date().toISOString()
  });
  
  saveLocalData();
  triggerSync();
  notify("✅ Obiettivo creato!");
  renderUI();
}

function delGoal(id) {
  if (!confirm("❌ Eliminare obiettivo?")) return;
  goals = goals.filter(g => g.id !== id);
  saveLocalData();
  triggerSync();
  notify("🗑️ Eliminato");
  renderUI();
}

function getBalance() {
  return tx.reduce((s, t) => s + (t.type === "income" ? t.amt : -t.amt), 0);
}

function notify(msg, type = "success") {
  const n = document.createElement("div");
  n.className = "notif" + (type === "error" ? " error" : "");
  n.textContent = msg;
  document.body.appendChild(n);
  
  setTimeout(() => {
    n.style.opacity = "0";
    n.style.transition = "opacity 0.3s ease";
    setTimeout(() => n.remove(), 300);
  }, 2500);
}

console.log("✅ Kazka app loaded - GH Pages ready!");
</script>
