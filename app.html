<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <meta name="theme-color" content="#0a0f1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>Kazka · Finanza intelligente</title>
  <!-- Font e icone -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* ===== RESET & VARIABILI ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      /* Colori base – alti contrasti */
      --bg: #0a0f1a;
      --bg-surface: #141b2b;
      --bg-surface-hover: #1e273a;
      --border: #2a344a;
      --border-strong: #3e4a66;

      --text-primary: #ffffff;
      --text-secondary: #cbd5e1;
      --text-tertiary: #94a3b8;
      --text-muted: #64748b;

      --accent: #7c6fff;
      --accent-light: #9a8fff;
      --accent-dark: #5b4fd9;
      --accent-glow: rgba(124, 111, 255, 0.35);

      --success: #00e5a0;
      --success-bg: rgba(0, 229, 160, 0.15);
      --warning: #fbbf24;
      --warning-bg: rgba(251, 191, 36, 0.15);
      --danger: #ff6b6b;
      --danger-bg: rgba(255, 107, 107, 0.15);

      /* Layout */
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-xl: 24px;

      --space-xs: 4px;
      --space-sm: 8px;
      --space-md: 12px;
      --space-lg: 16px;
      --space-xl: 20px;
      --space-2xl: 24px;
      --space-3xl: 32px;

      --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
      --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.4);
      --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.5);
      --shadow-glow: 0 4px 24px var(--accent-glow);

      --header-height: 64px;
      --sidebar-width: 260px;
    }

    body.light {
      --bg: #f8fafc;
      --bg-surface: #ffffff;
      --bg-surface-hover: #f1f5f9;
      --border: #e2e8f0;
      --border-strong: #cbd5e1;
      --text-primary: #0f172a;
      --text-secondary: #334155;
      --text-tertiary: #475569;
      --text-muted: #64748b;
      --accent: #6d28d9;
      --accent-light: #8b5cf6;
      --accent-dark: #5b21b6;
      --accent-glow: rgba(109, 40, 217, 0.25);
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      font-size: 14px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* ===== TIPOGRAFIA ===== */
    h1 { font-size: 24px; font-weight: 700; letter-spacing: -0.02em; }
    h2 { font-size: 20px; font-weight: 700; letter-spacing: -0.01em; }
    h3 { font-size: 16px; font-weight: 600; }
    .text-xs { font-size: 12px; }
    .text-sm { font-size: 13px; }
    .text-lg { font-size: 16px; font-weight: 600; }

    /* ===== BOTTONI – SEMPRE VISIBILI ===== */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 16px;
      border: none;
      border-radius: var(--radius-md);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
      line-height: 1;
      white-space: nowrap;
      background: transparent;
      color: inherit;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-light));
      color: white;
      box-shadow: var(--shadow-glow);
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px var(--accent-glow);
    }
    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-secondary {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      color: var(--text-secondary);
    }
    .btn-secondary:hover {
      background: var(--bg-surface-hover);
      border-color: var(--border-strong);
      color: var(--text-primary);
    }

    .btn-outline {
      border: 1px solid var(--border);
      color: var(--text-secondary);
    }
    .btn-outline:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .btn-success {
      background: var(--success-bg);
      color: var(--success);
      border: 1px solid rgba(0, 229, 160, 0.2);
    }
    .btn-success:hover {
      background: rgba(0, 229, 160, 0.25);
    }

    .btn-danger {
      background: var(--danger-bg);
      color: var(--danger);
      border: 1px solid rgba(255, 107, 107, 0.2);
    }
    .btn-danger:hover {
      background: rgba(255, 107, 107, 0.25);
    }

    .btn-sm {
      padding: 6px 12px;
      font-size: 12px;
      border-radius: var(--radius-sm);
    }

    .btn-block {
      width: 100%;
    }

    /* ===== LAYOUT PRINCIPALE ===== */
    #app {
      display: flex;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
    }

    /* SIDEBAR (desktop) */
    .sidebar {
      width: var(--sidebar-width);
      background: var(--bg-surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      padding: var(--space-xl) 0;
      transition: transform 0.3s ease;
    }

    .sidebar-header {
      padding: 0 var(--space-lg) var(--space-lg);
      border-bottom: 1px solid var(--border);
      margin-bottom: var(--space-lg);
    }

    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 20px;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--accent-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .sidebar-user {
      padding: var(--space-md) var(--space-lg);
      background: var(--bg);
      border-radius: var(--radius-md);
      margin: 0 var(--space-lg) var(--space-lg);
      border: 1px solid var(--border);
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px var(--space-lg);
      margin: 2px var(--space-md);
      border-radius: var(--radius-md);
      color: var(--text-secondary);
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }
    .nav-item:hover {
      background: var(--bg-surface-hover);
      color: var(--text-primary);
    }
    .nav-item.active {
      background: linear-gradient(135deg, var(--accent), var(--accent-light));
      color: white;
      box-shadow: var(--shadow-glow);
    }
    .nav-item i {
      width: 20px;
      text-align: center;
    }

    /* MAIN CONTENT */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg);
    }

    /* TOPBAR */
    .topbar {
      height: var(--header-height);
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border);
      padding: 0 var(--space-xl);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }

    .page-title {
      font-size: 18px;
      font-weight: 700;
    }

    .page-subtitle {
      font-size: 12px;
      color: var(--text-tertiary);
      margin-top: 2px;
    }

    .topbar-actions {
      display: flex;
      align-items: center;
      gap: var(--space-md);
    }

    /* CONTENUTO SCROLLABILE */
    .content {
      flex: 1;
      overflow-y: auto;
      padding: var(--space-xl);
    }

    /* ===== CARD ===== */
    .card {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: var(--space-xl);
      margin-bottom: var(--space-xl);
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--space-lg);
    }

    .card-title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 600;
      font-size: 15px;
    }

    .card-title i {
      color: var(--accent);
    }

    /* ===== GRIGLIE ===== */
    .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: var(--space-lg); }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--space-lg); }
    .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: var(--space-lg); }

    /* STAT CARDS */
    .stat-card {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: var(--space-lg);
    }
    .stat-label {
      font-size: 12px;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }
    .stat-value {
      font-size: 26px;
      font-weight: 800;
      line-height: 1.2;
    }
    .stat-value.positive { color: var(--success); }
    .stat-value.negative { color: var(--danger); }

    /* TABELLE / LISTE */
    .item-row {
      display: flex;
      align-items: center;
      padding: var(--space-md) 0;
      border-bottom: 1px solid var(--border);
    }
    .item-row:last-child { border-bottom: none; }
    .item-icon {
      width: 36px;
      height: 36px;
      border-radius: var(--radius-sm);
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: var(--space-md);
      color: var(--text-secondary);
    }
    .item-content { flex: 1; }
    .item-title { font-weight: 600; margin-bottom: 2px; }
    .item-subtitle { font-size: 11px; color: var(--text-tertiary); }
    .item-amount { font-weight: 700; }
    .amount-positive { color: var(--success); }
    .amount-negative { color: var(--danger); }

    /* ===== BADGE ===== */
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      background: var(--bg);
      color: var(--text-secondary);
      border: 1px solid var(--border);
    }
    .badge-success { background: var(--success-bg); color: var(--success); border-color: rgba(0,229,160,0.2); }
    .badge-warning { background: var(--warning-bg); color: var(--warning); border-color: rgba(251,191,36,0.2); }
    .badge-danger { background: var(--danger-bg); color: var(--danger); border-color: rgba(255,107,107,0.2); }

    /* ===== FORM ===== */
    .input-group { margin-bottom: var(--space-lg); }
    label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 6px; color: var(--text-secondary); }
    input, select, textarea {
      width: 100%;
      padding: 10px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      color: var(--text-primary);
      font-size: 14px;
      font-family: inherit;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    /* ===== MODAL ===== */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    .modal-overlay.active { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--bg-surface);
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-xl);
      width: 90%;
      max-width: 500px;
      max-height: 85vh;
      overflow-y: auto;
      padding: var(--space-2xl);
      transform: translateY(20px);
      transition: transform 0.3s;
    }
    .modal-overlay.active .modal { transform: translateY(0); }
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--space-xl);
    }
    .modal-close { background: none; border: none; font-size: 20px; cursor: pointer; color: var(--text-tertiary); }

    /* ===== TOAST ===== */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--bg-surface);
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-md);
      padding: 12px 20px;
      color: var(--text-primary);
      font-weight: 500;
      box-shadow: var(--shadow-lg);
      z-index: 2000;
      display: none;
    }

    /* ===== MOBILE DRAWER ===== */
    .drawer-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 900;
      opacity: 0; pointer-events: none; transition: opacity 0.3s;
    }
    .drawer-overlay.open { opacity: 1; pointer-events: all; }
    .drawer {
      position: fixed; top: 0; left: 0; bottom: 0; width: 280px;
      background: var(--bg-surface); border-right: 1px solid var(--border);
      transform: translateX(-100%); transition: transform 0.3s ease; z-index: 1000;
      overflow-y: auto;
    }
    .drawer.open { transform: translateX(0); }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      .sidebar { display: none; }
      .topbar { padding: 0 var(--space-lg); }
      .content { padding: var(--space-lg); }
      .grid-4, .grid-3 { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 480px) {
      .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
      .topbar-actions .btn span { display: none; }
    }

    /* ===== UTILITY ===== */
    .hidden { display: none !important; }
    .flex { display: flex; }
    .items-center { align-items: center; }
    .justify-between { justify-content: space-between; }
    .gap-2 { gap: 8px; }
    .w-full { width: 100%; }
    .mt-4 { margin-top: 16px; }
    .mb-4 { margin-bottom: 16px; }
    .text-center { text-align: center; }
  </style>
</head>

    function notify(msg, type = 'info') {

      toast.style.color = type === 'error' ? 'var(--danger)' : 'var(--text-primary)';
      setTimeout(() => { toast.style.display = 'none'; }, 3000);
    }

    function formatEuro(v) {
      return '€' + parseFloat(v || 0).toFixed(2);
    }

    function formatDate(d) {
      try { return new Date(d).toLocaleDateString('it-IT'); } catch { return d; }
    }

    function catIcon(cid) {
      const c = CATS.find(x => x.id === cid);
      return c ? c.icon : '📦';
    }

      const c = CATS.find(x => x.id === cid);

    }

    // ==================== AUTH ====================
    async function hashPass(pass) {
      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pass));
      return 'sha256:' + Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    async function checkPass(plain, stored) {
      if (stored.startsWith('sha256:')) {
        const h = await hashPass(plain);
        return h === stored;
      }
      try { return decodeURIComponent(escape(atob(stored))) === plain; } catch { return false; }
    }

    function doLogin() {
      const email = document.getElementById('loginEmail').value.trim();
      const pass = document.getElementById('loginPassword').value;
      if (!email || !pass) { notify('Inserisci email e password', 'error'); return; }
      // Simulazione login – in produzione si farebbe una query Firebase
      // Per demo, creiamo un utente fittizio
      currentUser = { id: 'u_' + email.replace(/[^a-z0-9]/g, '_'), name: email.split('@')[0], plan: 'lifetime', role: 'user' };
      realUser = currentUser;
      localStorage.setItem('kazka_user', JSON.stringify(currentUser));
      document.getElementById('loginScreen').classList.add('hidden');
      document.getElementById('splash').classList.add('hidden');
      document.getElementById('app').classList.remove('hidden');
      loadUserData(currentUser.id);
    }

        return item.plans.includes(currentUser.plan) || currentUser.role === 'admin';
      });
      visible.forEach(item => {
        const div = document.createElement('div');
        div.className = 'nav-item';
        div.setAttribute('data-page', item.id);
        div.innerHTML = `<i class="fas ${item.icon.replace(/[^\w-]/g, '')}"></i> ${item.label}`;
        div.onclick = () => goToPage(item.id);
        navEl.appendChild(div);

    // ==================== NOTE SPESE ====================
    function renderBizSpese(container) {
      container.innerHTML = `
        <div class="card">
          <div class="card-header">
            <div class="card-title"><i class="fas fa-receipt"></i> Note Spese</div>
            <button class="btn btn-primary btn-sm" onclick="openAddExpenseModal()"><i class="fas fa-plus"></i> Nuovo</button>
          </div>
          ${expenseNotes.length === 0 ? es('🧾', 'Nessuna nota spese') : expenseNotes.map(e => `
            <div class="item-row">
              <div class="item-icon">🧾</div>
              <div class="item-content">
                <div class="item-title">${e.desc}</div>
                <div class="item-subtitle">${formatEuro(e.amount)} · <span class="badge ${e.status === 'approved' ? 'badge-success' : e.status === 'pending' ? 'badge-warning' : 'badge'}">${e.status}</span></div>
              </div>
            </div>`).join('')}
        </div>
      `;
    }

    // ==================== SCADENZIARIO ====================
    function renderBizScadenzario(container) {
      const today = new Date().toISOString().split('T')[0];
      const scadenze = [
        ...quotes.filter(q => q.expiry && q.expiry >= today).map(q => ({ type: 'Preventivo', name: q.title, date: q.expiry })),
        ...projects.filter(p => p.endDate && p.endDate >= today).map(p => ({ type: 'Progetto', name: p.name, date: p.endDate }))
      ].sort((a, b) => a.date.localeCompare(b.date));
      container.innerHTML = `
        <div class="card">
          <div class="card-header">
            <div class="card-title"><i class="fas fa-calendar-alt"></i> Scadenziario</div>
          </div>
          ${scadenze.length === 0 ? es('📅', 'Nessuna scadenza imminente') : scadenze.map(s => `
            <div class="item-row">
              <div class="item-icon">📅</div>
              <div class="item-content">
                <div class="item-title">${s.name}</div>
                <div class="item-subtitle">${s.type} · ${formatDate(s.date)}</div>
              </div>
            </div>`).join('')}
        </div>
      `;
    }

    // ==================== IVA TRACKER ====================
    function renderBizIva(container) {
      const totalIva = bizTx.reduce((sum, t) => sum + (t.iva ? (t.amount * t.iva / 100) : 0), 0);
      container.innerHTML = `
        <div class="card">
          <div class="card-header">
            <div class="card-title"><i class="fas fa-percent"></i> IVA Tracker</div>
          </div>
          <div style="font-size:36px; font-weight:800; color:var(--accent);">${formatEuro(totalIva)}</div>
          <div style="color:var(--text-tertiary);">IVA totale sui movimenti</div>
          <div class="mt-4">
            <p class="text-sm">I calcoli sono indicativi. Verifica con il tuo commercialista.</p>
          </div>
        </div>
      `;
    }

    // ==================== OBIETTIVI ====================
    function renderGoals(container) {
      const goals = JSON.parse(localStorage.getItem('fp_goals_' + currentUser.id) || '[]');
      container.innerHTML = `
        <div class="card">
          <div class="card-header">
            <div class="card-title"><i class="fas fa-bullseye"></i> Obiettivi di risparmio</div>
            <button class="btn btn-primary btn-sm" onclick="openAddGoalModal()"><i class="fas fa-plus"></i> Nuovo</button>
          </div>
          ${goals.length === 0 ? es('🎯', 'Nessun obiettivo. Creane uno!') : goals.map(g => `
            <div class="item-row">
              <div class="item-icon">${g.icon || '🎯'}</div>
              <div class="item-content">
                <div class="item-title">${g.name}</div>
                <div class="item-subtitle">${formatEuro(g.saved)} / ${formatEuro(g.target)} · ${Math.round(g.saved/g.target*100)}%</div>
              </div>
            </div>`).join('')}
        </div>
      `;
    }

    // ==================== GRUPPI ====================
    function renderGroups(container) {
      container.innerHTML = `
        <div class="card">
          <div class="card-header">
            <div class="card-title"><i class="fas fa-users"></i> Gruppi</div>
            <button class="btn btn-primary btn-sm" onclick="openAddGroupModal()"><i class="fas fa-plus"></i> Nuovo</button>
          </div>
          ${groups.length === 0 ? es('👥', 'Nessun gruppo') : groups.map(g => `
            <div class="item-row">
              <div class="item-icon">${g.icon || '👥'}</div>
              <div class="item-content">
                <div class="item-title">${g.name}</div>
                <div class="item-subtitle">${g.desc || ''}</div>
              </div>
            </div>`).join('')}
        </div>
      `;
    }

    // ==================== NOTIFICHE ====================
    function renderNotifiche(container) {
      container.innerHTML = `
        <div class="card">
          <div class="card-header">
            <div class="card-title"><i class="fas fa-bell"></i> Notifiche</div>
          </div>
          ${appNotifs.length === 0 ? es('🔔', 'Nessuna notifica') : appNotifs.map(n => `
            <div class="item-row">
              <div class="item-icon">${n.icon || '🔔'}</div>
              <div class="item-content">
                <div class="item-title">${n.title}</div>
                <div class="item-subtitle">${n.sub}</div>
              </div>
            </div>`).join('')}
        </div>
      `;
    }

    // ==================== PIANI ====================
    function renderPiani(container) {
      container.innerHTML = `
        <div class="grid-3">
          ${Object.entries(PLANS).map(([k, p]) => `
            <div class="card" style="${k === currentUser.plan ? 'border-color:var(--accent);' : ''}">
              <div class="card-header"><div class="card-title">${p.name}</div></div>
              <div style="font-size:28px; font-weight:800;">${p.price}</div>
              <div style="margin:16px 0;">${p.features.map(f => `<div style="padding:4px 0;"><i class="fas fa-check" style="color:var(--success);"></i> ${f}</div>`).join('')}</div>
            </div>`).join('')}
        </div>
      `;
    }

    // ==================== ADMIN ====================
    function renderAdmin(container) {
      container.innerHTML = `
        <div class="card">
          <div class="card-header"><div class="card-title"><i class="fas fa-crown"></i> Admin Panel</div></div>
          <p class="text-sm">Gestione utenti (solo admin)</p>
        </div>
      `;
    }

    // ==================== PROFILO ====================
    function renderProfilo(container) {
      container.innerHTML = `
        <div class="card">
          <div class="card-header"><div class="card-title"><i class="fas fa-user"></i> Profilo</div></div>
          <div class="item-row">
            <div class="item-icon"><i class="fas fa-user"></i></div>
            <div class="item-content"><div class="item-title">${currentUser.name}</div><div class="item-subtitle">${currentUser.email || ''}</div></div>
          </div>
          <div class="item-row">
            <div class="item-icon"><i class="fas fa-tag"></i></div>
            <div class="item-content"><div class="item-title">Piano</div><div class="item-subtitle">${PLANS[currentUser.plan]?.name || currentUser.plan}</div></div>
          </div>
          <div class="item-row">
            <div class="item-icon"><i class="fas fa-id-card"></i></div>
            <div class="item-content"><div class="item-title">ID</div><div class="item-subtitle" style="font-family:monospace;">${currentUser.id}</div></div>
          </div>
        </div>
      `;
    }

    // ==================== MODAL APERTURE (placeholder) ====================
    function openAddTxModal() { notify('Funzione di aggiunta transazione in arrivo', 'info'); }
    function openAddRecModal() { notify('Funzione di aggiunta ricorrente in arrivo', 'info'); }
    function openAddBizTxModal() { notify('Funzione di aggiunta movimento aziendale in arrivo', 'info'); }
    function openAddClientModal() { notify('Funzione di aggiunta cliente in arrivo', 'info'); }
    function openAddQuoteModal() { notify('Funzione di aggiunta preventivo in arrivo', 'info'); }
    function openAddProjectModal() { notify('Funzione di aggiunta progetto in arrivo', 'info'); }
    function openAddExpenseModal() { notify('Funzione di aggiunta nota spese in arrivo', 'info'); }
    function openAddGoalModal() { notify('Funzione di aggiunta obiettivo in arrivo', 'info'); }
    function openAddGroupModal() { notify('Funzione di aggiunta gruppo in arrivo', 'info'); }

    // ==================== THEME ====================
    function toggleTheme() {
      document.body.classList.toggle('light');
      const icon = document.querySelector('#themeToggle i');
      if (icon) icon.className = document.body.classList.contains('light') ? 'fas fa-sun' : 'fas fa-moon';
    }

    // ==================== AVVIO ====================
    window.addEventListener('load', async () => {
      setTimeout(() => { document.getElementById('splash').style.display = 'none'; }, 1000);
      const saved = localStorage.getItem('kazka_user');
      if (saved) {
        currentUser = JSON.parse(saved);
        realUser = currentUser;
        document.getElementById('loginScreen').classList.add('hidden');
        document.getElementById('app').classList.remove('hidden');
        await loadUserData(currentUser.id);
      } else {
        document.getElementById('splash').style.display = 'none';
        document.getElementById('loginScreen').classList.remove('hidden');
      }
    });

    // Esponi funzioni globali
    window.goToPage = goToPage;
    window.logout = logout;
    window.doLogin = doLogin;
    window.toggleTheme = toggleTheme;
    window.openAddModal = () => notify('Aggiungi rapido', 'info');
    window.editTx = (id) => notify('Modifica transazione ' + id, 'info');
  </script>
</body>
</html>
