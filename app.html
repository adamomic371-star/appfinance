<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Finanza Pro – App</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
:root{--bg:#070b18;--bg2:#0d1225;--bg3:#111827;--s1:rgba(255,255,255,.04);--s2:rgba(255,255,255,.07);--s3:rgba(255,255,255,.11);--b1:rgba(255,255,255,.08);--b2:rgba(255,255,255,.15);--ac:#6c63ff;--ac2:#00d4ff;--ac3:#ff6b9d;--gr:#00e5a0;--re:#ff4f6d;--ye:#ffd166;--or:#ff9f43;--tx:#f0f4ff;--tx2:#8892b0;--tx3:#4a5580;--r:14px;--glow:0 0 40px rgba(108,99,255,.15);--sw:240px;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:'Segoe UI',Tahoma,sans-serif;overflow:hidden}
.hidden{display:none!important}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:var(--b2);border-radius:4px}

/* SPLASH */
#splash{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1000}
#splash.out{animation:fadeOut .5s ease forwards}
@keyframes fadeOut{to{opacity:0;pointer-events:none}}
.splash-content{text-align:center}
.splash-ico{font-size:72px;margin-bottom:20px;animation:pulse 1s ease infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
.splash-title{font-size:28px;font-weight:800;margin-bottom:8px}
.splash-sub{font-size:13px;color:var(--tx2);margin-bottom:30px}
.splash-bar{width:180px;height:3px;background:var(--s2);border-radius:10px;overflow:hidden}
.splash-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--ac),var(--ac2));animation:loadBar 3s ease forwards}
@keyframes loadBar{to{width:100%}}

/* APP SHELL */
#app{display:flex;height:100vh;overflow:hidden}
.sidebar{width:var(--sw);min-width:var(--sw);background:var(--bg2);border-right:1px solid var(--b1);padding:16px 12px;display:flex;flex-direction:column;overflow-y:auto}
.sb-head{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.sb-ico{width:36px;height:36px;background:linear-gradient(135deg,var(--ac),var(--ac2));border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px}
.sb-brand{font-size:14px;font-weight:800;background:linear-gradient(135deg,#fff,var(--ac2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sb-user{background:linear-gradient(135deg,rgba(108,99,255,.1),rgba(0,212,255,.05));border:1px solid rgba(108,99,255,.2);border-radius:12px;padding:10px;margin-bottom:12px;font-size:11px}
.sb-user-name{font-weight:700;margin-bottom:3px}
.sb-plan{display:inline-block;padding:2px 8px;background:linear-gradient(135deg,var(--ac),var(--ac2));border-radius:20px;font-size:8px;font-weight:700;color:#fff}
.nav{flex:1;display:flex;flex-direction:column;gap:2px}
.ni{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:10px;color:var(--tx2);cursor:pointer;font-size:12px;font-weight:600;transition:all .2s;border:1px solid transparent}
.ni:hover{background:var(--s2);color:var(--tx)}
.ni.active{background:linear-gradient(135deg,rgba(108,99,255,.15),rgba(0,212,255,.08));color:var(--tx);border-color:rgba(108,99,255,.25)}
.ni-ico{width:24px;height:24px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;background:var(--s1)}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{background:rgba(13,18,37,.9);border-bottom:1px solid var(--b1);padding:0 16px;height:56px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.tb-left h1{font-size:17px;font-weight:800;margin-bottom:2px}
.tb-left p{font-size:10px;color:var(--tx2)}
.tb-right{display:flex;gap:8px}
.btn-add{padding:8px 14px;background:linear-gradient(135deg,var(--ac),var(--ac2));border:none;border-radius:9px;color:#fff;font-size:11px;font-weight:700;cursor:pointer;transition:all .2s}
.btn-add:hover{transform:translateY(-1px)}
.content{flex:1;overflow-y:auto;padding:14px}

/* CARDS */
.card{background:var(--s1);border:1px solid var(--b1);border-radius:14px;padding:14px;margin-bottom:12px}
.card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;gap:8px}
.card-title{font-size:12px;font-weight:700;display:flex;align-items:center;gap:6px}
.card-ico{width:20px;height:20px;border-radius:6px;background:linear-gradient(135deg,var(--ac),var(--ac2));display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0}

/* STAT GRID */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin-bottom:14px}
.stat{background:var(--s1);border:1px solid var(--b1);border-radius:12px;padding:12px;text-align:center}
.stat-lbl{font-size:9px;color:var(--tx2);font-weight:600;text-transform:uppercase;margin-bottom:6px}
.stat-val{font-size:18px;font-weight:800}

/* ITEMS */
.ir{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--b1);font-size:11px}
.ir:last-child{border-bottom:none}
.ir-ico{width:32px;height:32px;border-radius:9px;background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.ir-info{flex:1;min-width:0}
.ir-name{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ir-cat{font-size:9px;color:var(--tx3);margin-top:1px}
.ir-amt{font-weight:700;white-space:nowrap}
.ir-del{width:24px;height:24px;border-radius:6px;background:rgba(255,79,109,.1);border:none;color:var(--re);cursor:pointer;font-size:10px;flex-shrink:0;transition:all .2s}
.ir-del:hover{background:rgba(255,79,109,.2)}

/* MODAL */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:flex-end;justify-content:center;z-index:500;backdrop-filter:blur(2px)}
.modal.active{display:flex}
.modal-sheet{background:var(--bg2);border:1px solid var(--b1);border-radius:18px 18px 0 0;padding:16px;width:100%;max-height:80vh;overflow-y:auto;animation:slideUp .3s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.modal-title{font-size:14px;font-weight:800}
.modal-close{width:28px;height:28px;border-radius:8px;background:var(--s1);border:none;color:var(--tx2);cursor:pointer;font-size:16px}
.form-group{margin-bottom:10px}
.form-label{display:block;font-size:9px;color:var(--tx2);font-weight:700;text-transform:uppercase;margin-bottom:4px;letter-spacing:.5px}
.form-input,.form-select{width:100%;padding:9px 11px;background:var(--s1);border:1px solid var(--b1);border-radius:9px;color:var(--tx);font-size:12px;font-family:inherit;transition:all .2s}
.form-input:focus,.form-select:focus{outline:none;border-color:var(--ac);background:var(--s2);box-shadow:0 0 0 3px rgba(108,99,255,.14)}
.form-actions{display:flex;gap:8px;margin-top:14px}
.btn-save{flex:1;padding:10px;background:linear-gradient(135deg,var(--ac),var(--ac2));border:none;border-radius:9px;color:#fff;font-weight:700;font-size:12px;cursor:pointer}
.btn-cancel{flex:1;padding:10px;background:var(--s2);border:1px solid var(--b1);border-radius:9px;color:var(--tx2);cursor:pointer;font-family:inherit}

/* RESPONSIVE */
@media(max-width:600px){
  .sidebar{display:none}
  .topbar{padding:0 12px;height:50px}
  .topbar h1{font-size:15px}
  .topbar p{display:none}
  .content{padding:12px}
  .stat-grid{grid-template-columns:1fr 1fr}
}

.empty{text-align:center;padding:20px;color:var(--tx2)}
.empty-ico{font-size:32px;margin-bottom:8px;opacity:.3}
.notif{position:fixed;bottom:16px;right:16px;background:rgba(13,18,37,.95);border:1px solid var(--b2);border-radius:10px;padding:10px 14px;font-size:11px;font-weight:600;z-index:999;display:none;backdrop-filter:blur(10px)}
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <div class="splash-content">
    <div class="splash-ico">💰</div>
    <div class="splash-title">Finanza Pro</div>
    <div class="splash-sub">App finanziaria online</div>
    <div class="splash-bar"><div class="splash-fill"></div></div>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sb-head">
      <div class="sb-ico">💰</div>
      <div class="sb-brand">Finanza Pro</div>
    </div>
    <div class="sb-user">
      <div class="sb-user-name">Utente</div>
      <div style="margin-top:4px"><span class="sb-plan">Online</span></div>
    </div>
    <nav class="nav" id="nav-menu"></nav>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="topbar">
      <div>
        <h1 id="page-title">Dashboard</h1>
        <p id="page-sub">Panoramica finanze</p>
      </div>
      <div class="tb-right">
        <button class="btn-add" onclick="openModal('tx')">➕ Aggiungi</button>
      </div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<!-- MODALS -->
<div class="modal" id="modal-tx">
  <div class="modal-sheet">
    <div class="modal-head">
      <div class="modal-title">💸 Nuova Transazione</div>
      <button class="modal-close" onclick="closeModal('tx')">✕</button>
    </div>
    <div class="form-group">
      <label class="form-label">Descrizione</label>
      <input type="text" id="tx-desc" class="form-input" placeholder="es. Stipendio, Spesa...">
    </div>
    <div class="form-group">
      <label class="form-label">Importo (€)</label>
      <input type="number" id="tx-amt" class="form-input" placeholder="0.00" step="0.01">
    </div>
    <div class="form-group">
      <label class="form-label">Tipo</label>
      <select id="tx-type" class="form-select">
        <option value="income">📈 Entrata</option>
        <option value="expense">📉 Uscita</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Categoria</label>
      <select id="tx-cat" class="form-select" id="cat-select"></select>
    </div>
    <div class="form-actions">
      <button class="btn-save" onclick="saveTx()">Salva</button>
      <button class="btn-cancel" onclick="closeModal('tx')">Annulla</button>
    </div>
  </div>
</div>

<div class="modal" id="modal-rec">
  <div class="modal-sheet">
    <div class="modal-head">
      <div class="modal-title">🔄 Nuova Ricorrente</div>
      <button class="modal-close" onclick="closeModal('rec')">✕</button>
    </div>
    <div class="form-group">
      <label class="form-label">Nome</label>
      <input type="text" id="rec-name" class="form-input" placeholder="es. Netflix, Stipendio...">
    </div>
    <div class="form-group">
      <label class="form-label">Importo (€)</label>
      <input type="number" id="rec-amt" class="form-input" placeholder="0.00" step="0.01">
    </div>
    <div class="form-group">
      <label class="form-label">Frequenza</label>
      <select id="rec-freq" class="form-select">
        <option value="daily">Giornaliera</option>
        <option value="weekly">Settimanale</option>
        <option value="monthly" selected>Mensile</option>
        <option value="yearly">Annuale</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Prossima data</label>
      <input type="date" id="rec-date" class="form-input">
    </div>
    <div class="form-actions">
      <button class="btn-save" onclick="saveRec()">Salva</button>
      <button class="btn-cancel" onclick="closeModal('rec')">Annulla</button>
    </div>
  </div>
</div>

<!-- NOTIFICATION -->
<div class="notif" id="notif"></div>

<script>
const CATS=[
  {id:'food',name:'🍕 Cibo',ico:'🍕'},
  {id:'home',name:'🏠 Casa',ico:'🏠'},
  {id:'transport',name:'🚗 Trasporti',ico:'🚗'},
  {id:'health',name:'💊 Salute',ico:'💊'},
  {id:'fun',name:'🎮 Svago',ico:'🎮'},
  {id:'shopping',name:'🛍️ Shopping',ico:'🛍️'},
  {id:'work',name:'💼 Lavoro',ico:'💼'},
  {id:'travel',name:'✈️ Viaggi',ico:'✈️'},
  {id:'savings',name:'🏦 Risparmi',ico:'🏦'},
  {id:'other',name:'📦 Altro',ico:'📦'},
];
const NAV_ITEMS=[
  {id:'dashboard',label:'Dashboard',ico:'📊'},
  {id:'transazioni',label:'Transazioni',ico:'💸'},
  {id:'report',label:'Report',ico:'📈'},
  {id:'ricorrenti',label:'Ricorrenti',ico:'🔄'},
];

let tx=[], rec=[], page='dashboard';

// INIT
window.addEventListener('load',()=>{
  loadData();
  buildNav();
  buildCatSelect();
  setRecDate();
  setTimeout(()=>{
    document.getElementById('splash').classList.add('out');
    setTimeout(()=>{
      document.getElementById('splash').classList.add('hidden');
      document.getElementById('app').classList.remove('hidden');
      goPage('dashboard');
    },500);
  },2500);
});

function loadData(){
  tx=JSON.parse(localStorage.getItem('fp_tx')||'[]');
  rec=JSON.parse(localStorage.getItem('fp_rec')||'[]');
}
function saveData(){
  localStorage.setItem('fp_tx',JSON.stringify(tx));
  localStorage.setItem('fp_rec',JSON.stringify(rec));
}

function buildNav(){
  const nav=document.getElementById('nav-menu');
  nav.innerHTML=NAV_ITEMS.map(n=>`<div class="ni" onclick="goPage('${n.id}')">${n.ico} ${n.label}</div>`).join('');
}
function buildCatSelect(){
  const s=document.getElementById('tx-cat');
  s.innerHTML=CATS.map(c=>`<option value="${c.id}">${c.name}</option>`).join('');
}
function setRecDate(){
  const d=new Date();
  d.setDate(d.getDate()+1);
  document.getElementById('rec-date').value=d.toISOString().split('T')[0];
}

function goPage(p){
  page=p;
  document.querySelectorAll('.ni').forEach(e=>e.classList.remove('active'));
  event.target?.classList.add('active');
  const titles={dashboard:'Dashboard',transazioni:'Transazioni',report:'Report',ricorrenti:'Ricorrenti'};
  const subs={dashboard:'Panoramica',transazioni:`${tx.length} movimenti`,report:'Analisi spese',ricorrenti:`${rec.length} ricorrenti`};
  document.getElementById('page-title').textContent=titles[p];
  document.getElementById('page-sub').textContent=subs[p];
  renderPage(p);
}

function openModal(m){document.getElementById('modal-'+m).classList.add('active');}
function closeModal(m){document.getElementById('modal-'+m).classList.remove('active');}
function notify(msg){const n=document.getElementById('notif');n.textContent=msg;n.style.display='block';clearTimeout(n._t);n._t=setTimeout(()=>n.style.display='none',2500);}
function fmt(v){return'€'+parseFloat(v||0).toFixed(2);}
function fmtDate(d){return new Date(d).toLocaleDateString('it-IT');}
function catName(id){return CATS.find(c=>c.id===id)?.name||'📦 Altro';}
function catIco(id){return CATS.find(c=>c.id===id)?.ico||'📦';}

function saveTx(){
  const desc=document.getElementById('tx-desc').value.trim();
  const amt=parseFloat(document.getElementById('tx-amt').value);
  const type=document.getElementById('tx-type').value;
  const cat=document.getElementById('tx-cat').value;
  if(!desc||!amt||amt<=0){notify('❌ Compila tutti i campi');return;}
  tx.push({id:Date.now(),desc,amount:amt,type,cat,date:new Date().toISOString().split('T')[0]});
  saveData();
  closeModal('tx');
  document.getElementById('tx-desc').value='';
  document.getElementById('tx-amt').value='';
  notify('✅ Transazione aggiunta!');
  goPage(page);
}

function saveRec(){
  const name=document.getElementById('rec-name').value.trim();
  const amt=parseFloat(document.getElementById('rec-amt').value);
  const freq=document.getElementById('rec-freq').value;
  const date=document.getElementById('rec-date').value;
  if(!name||!amt||!date){notify('❌ Compila tutti i campi');return;}
  rec.push({id:Date.now(),name,amount:amt,freq,nextDate:date,status:'active'});
  saveData();
  closeModal('rec');
  notify('✅ Ricorrente aggiunta!');
  goPage(page);
}

function delTx(id){tx=tx.filter(t=>t.id!==id);saveData();notify('🗑️ Eliminata');goPage(page);}
function delRec(id){rec=rec.filter(r=>r.id!==id);saveData();notify('🗑️ Eliminata');goPage(page);}

function renderPage(p){
  const con=document.getElementById('content');
  const bal=tx.reduce((s,t)=>s+(t.type==='income'?t.amount:-t.amount),0);
  const inc=tx.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const exp=tx.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);

  if(p==='dashboard'){
    con.innerHTML=`
    <div class="stat-grid">
      <div class="stat"><div class="stat-lbl">Saldo</div><div class="stat-val" style="color:${bal>=0?'var(--gr)':'var(--re)'}">${fmt(bal)}</div></div>
      <div class="stat"><div class="stat-lbl">Entrate</div><div class="stat-val" style="color:var(--gr)">${fmt(inc)}</div></div>
      <div class="stat"><div class="stat-lbl">Uscite</div><div class="stat-val" style="color:var(--re)">${fmt(exp)}</div></div>
    </div>
    <div class="card">
      <div class="card-head">
        <div class="card-title"><div class="card-ico">🕐</div>Ultimi Movimenti</div>
        <button class="btn-add" onclick="openModal('tx')">➕</button>
      </div>
      ${tx.length===0?'<div class="empty"><div class="empty-ico">💸</div><div class="empty-txt">Nessuna transazione</div></div>':
      [...tx].reverse().slice(0,5).map(t=>`
      <div class="ir">
        <div class="ir-ico">${catIco(t.cat)}</div>
        <div class="ir-info">
          <div class="ir-name">${t.desc}</div>
          <div class="ir-cat">${fmtDate(t.date)} • ${catName(t.cat)}</div>
        </div>
        <div class="ir-amt" style="color:${t.type==='income'?'var(--gr)':'var(--re)'}">${t.type==='income'?'+':'-'}${fmt(t.amount)}</div>
        <button class="ir-del" onclick="delTx(${t.id})">✕</button>
      </div>`).join('')}
    </div>`;
  }
  else if(p==='transazioni'){
    con.innerHTML=`
    <div class="card">
      <div class="card-head">
        <div class="card-title"><div class="card-ico">💸</div>Transazioni (${tx.length})</div>
        <button class="btn-add" onclick="openModal('tx')">➕</button>
      </div>
      ${tx.length===0?'<div class="empty"><div class="empty-ico">💸</div><div class="empty-txt">Nessuna transazione</div></div>':
      [...tx].reverse().map(t=>`
      <div class="ir">
        <div class="ir-ico">${catIco(t.cat)}</div>
        <div class="ir-info">
          <div class="ir-name">${t.desc}</div>
          <div class="ir-cat">${fmtDate(t.date)} • ${catName(t.cat)}</div>
        </div>
        <div class="ir-amt" style="color:${t.type==='income'?'var(--gr)':'var(--re)'}">${t.type==='income'?'+':'-'}${fmt(t.amount)}</div>
        <button class="ir-del" onclick="delTx(${t.id})">✕</button>
      </div>`).join('')}
    </div>`;
  }
  else if(p==='report'){
    const byCat={};
    tx.filter(t=>t.type==='expense').forEach(t=>{const c=t.cat||'other';byCat[c]=(byCat[c]||0)+t.amount;});
    const sorted=Object.entries(byCat).sort((a,b)=>b[1]-a[1]);
    const maxC=sorted[0]?sorted[0][1]:1;
    con.innerHTML=`<div class="card"><div class="card-head"><div class="card-title"><div class="card-ico">📊</div>Spese per Categoria</div></div>${sorted.length===0?'<div class="empty"><div class="empty-ico">📊</div></div>':sorted.map(([cid,val])=>{const cat=CATS.find(c=>c.id===cid);const pct=Math.round(val/maxC*100);return `<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:4px"><span>${cat?.name}</span><strong>${fmt(val)}</strong></div><div style="height:6px;background:var(--s1);border-radius:3px;overflow:hidden"><div style="height:100%;width:${pct}%;background:linear-gradient(90deg,var(--ac),var(--ac2))"></div></div></div>`;}).join('')}</div>`;
  }
  else if(p==='ricorrenti'){
    con.innerHTML=`<div class="card"><div class="card-head"><div class="card-title"><div class="card-ico">🔄</div>Ricorrenti (${rec.length})</div><button class="btn-add" onclick="openModal('rec')">➕</button></div>${rec.length===0?'<div class="empty"><div class="empty-ico">🔄</div></div>':rec.map(r=>`<div class="ir"><div class="ir-ico">🔄</div><div class="ir-info"><div class="ir-name">${r.name}</div><div class="ir-cat">📅 ${r.nextDate} • ${r.freq}</div></div><div class="ir-amt" style="color:var(--re)">${fmt(r.amount)}</div><button class="ir-del" onclick="delRec(${r.id})">✕</button></div>`).join('')}</div>`;
  }
}
</script>

</body>
</html>
