<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kazka File Cleaner</title>
<style>
  :root {
    --bg: #070b18; --bg2: #0d1225; --bg3: #111827;
    --b1: rgba(255,255,255,.07); --b2: rgba(255,255,255,.12);
    --ac: #6c63ff; --ac2: #00d4ff;
    --gr: #00e5a0; --re: #ff4f6d; --ye: #ffcc44;
    --tx: #f0f4ff; --tx2: #8892b0; --tx3: #4a5568;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Segoe UI',system-ui,sans-serif; background:var(--bg); color:var(--tx); min-height:100vh; }

  /* ── HEADER ── */
  .header { padding:28px 32px 20px; border-bottom:1px solid var(--b1); display:flex; align-items:center; gap:14px; }
  .logo { width:42px; height:42px; border-radius:12px; background:linear-gradient(135deg,var(--ac),var(--ac2)); display:flex; align-items:center; justify-content:center; font-size:20px; flex-shrink:0; }
  .header h1 { font-size:20px; font-weight:800; }
  .header p { font-size:12px; color:var(--tx2); margin-top:2px; }

  /* ── MAIN ── */
  .main { max-width:900px; margin:0 auto; padding:28px 24px; }

  /* ── DROP ZONE ── */
  .drop-zone { border:2px dashed rgba(108,99,255,.35); border-radius:16px; padding:48px 24px; text-align:center; cursor:pointer; transition:all .25s; background:rgba(108,99,255,.04); margin-bottom:28px; }
  .drop-zone:hover, .drop-zone.drag { border-color:var(--ac); background:rgba(108,99,255,.08); }
  .drop-zone .dz-ico { font-size:40px; margin-bottom:12px; }
  .drop-zone h2 { font-size:16px; font-weight:700; margin-bottom:6px; }
  .drop-zone p { font-size:12px; color:var(--tx2); }
  .drop-zone input { display:none; }
  .btn-pick { display:inline-flex; align-items:center; gap:6px; margin-top:16px; padding:10px 20px; border-radius:10px; background:linear-gradient(135deg,var(--ac),var(--ac2)); color:#fff; font-size:13px; font-weight:700; cursor:pointer; border:none; transition:all .2s; }
  .btn-pick:hover { opacity:.88; transform:translateY(-1px); }

  /* ── STATS BAR ── */
  .stats-bar { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin-bottom:24px; }
  .stat-card { background:var(--bg2); border:1px solid var(--b1); border-radius:12px; padding:14px 16px; }
  .stat-card .val { font-size:22px; font-weight:800; letter-spacing:-.5px; }
  .stat-card .lbl { font-size:11px; color:var(--tx2); margin-top:3px; text-transform:uppercase; letter-spacing:.4px; }
  .stat-card.danger .val { color:var(--re); }
  .stat-card.safe .val { color:var(--gr); }
  .stat-card.warn .val { color:var(--ye); }

  /* ── SECTION ── */
  .section { margin-bottom:20px; }
  .section-head { display:flex; align-items:center; gap:10px; margin-bottom:10px; padding:10px 14px; border-radius:10px; cursor:pointer; user-select:none; background:var(--bg2); border:1px solid var(--b1); transition:border-color .2s; }
  .section-head:hover { border-color:var(--b2); }
  .section-head .sh-ico { font-size:16px; }
  .section-head .sh-title { font-size:13px; font-weight:700; flex:1; }
  .section-head .sh-count { font-size:11px; font-weight:700; padding:3px 9px; border-radius:20px; }
  .sh-count.red { background:rgba(255,79,109,.12); color:var(--re); border:1px solid rgba(255,79,109,.2); }
  .sh-count.green { background:rgba(0,229,160,.1); color:var(--gr); border:1px solid rgba(0,229,160,.2); }
  .sh-count.yellow { background:rgba(255,204,68,.1); color:var(--ye); border:1px solid rgba(255,204,68,.2); }
  .sh-count.gray { background:rgba(255,255,255,.06); color:var(--tx2); border:1px solid var(--b1); }
  .section-head .chevron { font-size:11px; color:var(--tx3); transition:transform .2s; }
  .section-head.open .chevron { transform:rotate(90deg); }
  .section-body { display:none; }
  .section-body.open { display:block; }

  /* ── FILE ROW ── */
  .file-row { display:flex; align-items:center; gap:10px; padding:9px 14px; border-radius:9px; margin-bottom:4px; border:1px solid var(--b1); background:var(--bg3); transition:all .15s; }
  .file-row:hover { border-color:var(--b2); }
  .file-row.selected { background:rgba(255,79,109,.06); border-color:rgba(255,79,109,.25); }
  .file-row input[type=checkbox] { width:16px; height:16px; accent-color:var(--re); cursor:pointer; flex-shrink:0; }
  .file-ico { font-size:15px; flex-shrink:0; width:22px; text-align:center; }
  .file-name { flex:1; font-size:13px; font-weight:600; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-family:'Courier New',monospace; }
  .file-path { font-size:10px; color:var(--tx3); margin-top:1px; }
  .file-reason { font-size:10px; color:var(--tx2); margin-left:auto; padding:2px 8px; border-radius:6px; background:rgba(255,255,255,.05); border:1px solid var(--b1); white-space:nowrap; flex-shrink:0; }
  .file-size { font-size:10px; color:var(--tx3); min-width:48px; text-align:right; flex-shrink:0; }

  /* ── ACTIONS BAR ── */
  .actions { position:sticky; bottom:0; background:rgba(7,11,24,.97); border-top:1px solid var(--b1); padding:16px 24px; display:flex; align-items:center; gap:12px; backdrop-filter:blur(20px); display:none; }
  .actions.visible { display:flex; }
  .actions .sel-info { flex:1; font-size:13px; color:var(--tx2); }
  .actions .sel-info strong { color:var(--re); }
  .btn-del { padding:10px 22px; border-radius:10px; background:linear-gradient(135deg,var(--re),#c0392b); color:#fff; font-size:13px; font-weight:700; cursor:pointer; border:none; transition:all .2s; }
  .btn-del:hover { opacity:.88; transform:translateY(-1px); }
  .btn-del:disabled { opacity:.4; cursor:not-allowed; transform:none; }
  .btn-selall { padding:10px 16px; border-radius:10px; background:var(--bg2); border:1px solid var(--b1); color:var(--tx2); font-size:12px; font-weight:700; cursor:pointer; transition:all .2s; }
  .btn-selall:hover { background:var(--bg3); color:var(--tx); }

  /* ── LOG ── */
  .log { background:var(--bg2); border:1px solid var(--b1); border-radius:12px; padding:14px; margin-top:16px; font-size:11px; font-family:'Courier New',monospace; color:var(--tx2); max-height:160px; overflow-y:auto; display:none; }
  .log.visible { display:block; }
  .log .log-ok { color:var(--gr); }
  .log .log-err { color:var(--re); }
  .log .log-info { color:var(--ac2); }

  /* ── EMPTY STATE ── */
  .empty { text-align:center; padding:40px; color:var(--tx3); font-size:13px; }

  @media (max-width:600px) {
    .stats-bar { grid-template-columns:1fr 1fr; }
    .main { padding:16px; }
    .header { padding:20px 16px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="logo">🧹</div>
  <div>
    <h1>Kazka File Cleaner</h1>
    <p>Analizza la tua cartella di progetto e rimuovi i file inutili</p>
  </div>
</div>

<div class="main">

  <div class="drop-zone" id="dropZone">
    <div class="dz-ico">📁</div>
    <h2>Seleziona la cartella del progetto</h2>
    <p>Scegli la root del tuo progetto Kazka (o qualsiasi altro progetto web)</p>
    <label class="btn-pick">
      📂 Apri Cartella
      <input type="file" id="folderInput" webkitdirectory multiple accept="">
    </label>
  </div>

  <div id="results" style="display:none">
    <div class="stats-bar" id="statsBar"></div>
    <div id="sections"></div>
    <div class="log" id="log"></div>
  </div>

</div>

<div class="actions" id="actionsBar">
  <div class="sel-info" id="selInfo">0 file selezionati</div>
  <button class="btn-selall" onclick="selectAllDeletable()">Seleziona tutti</button>
  <button class="btn-del" id="deleteBtn" onclick="deleteSelected()" disabled>🗑️ Elimina selezionati</button>
</div>

<script>
// ─── FILE CLASSIFICATION ENGINE ───────────────────────────────────────────
const RULES = {
  // SAFE TO DELETE: docs/notes that are project-internal dev notes
  devDocs: {
    label: 'Documentazione sviluppo',
    icon: '📝',
    color: 'red',
    desc: 'File di note, audit e documentazione interna non necessari in produzione',
    patterns: [
      /^AUDIT.*\.txt$/i, /^REPORT.*\.txt$/i, /^FEATURES.*\.txt$/i,
      /^FINAL.*\.txt$/i, /^README.*VERSIONE.*\.txt$/i, /^README-VERSIONE.*\.txt$/i,
      /^CHANGELOG\.md$/i, /^SETUP.*\.md$/i, /^README_V\d/i,
      /^README_DEPLOY/i, /^SETUP_V/i
    ]
  },
  // SAFE TO DELETE: staging/draft/backup HTML files
  stagingFiles: {
    label: 'File staging e backup',
    icon: '🗑️',
    color: 'red',
    desc: 'Versioni draft, staging e backup di file HTML/JS',
    patterns: [
      /.*staging.*/i, /.*backup.*/i, /.*-old\./i, /.*\.bak$/i,
      /index-backup/i, /index-new/i, /.*migrate.*/i, /.*_migrate/i
    ]
  },
  // ORPHANED: modules/*.js files if app.html doesn't import them
  orphanModules: {
    label: 'Moduli JS orfani',
    icon: '🔌',
    color: 'yellow',
    desc: 'File JS nella cartella modules/ non importati da nessun file HTML principale',
    dynamic: true // resolved at scan time
  },
  // DUPLICATE: same filename in root and subfolder
  duplicates: {
    label: 'File duplicati',
    icon: '👯',
    color: 'yellow',
    desc: 'File con lo stesso nome in root e in sottocartelle',
    dynamic: true
  },
  // SAFE: keep these
  keep: {
    label: 'File da mantenere',
    icon: '✅',
    color: 'green',
    desc: 'File essenziali per il funzionamento dell\'app'
  }
};

// Which extensions are "code" files (always analyze)
const CODE_EXTS = new Set(['.html','.js','.css','.json','.md','.txt','.svg','.xml']);
const BINARY_EXTS = new Set(['.png','.jpg','.jpeg','.gif','.webp','.ico','.woff','.woff2','.ttf','.pdf']);

let allFiles = [];       // {file, path, name, ext, size, category, reason}
let fileHandles = {};    // path → FileSystemFileHandle (for deletion)

// ─── SCAN ────────────────────────────────────────────────────────────────
async function scanFiles(fileList) {
  allFiles = [];
  const byName = {}; // name → [paths]
  const rootHtmlContent = {}; // path → text content (for import analysis)

  // 1. Collect all files
  for (const file of fileList) {
    const path = file.webkitRelativePath || file.name;
    const parts = path.split('/');
    const name = parts[parts.length - 1];
    const ext = name.includes('.') ? '.' + name.split('.').pop().toLowerCase() : '';
    
    allFiles.push({ file, path, name, ext, size: file.size, category: null, reason: '' });
    
    if (!byName[name]) byName[name] = [];
    byName[name].push(path);
  }

  // 2. Read HTML/JS content for import analysis
  const htmlFiles = allFiles.filter(f => f.ext === '.html' || f.ext === '.js');
  for (const f of htmlFiles) {
    try {
      f._text = await f.file.text();
    } catch(e) { f._text = ''; }
  }

  // 3. Find root entry points (depth=1 HTML files)
  const rootHtmls = allFiles.filter(f => f.ext === '.html' && f.path.split('/').length === 2);
  const rootContent = rootHtmls.map(f => f._text || '').join('\n');

  // 4. Find all imported/referenced files from root HTML
  const referencedFiles = new Set();
  referencedFiles.add('index.html');
  referencedFiles.add('app.html');
  referencedFiles.add('manifest.json');
  referencedFiles.add('sw.js');
  referencedFiles.add('firebase-config.js');
  referencedFiles.add('database.rules.json');

  // Extract all src/href references from root HTML
  const srcMatches = rootContent.matchAll(/(?:src|href|import)[=\s]+["']([^"'#?]+)["']/g);
  for (const m of srcMatches) {
    const ref = m[1].trim();
    if (!ref.startsWith('http') && !ref.startsWith('//') && !ref.startsWith('data:')) {
      referencedFiles.add(ref.split('/').pop()); // just filename
    }
  }

  // 5. Classify each file
  for (const f of allFiles) {
    const depth = f.path.split('/').length - 1; // 1=root, 2=subfolder, etc.

    // ── Dev docs ──
    if (RULES.devDocs.patterns.some(p => p.test(f.name))) {
      f.category = 'devDocs'; f.reason = 'Documentazione di sviluppo'; continue;
    }

    // ── Staging/backup ──
    if (RULES.stagingFiles.patterns.some(p => p.test(f.name) || p.test(f.path))) {
      f.category = 'stagingFiles'; f.reason = 'File staging/backup'; continue;
    }

    // ── Duplicate: same name in root AND in subfolder ──
    if (byName[f.name] && byName[f.name].length > 1) {
      // Keep the root version, mark subfolder copies as duplicate
      const rootVersion = byName[f.name].find(p => p.split('/').length === 2);
      if (rootVersion && f.path !== rootVersion) {
        f.category = 'duplicates';
        f.reason = `Duplicato di ${rootVersion}`;
        continue;
      }
    }

    // ── Orphan modules: JS/CSS in modules/ not referenced ──
    if (f.path.includes('/modules/') && (f.ext === '.js' || f.ext === '.css')) {
      const isRef = referencedFiles.has(f.name) || rootContent.includes(f.name);
      if (!isRef) {
        f.category = 'orphanModules';
        f.reason = 'Non importato da nessun file HTML root';
        continue;
      }
    }

    // ── SVG assets in modules/ ──
    if (f.path.includes('/modules/') && f.ext === '.svg') {
      const isRef = rootContent.includes(f.name) || rootContent.includes(f.path.split('/').slice(1).join('/'));
      if (!isRef) {
        f.category = 'orphanModules';
        f.reason = 'SVG non referenziato nel codice';
        continue;
      }
    }

    // ── Keep everything else ──
    f.category = 'keep';
    f.reason = '';
  }
}

// ─── RENDER ──────────────────────────────────────────────────────────────
function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024*1024) return (bytes/1024).toFixed(1) + ' KB';
  return (bytes/1024/1024).toFixed(1) + ' MB';
}

function getIcon(ext) {
  const map = {'.html':'🌐','.js':'⚙️','.css':'🎨','.json':'📋','.md':'📝','.txt':'📄','.png':'🖼️','.jpg':'🖼️','.svg':'🎭','.ico':'🔷'};
  return map[ext] || '📄';
}

function render() {
  const deletable = allFiles.filter(f => f.category !== 'keep');
  const toDelete = allFiles.filter(f => ['devDocs','stagingFiles','duplicates','orphanModules'].includes(f.category));
  const kept = allFiles.filter(f => f.category === 'keep');
  const totalSize = deletable.reduce((s,f) => s + f.size, 0);

  // Stats
  document.getElementById('statsBar').innerHTML = `
    <div class="stat-card danger"><div class="val">${toDelete.length}</div><div class="lbl">Da eliminare</div></div>
    <div class="stat-card warn"><div class="val">${formatSize(totalSize)}</div><div class="lbl">Spazio liberabile</div></div>
    <div class="stat-card safe"><div class="val">${kept.length}</div><div class="lbl">File essenziali</div></div>
    <div class="stat-card"><div class="val">${allFiles.length}</div><div class="lbl">Totale scansionati</div></div>
  `;

  // Group by category
  const groups = {
    devDocs: { ...RULES.devDocs, files: [] },
    stagingFiles: { ...RULES.stagingFiles, files: [] },
    duplicates: { ...RULES.duplicates, files: [] },
    orphanModules: { ...RULES.orphanModules, files: [] },
    keep: { ...RULES.keep, files: [] }
  };

  for (const f of allFiles) groups[f.category]?.files.push(f);

  let html = '';
  for (const [key, group] of Object.entries(groups)) {
    if (group.files.length === 0) continue;
    const isDeletable = key !== 'keep';
    const countClass = key === 'keep' ? 'green' : (key === 'orphanModules' || key === 'duplicates') ? 'yellow' : 'red';
    
    html += `
    <div class="section">
      <div class="section-head" onclick="toggleSection(this)">
        <span class="sh-ico">${group.icon}</span>
        <span class="sh-title">${group.label}</span>
        <span class="sh-count ${countClass}">${group.files.length} file</span>
        <span class="chevron">▶</span>
      </div>
      <div class="section-body">
        ${group.desc ? `<p style="font-size:11px;color:var(--tx3);margin:0 4px 10px;padding:8px 12px;background:rgba(255,255,255,.03);border-radius:8px;border-left:3px solid ${countClass==='red'?'var(--re)':countClass==='yellow'?'var(--ye)':'var(--gr)'}">${group.desc}</p>` : ''}
        ${group.files.map(f => `
        <div class="file-row" id="row-${CSS.escape(f.path)}">
          ${isDeletable ? `<input type="checkbox" data-path="${f.path}" onchange="onCheck(this)">` : '<span style="width:16px;flex-shrink:0"></span>'}
          <span class="file-ico">${getIcon(f.ext)}</span>
          <div style="flex:1;min-width:0">
            <div class="file-name">${f.name}</div>
            <div class="file-path">${f.path.split('/').slice(1,-1).join('/') || 'root'}</div>
          </div>
          ${f.reason ? `<span class="file-reason">${f.reason}</span>` : ''}
          <span class="file-size">${formatSize(f.size)}</span>
        </div>`).join('')}
      </div>
    </div>`;
  }

  document.getElementById('sections').innerHTML = html;
  document.getElementById('results').style.display = 'block';

  // Auto-open deletable sections
  document.querySelectorAll('.section-head').forEach(h => {
    const body = h.nextElementSibling;
    const count = h.querySelector('.sh-count');
    if (count && !count.classList.contains('green')) {
      h.classList.add('open');
      body.classList.add('open');
    }
  });

  updateActionsBar();
}

function toggleSection(head) {
  head.classList.toggle('open');
  head.nextElementSibling.classList.toggle('open');
}

// ─── SELECTION ───────────────────────────────────────────────────────────
function onCheck(cb) {
  const row = cb.closest('.file-row');
  row.classList.toggle('selected', cb.checked);
  updateActionsBar();
}

function updateActionsBar() {
  const checked = document.querySelectorAll('input[type=checkbox]:checked');
  const bar = document.getElementById('actionsBar');
  const btn = document.getElementById('deleteBtn');
  const info = document.getElementById('selInfo');
  
  if (checked.length > 0) {
    bar.classList.add('visible');
    const totalSz = [...checked].reduce((s, cb) => {
      const f = allFiles.find(f => f.path === cb.dataset.path);
      return s + (f ? f.size : 0);
    }, 0);
    info.innerHTML = `<strong>${checked.length}</strong> file selezionati · ${formatSize(totalSz)} da liberare`;
    btn.disabled = false;
  } else {
    bar.classList.remove('visible');
    btn.disabled = true;
  }
}

function selectAllDeletable() {
  const cbs = document.querySelectorAll('input[type=checkbox]');
  const anyUnchecked = [...cbs].some(cb => !cb.checked);
  cbs.forEach(cb => {
    cb.checked = anyUnchecked;
    cb.closest('.file-row').classList.toggle('selected', anyUnchecked);
  });
  updateActionsBar();
}

// ─── DELETE ──────────────────────────────────────────────────────────────
async function deleteSelected() {
  const checked = [...document.querySelectorAll('input[type=checkbox]:checked')];
  if (checked.length === 0) return;

  const confirmed = confirm(`Eliminare ${checked.length} file?\n\nQuesta operazione è IRREVERSIBILE.\nAssicurati di avere un backup!`);
  if (!confirmed) return;

  const log = document.getElementById('log');
  log.innerHTML = '';
  log.classList.add('visible');

  let ok = 0, fail = 0;

  for (const cb of checked) {
    const path = cb.dataset.path;
    const handle = fileHandles[path];
    
    if (!handle) {
      log.innerHTML += `<div class="log-err">✗ ${path} — handle non trovato (ricarica la cartella)</div>`;
      fail++;
      continue;
    }

    try {
      // Get parent directory handle and remove file
      await handle.remove();
      log.innerHTML += `<div class="log-ok">✓ Eliminato: ${path}</div>`;
      
      // Remove from UI
      const row = document.getElementById('row-' + CSS.escape(path));
      if (row) row.remove();
      
      // Remove from allFiles
      const idx = allFiles.findIndex(f => f.path === path);
      if (idx !== -1) allFiles.splice(idx, 1);
      
      ok++;
    } catch (e) {
      log.innerHTML += `<div class="log-err">✗ ${path} — ${e.message}</div>`;
      fail++;
    }
  }

  log.innerHTML += `<div class="log-info">─── ${ok} eliminati, ${fail} errori ───</div>`;
  log.scrollTop = log.scrollHeight;

  // Re-render stats
  render();
  updateActionsBar();
}

// ─── FILE INPUT ───────────────────────────────────────────────────────────
async function handleFiles(fileList) {
  document.getElementById('dropZone').style.display = 'none';
  document.getElementById('results').style.display = 'none';
  document.getElementById('sections').innerHTML = '<div class="empty">⏳ Analisi in corso...</div>';
  document.getElementById('results').style.display = 'block';

  // Try to get FileSystem Access API handles for deletion capability
  const canDelete = 'showDirectoryPicker' in window;
  
  if (!canDelete) {
    // Fallback: analyze only, can't delete
    await scanFiles(fileList);
    render();
    // Add warning
    const log = document.getElementById('log');
    log.innerHTML = '<div class="log-err">⚠️ Il tuo browser non supporta la cancellazione diretta. Usa Chrome/Edge e ricarica scegliendo la cartella con "Apri Cartella".</div>';
    log.classList.add('visible');
    return;
  }

  await scanFiles(fileList);

  // Map handles for deletion (requires directory picker)
  // Note: when using <input webkitdirectory>, we can't delete directly.
  // Show a note to use the directory picker instead.
  for (const f of allFiles) {
    fileHandles[f.path] = null; // placeholder
  }

  render();

  // Check if we have real handles
  const hasHandles = Object.values(fileHandles).some(h => h !== null);
  if (!hasHandles) {
    const log = document.getElementById('log');
    log.innerHTML = `<div class="log-info">ℹ️ Analisi completata. Per eliminare i file: clicca "🗂️ Seleziona con Permessi" qui sotto per ottenere accesso diretto alla cartella.</div>`;
    log.classList.add('visible');

    // Add picker button
    const btn = document.createElement('button');
    btn.className = 'btn-pick';
    btn.style.cssText = 'margin:12px auto;display:flex;';
    btn.innerHTML = '🗂️ Seleziona con Permessi (per eliminare)';
    btn.onclick = pickDirectoryForDeletion;
    document.getElementById('log').after(btn);
  }
}

async function pickDirectoryForDeletion() {
  try {
    const dirHandle = await window.showDirectoryPicker({ mode: 'readwrite' });
    await mapHandlesRecursive(dirHandle, dirHandle.name);
    
    const log = document.getElementById('log');
    log.innerHTML = `<div class="log-ok">✓ Accesso concesso a "${dirHandle.name}". Ora puoi eliminare i file selezionati.</div>`;
    log.classList.add('visible');
    
    // Remove the pick button
    document.querySelectorAll('.btn-pick').forEach(b => { if (b.textContent.includes('Permessi')) b.remove(); });
    
    updateActionsBar();
  } catch(e) {
    if (e.name !== 'AbortError') alert('Errore accesso cartella: ' + e.message);
  }
}

async function mapHandlesRecursive(dirHandle, currentPath) {
  for await (const [name, handle] of dirHandle.entries()) {
    const fullPath = currentPath + '/' + name;
    if (handle.kind === 'file') {
      fileHandles[fullPath] = handle;
      // Also try to match by relative path
      const relPath = fullPath;
      const f = allFiles.find(f => f.path.endsWith('/' + name) || f.path === fullPath);
      if (f) fileHandles[f.path] = handle;
    } else if (handle.kind === 'directory') {
      await mapHandlesRecursive(handle, fullPath);
    }
  }
}

// ─── EVENTS ──────────────────────────────────────────────────────────────
document.getElementById('folderInput').addEventListener('change', function(e) {
  if (this.files.length > 0) handleFiles(this.files);
});

const dz = document.getElementById('dropZone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag'));
dz.addEventListener('drop', e => {
  e.preventDefault();
  dz.classList.remove('drag');
  if (e.dataTransfer.files.length > 0) handleFiles(e.dataTransfer.files);
});
</script>
