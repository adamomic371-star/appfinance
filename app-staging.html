<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#070b18">
<title>Kazka – Staging</title>
<link rel="manifest" href="manifest.json">
<style>
:root {
  --bg: #070b18;
  --bg2: #0d1225;
  --ac: #6c63ff;
  --ac2: #00d4ff;
  --gr: #00e5a0;
  --re: #ff4f6d;
  --tx: #f0f4ff;
  --tx2: #8892b0;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; background: var(--bg); color: var(--tx); font-family: system-ui, sans-serif; }

#stagingBanner {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  background: linear-gradient(90deg, #ff6b6b, #ffa500);
  color: #fff;
  padding: 12px;
  text-align: center;
  font-weight: 800;
  font-size: 12px;
  z-index: 10000;
  box-shadow: 0 4px 12px rgba(255,107,107,.4);
}

#splash {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg);
  z-index: 9999;
  flex-direction: column;
  gap: 20px;
}

#splash.hide { display: none; }

.splash-logo {
  font-size: 100px;
  animation: pulse 1.5s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.6; transform: scale(1.1); }
}

#app {
  display: flex;
  height: 100vh;
  flex-direction: column;
  padding-top: 50px;
}

.topbar {
  background: var(--bg2);
  border-bottom: 1px solid rgba(255,255,255,.1);
  padding: 12px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  height: 56px;
}

.sidebar {
  width: 200px;
  background: var(--bg2);
  border-right: 1px solid rgba(255,255,255,.1);
  padding: 12px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.nav-btn {
  padding: 10px;
  background: none;
  border: none;
  color: var(--tx2);
  text-align: left;
  cursor: pointer;
  border-radius: 8px;
  font-size: 12px;
  font-weight: 500;
  transition: all .2s;
}

.nav-btn:hover {
  background: rgba(255,255,255,.08);
  color: var(--tx);
}

.nav-btn.active {
  background: rgba(108,99,255,.15);
  color: var(--tx);
  font-weight: 700;
}

.main {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
}

.card {
  background: rgba(255,255,255,.04);
  border: 1px solid rgba(255,255,255,.08);
  border-radius: 12px;
  padding: 14px;
  margin-bottom: 12px;
}

.btn {
  padding: 8px 14px;
  background: linear-gradient(135deg, var(--ac), var(--ac2));
  border: none;
  border-radius: 8px;
  color: #fff;
  font-weight: 700;
  cursor: pointer;
  font-size: 11px;
}

.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.7);
  display: none;
  align-items: flex-end;
  z-index: 500;
}

.modal.show { display: flex; }

.modal-sheet {
  background: var(--bg2);
  border-radius: 16px 16px 0 0;
  padding: 16px;
  width: 100%;
  max-height: 85vh;
  overflow-y: auto;
}

.form-group {
  margin-bottom: 10px;
}

.form-label {
  font-size: 9px;
  color: var(--tx2);
  font-weight: 700;
  text-transform: uppercase;
  margin-bottom: 4px;
  display: block;
}

.form-input {
  width: 100%;
  padding: 8px;
  background: rgba(255,255,255,.04);
  border: 1px solid rgba(255,255,255,.08);
  border-radius: 8px;
  color: var(--tx);
  font-size: 11px;
}

.notif {
  position: fixed;
  bottom: 16px;
  right: 16px;
  background: var(--bg2);
  border: 1px solid rgba(255,255,255,.1);
  border-radius: 8px;
  padding: 12px 14px;
  font-size: 10px;
  font-weight: 600;
  z-index: 999;
}

#stagingNote {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: linear-gradient(135deg, rgba(255,107,107,.95), rgba(255,165,0,.95));
  border: 2px solid #ff6b6b;
  border-radius: 12px;
  padding: 14px 16px;
  font-size: 11px;
  color: #fff;
  max-width: 220px;
  z-index: 998;
  font-weight: 600;
  box-shadow: 0 4px 12px rgba(255,107,107,.3);
  line-height: 1.5;
}
</style>
</head>
<body>

<div id="stagingBanner">🧪 STAGING ENVIRONMENT - Testa qui prima del deploy!</div>

<div id="splash">
  <div class="splash-logo">💰</div>
  <div style="font-size:20px;font-weight:800">Kazka Staging</div>
</div>

<div id="app" style="display:none">
  <div class="topbar">
    <h1 id="pageTitle">📊 Dashboard</h1>
    <button class="btn" onclick="manualSync()" style="font-size:10px">🔄 Sync</button>
  </div>

  <div style="display:flex;flex:1;overflow:hidden">
    <div class="sidebar">
      <button class="nav-btn active" onclick="goPage('dashboard')">📊 Dashboard</button>
      <button class="nav-btn" onclick="goPage('transazioni')">💸 Transazioni</button>
      <button class="nav-btn" onclick="goPage('ricorrenti')">🔄 Ricorrenti</button>
      <button class="nav-btn" onclick="goPage('obiettivi')">🎯 Obiettivi</button>
      <button class="nav-btn" onclick="goPage('report')">📈 Report</button>
    </div>

    <div class="main" id="content"></div>
  </div>
</div>

<!-- MODAL TRANSAZIONE -->
<div class="modal" id="modalTx">
  <div class="modal-sheet">
    <h2 style="margin-bottom:12px">💸 Transazione</h2>
    <div class="form-group">
      <label class="form-label">Descrizione</label>
      <input type="text" id="txDesc" class="form-input">
    </div>
    <div class="form-group">
      <label class="form-label">Importo</label>
      <input type="number" id="txAmt" class="form-input" step="0.01">
    </div>
    <div class="form-group">
      <label class="form-label">Tipo</label>
      <select id="txType" class="form-input">
        <option value="expense">Uscita</option>
        <option value="income">Entrata</option>
      </select>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn" style="flex:1" onclick="saveTx()">Salva</button>
      <button style="flex:1;padding:8px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.08);border-radius:8px;color:var(--tx);cursor:pointer" onclick="closeModal('Tx')">Annulla</button>
    </div>
  </div>
</div>

<div id="stagingNote">
  <strong>⚠️ STAGING</strong><br>
  Dati separati dalla prod<br>
  Testa tranquillamente!
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<script>
"use strict";

// ===== GLOBALS =====
let db = null;
let user = null;
let currentPage = "dashboard";
let tx = [];
let recurring = [];
let goals = [];
let groups = [];
let quotes = [];
let profile = {};
let notifications = [];
let isSyncing = false;
let syncTimer = null;
let notifSettings = {};

// ===== FIREBASE CONFIG =====
const FB = {
  apiKey: "AIzaSyCMPawrAL5tT_bH6YEcNe_UEEyIwLIgHIQ",
  databaseURL: "https://financeapp-556ae-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "financeapp-556ae"
};

// ===== INIT =====
window.addEventListener("load", function() {
  console.log("🧪 STAGING MODE INIZIATO");
  hideSplash();
  initFirebase();
  loadLocal();
});

function hideSplash() {
  setTimeout(function() {
    document.getElementById("splash").classList.add("hide");
    document.getElementById("app").style.display = "flex";
  }, 1500);
}

function initFirebase() {
  if (typeof firebase === "undefined") {
    console.warn("Firebase non disponibile");
    return;
  }

  try {
    if (!firebase.apps.length) {
      firebase.initializeApp(FB);
    }
    
    db = firebase.database();
    
    firebase.auth().onAuthStateChanged(function(u) {
      if (!u) {
        firebase.auth().signInAnonymously();
      } else {
        user = {id: u.uid, email: u.email};
        console.log("✅ Firebase user (STAGING):", user.email);
        loadFromFirebase();
      }
    });
  } catch(e) {
    console.error("Firebase error:", e);
  }
}

// ===== STORAGE =====
function loadLocal() {
  tx = JSON.parse(localStorage.getItem("stg_tx") || "[]");
  recurring = JSON.parse(localStorage.getItem("stg_recurring") || "[]");
  goals = JSON.parse(localStorage.getItem("stg_goals") || "[]");
  groups = JSON.parse(localStorage.getItem("stg_groups") || "[]");
  quotes = JSON.parse(localStorage.getItem("stg_quotes") || "[]");
  profile = JSON.parse(localStorage.getItem("stg_profile") || "{}");
  notifications = JSON.parse(localStorage.getItem("stg_notif") || "[]");
  console.log("📥 Dati locali caricati (STAGING)");
  renderUI();
}

function saveLocal() {
  localStorage.setItem("stg_tx", JSON.stringify(tx));
  localStorage.setItem("stg_recurring", JSON.stringify(recurring));
  localStorage.setItem("stg_goals", JSON.stringify(goals));
  localStorage.setItem("stg_groups", JSON.stringify(groups));
  localStorage.setItem("stg_quotes", JSON.stringify(quotes));
  localStorage.setItem("stg_profile", JSON.stringify(profile));
  localStorage.setItem("stg_notif", JSON.stringify(notifications));
}

// ===== FIREBASE SYNC =====
function loadFromFirebase() {
  if (!db || !user) return;
  const uid = user.id;
  db.ref("staging/" + uid).on("value", function(snap) {
    const data = snap.val();
    if (data) {
      if (data.tx) tx = data.tx;
      if (data.recurring) recurring = data.recurring;
      if (data.goals) goals = data.goals;
      if (data.groups) groups = data.groups;
      if (data.quotes) quotes = data.quotes;
      if (data.profile) profile = data.profile;
      saveLocal();
      renderUI();
      console.log("📥 Caricato da Firebase (STAGING)");
    }
  }, function(err) {
    console.warn("Firebase load error:", err);
  });
}

function syncToFirebase() {
  if (!db || !user || isSyncing) return;
  isSyncing = true;
  const uid = user.id;
  db.ref("staging/" + uid).set({
    tx: tx,
    recurring: recurring,
    goals: goals,
    groups: groups,
    quotes: quotes,
    profile: profile,
    notifications: notifications,
    lastSync: new Date().toISOString()
  }).then(function() {
    console.log("✅ Sincronizzato su Firebase (STAGING)");
    notify("✅ Sincronizzato");
    isSyncing = false;
  }).catch(function(e) {
    console.error("Sync error:", e);
    notify("❌ Errore sync");
    isSyncing = false;
  });
}

function triggerAutoSync() {
  if (syncTimer) clearTimeout(syncTimer);
  syncTimer = setTimeout(function() {
    syncToFirebase();
  }, 2000);
}

function manualSync() {
  notify("🔄 Sincronizzando...");
  syncToFirebase();
}

// ===== UI RENDERING =====
function renderUI() {
  if (currentPage === "dashboard") renderDash();
  else if (currentPage === "transazioni") renderTx();
  else if (currentPage === "ricorrenti") renderRecurring();
  else if (currentPage === "obiettivi") renderGoals();
  else if (currentPage === "report") renderReport();
}

function goPage(p) {
  currentPage = p;
  document.querySelectorAll(".nav-btn").forEach(function(b) {
    b.classList.remove("active");
  });
  event.target.classList.add("active");
  renderUI();
}

function renderDash() {
  const bal = tx.reduce(function(s, t) {
    return s + (t.type === "income" ? t.amt : -t.amt);
  }, 0);
  const inc = tx.filter(t => t.type === "income").reduce((s, t) => s + t.amt, 0);
  const exp = tx.filter(t => t.type === "expense").reduce((s, t) => s + t.amt, 0);

  let html = `
    <div class="card">
      <h3>💰 Saldo: €${bal.toFixed(2)}</h3>
      <p>Entrate: €${inc.toFixed(2)} | Uscite: €${exp.toFixed(2)}</p>
    </div>
    <button class="btn" style="width:100%;" onclick="openModal('Tx')">➕ Aggiungi Transazione</button>
  `;
  document.getElementById("content").innerHTML = html;
}

function renderTx() {
  let html = `<button class="btn" style="width:100%;margin-bottom:12px" onclick="openModal('Tx')">➕ Aggiungi</button>`;
  html += `<div class="card"><h3>💸 Transazioni (${tx.length})</h3>`;
  if (tx.length === 0) {
    html += `<p style="color:var(--tx2);font-size:10px">Nessuna transazione</p>`;
  } else {
    tx.slice().reverse().forEach(function(t) {
      html += `<div style="padding:8px;border-bottom:1px solid rgba(255,255,255,.08)">
        <div style="font-weight:600">${t.desc}</div>
        <div style="font-size:9px;color:var(--tx2)">${t.date} - ${t.type === "income" ? "+" : "-"}€${t.amt.toFixed(2)}</div>
      </div>`;
    });
  }
  html += `</div>`;
  document.getElementById("content").innerHTML = html;
}

function renderRecurring() {
  document.getElementById("content").innerHTML = `<div class="card">🔄 Ricorrenti (${recurring.length})</div>`;
}

function renderGoals() {
  document.getElementById("content").innerHTML = `<div class="card">🎯 Obiettivi (${goals.length})</div>`;
}

function renderReport() {
  document.getElementById("content").innerHTML = `<div class="card">📈 Report</div>`;
}

// ===== TRANSAZIONI =====
function saveTx() {
  const desc = document.getElementById("txDesc").value.trim();
  const amt = parseFloat(document.getElementById("txAmt").value);
  const type = document.getElementById("txType").value;

  if (!desc || !amt) {
    notify("❌ Compila campi");
    return;
  }

  tx.push({
    id: Date.now().toString(),
    desc: desc,
    amt: amt,
    type: type,
    date: new Date().toISOString().split("T")[0]
  });

  saveLocal();
  closeModal("Tx");
  document.getElementById("txDesc").value = "";
  document.getElementById("txAmt").value = "";
  notify("✅ Aggiunta");
  renderUI();
  triggerAutoSync();
}

function delTx(id) {
  if (!confirm("Eliminare?")) return;
  tx = tx.filter(t => t.id !== id);
  saveLocal();
  renderTx();
  triggerAutoSync();
  notify("🗑️ Eliminata");
}

// ===== HELPERS =====
function openModal(name) {
  document.getElementById("modal" + name).classList.add("show");
}

function closeModal(name) {
  document.getElementById("modal" + name).classList.remove("show");
}

function notify(msg) {
  const n = document.createElement("div");
  n.className = "notif";
  n.textContent = msg;
  document.body.appendChild(n);
  setTimeout(function() {
    n.style.opacity = "0";
    setTimeout(function() { n.remove(); }, 300);
  }, 2500);
}

console.log("✅ Staging app con tutte le funzioni caricata");
</script>

</body>
</html>
