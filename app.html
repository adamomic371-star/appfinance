<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#070b18">
<title>Kazka – Smart Finance</title>
<link rel="manifest" href="manifest.json">
<style>
:root {
  --bg: #070b18;
  --bg2: #0d1225;
  --ac: #6c63ff;
  --ac2: #00d4ff;
  --gr: #00e5a0;
  --re: #ff4f6d;
  --tx: #f0f4ff;
  --tx2: #8892b0;
  --tx3: #4a5580;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; background: var(--bg); color: var(--tx); font-family: -apple-system, system-ui, sans-serif; }

/* SPLASH - Logo Loading */
#splash {
  position: fixed;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--bg);
  z-index: 9999;
  flex-direction: column;
  gap: 30px;
}

#splash.hide { display: none; }

.splash-logo {
  font-size: 120px;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.7; transform: scale(1.1); }
}

.splash-text {
  font-size: 24px;
  font-weight: 800;
  background: linear-gradient(135deg, #fff, var(--ac2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

/* APP */
#app {
  display: flex;
  height: 100vh;
  flex-direction: column;
}

.topbar {
  background: var(--bg2);
  border-bottom: 1px solid rgba(255,255,255,.08);
  padding: 12px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  height: 56px;
  flex-shrink: 0;
}

.topbar-title {
  font-size: 18px;
  font-weight: 800;
}

.topbar-actions {
  display: flex;
  gap: 8px;
}

.btn-icon {
  width: 36px;
  height: 36px;
  border: none;
  background: rgba(255,255,255,.08);
  border-radius: 8px;
  color: var(--tx);
  cursor: pointer;
  font-size: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all .2s;
}

.btn-icon:hover {
  background: rgba(255,255,255,.12);
}

.notif-badge {
  position: absolute;
  top: 6px;
  right: 6px;
  background: var(--re);
  color: #fff;
  border-radius: 50%;
  width: 18px;
  height: 18px;
  font-size: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 700;
}

.sidebar {
  width: 240px;
  background: var(--bg2);
  border-right: 1px solid rgba(255,255,255,.08);
  padding: 12px;
  overflow-y: auto;
  flex-shrink: 0;
}

.nav-item {
  display: block;
  width: 100%;
  padding: 10px;
  background: none;
  border: none;
  color: var(--tx2);
  text-align: left;
  cursor: pointer;
  border-radius: 8px;
  margin-bottom: 4px;
  font-size: 12px;
  font-weight: 500;
  transition: all .2s;
}

.nav-item:hover {
  background: rgba(255,255,255,.08);
  color: var(--tx);
}

.nav-item.active {
  background: linear-gradient(135deg, rgba(108,99,255,.2), rgba(0,212,255,.08));
  color: var(--tx);
  font-weight: 700;
}

.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.content {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
}

/* CARD */
.card {
  background: rgba(255,255,255,.04);
  border: 1px solid rgba(255,255,255,.08);
  border-radius: 12px;
  padding: 14px;
  margin-bottom: 12px;
  animation: slideIn .3s ease;
}

@keyframes slideIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

/* BUTTONS */
.btn {
  padding: 8px 14px;
  background: linear-gradient(135deg, var(--ac), var(--ac2));
  border: none;
  border-radius: 8px;
  color: #fff;
  font-weight: 700;
  cursor: pointer;
  font-size: 11px;
  font-family: inherit;
  transition: all .2s;
}

.btn:hover {
  transform: translateY(-1px);
  box-shadow: 0 4px 12px rgba(108,99,255,.3);
}

.btn-sm {
  padding: 6px 10px;
  font-size: 10px;
  background: rgba(255,255,255,.08);
  color: var(--tx);
  border: 1px solid rgba(255,255,255,.08);
}

.btn-danger {
  background: rgba(255,79,109,.1);
  color: var(--re);
  border: 1px solid rgba(255,79,109,.2);
}

/* MODAL */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.7);
  display: none;
  align-items: flex-end;
  z-index: 500;
  animation: bgIn .3s ease;
}

@keyframes bgIn { from { opacity: 0; } to { opacity: 1; } }

.modal.show { display: flex; }

.modal-sheet {
  background: var(--bg2);
  border: 1px solid rgba(255,255,255,.08);
  border-radius: 16px 16px 0 0;
  padding: 16px;
  width: 100%;
  max-height: 85vh;
  overflow-y: auto;
  animation: slideUp .3s ease;
}

@keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

.form-group {
  margin-bottom: 10px;
}

.form-label {
  font-size: 9px;
  color: var(--tx2);
  font-weight: 700;
  text-transform: uppercase;
  margin-bottom: 4px;
  display: block;
}

.form-input {
  width: 100%;
  padding: 8px;
  background: rgba(255,255,255,.04);
  border: 1px solid rgba(255,255,255,.08);
  border-radius: 8px;
  color: var(--tx);
  font-size: 11px;
  font-family: inherit;
}

.form-input:focus {
  outline: none;
  border-color: var(--ac);
  box-shadow: 0 0 0 2px rgba(108,99,255,.2);
}

.form-actions {
  display: flex;
  gap: 8px;
  margin-top: 12px;
}

.btn-save {
  flex: 1;
  padding: 9px;
  background: linear-gradient(135deg, var(--ac), var(--ac2));
  border: none;
  border-radius: 8px;
  color: #fff;
  font-weight: 700;
  font-size: 11px;
  cursor: pointer;
  font-family: inherit;
}

.btn-cancel {
  flex: 1;
  padding: 9px;
  background: rgba(255,255,255,.08);
  border: 1px solid rgba(255,255,255,.08);
  border-radius: 8px;
  color: var(--tx);
  cursor: pointer;
  font-family: inherit;
}

/* NOTIFICHE */
.notif-container {
  position: fixed;
  top: 16px;
  right: 16px;
  z-index: 1000;
  max-width: 300px;
}

.notif {
  background: var(--bg2);
  border: 1px solid rgba(255,255,255,.08);
  border-radius: 8px;
  padding: 12px 14px;
  margin-bottom: 8px;
  font-size: 10px;
  font-weight: 600;
  animation: notifSlide .3s ease;
  display: flex;
  gap: 8px;
  align-items: center;
}

@keyframes notifSlide {
  from { opacity: 0; transform: translateX(20px); }
  to { opacity: 1; transform: translateX(0); }
}

.notif.success { border-left: 3px solid var(--gr); }
.notif.error { border-left: 3px solid var(--re); }
.notif.info { border-left: 3px solid var(--ac2); }
.notif.warning { border-left: 3px solid #ffa500; }

/* LOGO CONTAINER */
.logo-container {
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100px;
  padding: 20px;
  background: rgba(255,255,255,.02);
  border-radius: 12px;
  margin-bottom: 20px;
}

.logo-container img {
  max-width: 200px;
  max-height: 120px;
  width: auto;
  height: auto;
  object-fit: contain;
}

/* STATISTICHE */
.stat-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
  gap: 10px;
  margin-bottom: 16px;
}

.stat {
  background: rgba(255,255,255,.04);
  border: 1px solid rgba(255,255,255,.08);
  border-radius: 10px;
  padding: 12px;
  text-align: center;
  animation: slideIn .3s ease;
}

.stat-label {
  font-size: 9px;
  color: var(--tx2);
  font-weight: 700;
  text-transform: uppercase;
  margin-bottom: 6px;
}

.stat-value {
  font-size: 18px;
  font-weight: 800;
}

/* LISTA ITEM */
.list-item {
  padding: 10px;
  border-bottom: 1px solid rgba(255,255,255,.08);
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 11px;
}

.list-item:last-child { border-bottom: none; }

/* RESPONSIVE */
@media (max-width: 768px) {
  .sidebar { width: 100%; }
  .main { display: none; }
}

@media (max-width: 480px) {
  .topbar { padding: 8px 12px; }
  .content { padding: 12px; }
  .card { padding: 10px; }
  .stat-grid { grid-template-columns: 1fr 1fr; }
}
</style>
</head>
<body>

<!-- SPLASH - Logo Loading Animato -->
<div id="splash">
  <div class="splash-logo">💰</div>
  <div class="splash-text">Kazka</div>
</div>

<!-- APP -->
<div id="app">
  <!-- TOP BAR -->
  <div class="topbar">
    <h1 class="topbar-title" id="pageTitle">📊 Dashboard</h1>
    <div class="topbar-actions">
      <button class="btn-icon" id="notifBtn" onclick="showNotifications()">
        🔔
        <span class="notif-badge" id="notifCount" style="display:none;">0</span>
      </button>
      <button class="btn-icon" onclick="toggleSettings()">⚙️</button>
    </div>
  </div>

  <!-- MAIN LAYOUT -->
  <div style="display:flex;flex:1;overflow:hidden">
    <!-- SIDEBAR -->
    <div class="sidebar">
      <div style="font-weight:800;margin-bottom:16px;font-size:13px">💰 Kazka</div>
      <button class="nav-item active" onclick="goPage('dashboard')">📊 Dashboard</button>
      <button class="nav-item" onclick="goPage('transazioni')">💸 Transazioni</button>
      <button class="nav-item" onclick="goPage('ricorrenti')">🔄 Ricorrenti</button>
      <button class="nav-item" onclick="goPage('obiettivi')">🎯 Obiettivi</button>
      <button class="nav-item" onclick="goPage('report')">📈 Report</button>
      <button class="nav-item" onclick="goPage('gruppi')">👥 Gruppi</button>
      <button class="nav-item" onclick="goPage('preventivi')">📋 Preventivi</button>
      <button class="nav-item" onclick="goPage('profilo')">👤 Profilo</button>
    </div>

    <!-- CONTENT -->
    <div class="main">
      <div class="content" id="content"></div>
    </div>
  </div>
</div>

<!-- NOTIFICHE CONTAINER -->
<div class="notif-container" id="notifContainer"></div>

<!-- MODALS -->
<!-- Modal Transazione -->
<div class="modal" id="modalTx">
  <div class="modal-sheet">
    <h2 style="margin-bottom:12px">💸 Transazione</h2>
    <div class="form-group">
      <label class="form-label">Descrizione</label>
      <input type="text" id="txDesc" class="form-input">
    </div>
    <div class="form-group">
      <label class="form-label">Importo €</label>
      <input type="number" id="txAmt" class="form-input" step="0.01">
    </div>
    <div class="form-group">
      <label class="form-label">Tipo</label>
      <select id="txType" class="form-input">
        <option value="expense">Uscita</option>
        <option value="income">Entrata</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Categoria</label>
      <select id="txCat" class="form-input"></select>
    </div>
    <div class="form-group">
      <label><input type="checkbox" id="txObbiettivo"> Accantonare in obiettivo?</label>
    </div>
    <div id="txObiettivoSelect" style="display:none">
      <label class="form-label">Scegli obiettivo</label>
      <select id="txObiettivo" class="form-input"></select>
    </div>
    <div class="form-actions">
      <button class="btn-save" onclick="saveTx()">Salva</button>
      <button class="btn-cancel" onclick="closeModal('tx')">Annulla</button>
    </div>
  </div>
</div>

<!-- Modal Obiettivo -->
<div class="modal" id="modalGoal">
  <div class="modal-sheet">
    <h2 style="margin-bottom:12px">🎯 Obiettivo</h2>
    <div class="form-group">
      <label class="form-label">Nome</label>
      <input type="text" id="goalName" class="form-input">
    </div>
    <div class="form-group">
      <label class="form-label">Target €</label>
      <input type="number" id="goalTarget" class="form-input" step="0.01" onchange="updateGoalSuggestion()">
    </div>
    <div id="goalSuggestionDiv" style="background:rgba(108,99,255,.1);border:1px solid rgba(108,99,255,.3);border-radius:8px;padding:10px;margin-bottom:12px;display:none">
      <div style="font-size:10px;color:var(--tx2);margin-bottom:6px">💡 Importo consigliato al mese:</div>
      <div style="font-size:18px;font-weight:800;color:var(--ac)"><span id="goalSuggestionValue">0</span>€</div>
      <div style="font-size:9px;color:var(--tx3);margin-top:4px" id="goalSuggestionMonths"></div>
    </div>
    <div class="form-actions">
      <button class="btn-save" onclick="saveGoal()">Crea</button>
      <button class="btn-cancel" onclick="closeModal('goal')">Annulla</button>
    </div>
  </div>
</div>

<!-- Modal Ricorrente -->
<div class="modal" id="modalRec">
  <div class="modal-sheet">
    <h2 style="margin-bottom:12px">🔄 Ricorrente</h2>
    <div class="form-group">
      <label class="form-label">Descrizione</label>
      <input type="text" id="recDesc" class="form-input">
    </div>
    <div class="form-group">
      <label class="form-label">Importo €</label>
      <input type="number" id="recAmt" class="form-input" step="0.01">
    </div>
    <div class="form-group">
      <label class="form-label">Frequenza</label>
      <select id="recFreq" class="form-input">
        <option value="weekly">Settimanale</option>
        <option value="monthly">Mensile</option>
        <option value="yearly">Annuale</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Categoria</label>
      <select id="recCat" class="form-input"></select>
    </div>
    <div class="form-actions">
      <button class="btn-save" onclick="saveRecurring()">Salva</button>
      <button class="btn-cancel" onclick="closeModal('rec')">Annulla</button>
    </div>
  </div>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<!-- MAIN SCRIPT -->
<script>
"use strict";

// ===== CONFIG =====
const FB = {
  apiKey: "AIzaSyCMPawrAL5tT_bH6YEcNe_UEEyIwLIgHIQ",
  databaseURL: "https://financeapp-556ae-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "financeapp-556ae"
};

const CATS = [
  {id:'food',emoji:'🍕',name:'Cibo'},
  {id:'home',emoji:'🏠',name:'Casa'},
  {id:'transport',emoji:'🚗',name:'Trasporti'},
  {id:'health',emoji:'💊',name:'Salute'},
  {id:'fun',emoji:'🎮',name:'Svago'},
  {id:'shopping',emoji:'🛍️',name:'Shopping'},
  {id:'work',emoji:'💼',name:'Lavoro'},
  {id:'travel',emoji:'✈️',name:'Viaggi'},
  {id:'other',emoji:'📦',name:'Altro'}
];

// ===== GLOBALS =====
let db = null;
let user = null;
let currentPage = 'dashboard';
let notifications = [];
let notifSettings = {};

let tx = [];
let recurring = [];
let goals = [];
let groups = [];
let quotes = [];
let profile = {};

// ===== INIT =====
window.addEventListener('load', () => {
  initFirebase();
  setTimeout(hideSplash, 1500);
  fillSelectCategories();
  loadAllData();
  registerServiceWorker();
  requestNotificationPermission();
});

function hideSplash() {
  document.getElementById('splash').classList.add('hide');
}

function initFirebase() {
  if (typeof firebase === 'undefined') return;
  
  try {
    firebase.initializeApp(FB);
    db = firebase.database();
    
    firebase.auth().onAuthStateChanged(u => {
      if (!u) {
        user = {id: 'guest_' + Math.random().toString(36).substr(2,9), email: 'guest'};
        firebase.auth().signInAnonymously();
      } else {
        user = {id: u.uid, email: u.email};
      }
      loadAllData();
      syncFromFirebase();
    });
  } catch(e) {
    console.warn('Firebase error:', e);
    user = {id: 'guest_' + Math.random().toString(36).substr(2,9), email: 'guest'};
  }
}

// ===== STORAGE =====
function loadAllData() {
  if (!user) return;
  
  tx = JSON.parse(localStorage.getItem('fp_tx_'+user.id) || '[]');
  recurring = JSON.parse(localStorage.getItem('fp_rec_'+user.id) || '[]');
  goals = JSON.parse(localStorage.getItem('fp_goals_'+user.id) || '[]');
  groups = JSON.parse(localStorage.getItem('fp_groups_'+user.id) || '[]');
  quotes = JSON.parse(localStorage.getItem('fp_quotes_'+user.id) || '[]');
  profile = JSON.parse(localStorage.getItem('fp_profile_'+user.id) || '{}');
  notifications = JSON.parse(localStorage.getItem('fp_notif_'+user.id) || '[]');
  notifSettings = JSON.parse(localStorage.getItem('fp_notif_settings_'+user.id) || '{}');
  
  applyRecurringTransactions();
  checkNotifications();
  goPage(currentPage);
}

function saveAllData() {
  if (!user) return;
  
  localStorage.setItem('fp_tx_'+user.id, JSON.stringify(tx));
  localStorage.setItem('fp_rec_'+user.id, JSON.stringify(recurring));
  localStorage.setItem('fp_goals_'+user.id, JSON.stringify(goals));
  localStorage.setItem('fp_groups_'+user.id, JSON.stringify(groups));
  localStorage.setItem('fp_quotes_'+user.id, JSON.stringify(quotes));
  localStorage.setItem('fp_profile_'+user.id, JSON.stringify(profile));
  localStorage.setItem('fp_notif_'+user.id, JSON.stringify(notifications));
  
  syncToFirebase();
}

function syncToFirebase() {
  if (!db || !user) return;
  
  try {
    db.ref(`users/${user.id}/data`).set({
      tx, recurring, goals, groups, quotes, profile,
      lastSync: new Date().toISOString()
    });
  } catch(e) {
    console.warn('Sync error:', e);
  }
}

function syncFromFirebase() {
  if (!db || !user) return;
  
  db.ref(`users/${user.id}/data`).on('value', snap => {
    const data = snap.val();
    if (data) {
      if (data.tx) tx = data.tx;
      if (data.recurring) recurring = data.recurring;
      if (data.goals) goals = data.goals;
      if (data.groups) groups = data.groups;
      if (data.quotes) quotes = data.quotes;
      if (data.profile) profile = data.profile;
      saveAllData();
      renderUI();
    }
  });
}

// ===== NOTIFICHE =====
function notify(msg, type = 'info') {
  const container = document.getElementById('notifContainer');
  const notif = document.createElement('div');
  notif.className = 'notif ' + type;
  notif.textContent = msg;
  container.appendChild(notif);
  
  setTimeout(() => {
    notif.style.opacity = '0';
    notif.style.transition = 'opacity .3s';
    setTimeout(() => notif.remove(), 300);
  }, 3000);
}

function addNotification(title, body, type = 'info') {
  const notif = {
    id: Date.now(),
    title,
    body,
    type,
    read: false,
    date: new Date().toISOString()
  };
  
  notifications.unshift(notif);
  saveAllData();
  updateNotifBadge();
  
  if (Notification.permission === 'granted') {
    new Notification(title, {
      body: body,
      icon: '💰',
      badge: '💰'
    });
  }
}

function updateNotifBadge() {
  const unread = notifications.filter(n => !n.read).length;
  const badge = document.getElementById('notifCount');
  if (unread > 0) {
    badge.textContent = unread;
    badge.style.display = 'flex';
  } else {
    badge.style.display = 'none';
  }
}

function showNotifications() {
  const content = document.getElementById('content');
  
  if (notifications.length === 0) {
    content.innerHTML = '<div class="card">Nessuna notifica</div>';
    return;
  }
  
  let html = '<h2 style="margin-bottom:12px">🔔 Notifiche</h2>';
  notifications.forEach(n => {
    html += `
      <div class="card">
        <div style="font-weight:700;margin-bottom:4px">${n.title}</div>
        <div style="font-size:10px;color:var(--tx2);margin-bottom:6px">${n.body}</div>
        <div style="font-size:9px;color:var(--tx3)">${new Date(n.date).toLocaleDateString()}</div>
      </div>
    `;
  });
  
  content.innerHTML = html;
  notifications.forEach(n => n.read = true);
  saveAllData();
  updateNotifBadge();
}

function requestNotificationPermission() {
  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }
}

// ===== NOTIFICHE INTELLIGENTI =====
function checkNotifications() {
  // Controlla ricorrenti in scadenza
  recurring.forEach(r => {
    const lastApplied = new Date(r.lastApplied || 0);
    const today = new Date();
    
    if (r.freq === 'daily' && lastApplied.getDate() !== today.getDate()) {
      addNotification('🔄 Ricorrente in scadenza', r.desc + ' di €' + r.amt.toFixed(2), 'warning');
    }
  });
  
  // Controlla saldo basso
  const balance = getBalance();
  if (balance < 100 && notifSettings.lowBalance !== false) {
    addNotification('⚠️ Saldo basso', 'Hai solo €' + balance.toFixed(2), 'warning');
  }
  
  // Controlla obiettivi in scadenza
  goals.forEach(g => {
    const percentage = (g.saved / g.target) * 100;
    if (percentage > 90 && !g.notified) {
      addNotification('🎯 Obiettivo prossimo al raggiungimento', g.name + ' è al ' + Math.round(percentage) + '%', 'success');
      g.notified = true;
    }
  });
}

// ===== TRANSAZIONI =====
function saveTx() {
  const desc = document.getElementById('txDesc').value.trim();
  const amt = parseFloat(document.getElementById('txAmt').value);
  const type = document.getElementById('txType').value;
  const cat = document.getElementById('txCat').value;
  
  if (!desc || !amt) {
    notify('❌ Compila tutti i campi', 'error');
    return;
  }
  
  tx.push({
    id: Date.now(),
    desc,
    amt,
    type,
    cat,
    date: new Date().toISOString().split('T')[0]
  });
  
  // Se selezionato accantonamento
  if (document.getElementById('txObbiettivo').checked) {
    const goalId = parseInt(document.getElementById('txObiettivo').value);
    const goal = goals.find(g => g.id === goalId);
    if (goal && type === 'income') {
      const suggested = goal.target / 12; // Default 12 mesi
      goal.saved = (goal.saved || 0) + suggested;
      addNotification('💰 Accantonamento', 'Accantonati €' + suggested.toFixed(2) + ' in ' + goal.name, 'success');
    }
  }
  
  saveAllData();
  closeModal('tx');
  document.getElementById('txDesc').value = '';
  document.getElementById('txAmt').value = '';
  notify('✅ Transazione aggiunta', 'success');
  goPage(currentPage);
}

function delTx(id) {
  if (!confirm('Eliminare?')) return;
  tx = tx.filter(t => t.id !== id);
  saveAllData();
  notify('🗑️ Eliminata', 'info');
  goPage(currentPage);
}

// ===== OBIETTIVI =====
function saveGoal() {
  const name = document.getElementById('goalName').value.trim();
  const target = parseFloat(document.getElementById('goalTarget').value);
  
  if (!name || !target) {
    notify('❌ Nome e target obbligatori', 'error');
    return;
  }
  
  const months = 12; // Default 12 mesi
  const suggested = target / months;
  
  goals.push({
    id: Date.now(),
    name,
    target,
    saved: 0,
    suggested,
    months,
    status: 'active',
    created: new Date().toISOString()
  });
  
  saveAllData();
  closeModal('goal');
  document.getElementById('goalName').value = '';
  document.getElementById('goalTarget').value = '';
  notify('✅ Obiettivo creato', 'success');
  addNotification('🎯 Nuovo obiettivo', name + ' - €' + suggested.toFixed(2) + '/mese', 'info');
  goPage(currentPage);
}

function updateGoalSuggestion() {
  const target = parseFloat(document.getElementById('goalTarget').value);
  if (target > 0) {
    const months = 12;
    const suggested = target / months;
    document.getElementById('goalSuggestionDiv').style.display = 'block';
    document.getElementById('goalSuggestionValue').textContent = suggested.toFixed(2);
    document.getElementById('goalSuggestionMonths').textContent = 'In ' + months + ' mesi';
  } else {
    document.getElementById('goalSuggestionDiv').style.display = 'none';
  }
}

function addToGoal(id, amt) {
  const goal = goals.find(g => g.id === id);
  if (!goal) return;
  goal.saved = (goal.saved || 0) + amt;
  saveAllData();
  notify('✅ Aggiunto €' + amt.toFixed(2), 'success');
}

function completeGoal(id) {
  const goal = goals.find(g => g.id === id);
  if (!goal) return;
  goal.status = 'completed';
  saveAllData();
  notify('🏆 Obiettivo completato!', 'success');
  addNotification('🏆 Obiettivo completato', goal.name + ' raggiunto!', 'success');
}

function delGoal(id) {
  if (!confirm('Eliminare obiettivo?')) return;
  goals = goals.filter(g => g.id !== id);
  saveAllData();
  notify('🗑️ Eliminato', 'info');
  goPage(currentPage);
}

// ===== RICORRENTI =====
function saveRecurring() {
  const desc = document.getElementById('recDesc').value.trim();
  const amt = parseFloat(document.getElementById('recAmt').value);
  const freq = document.getElementById('recFreq').value;
  const cat = document.getElementById('recCat').value;
  
  if (!desc || !amt) {
    notify('❌ Compila campi', 'error');
    return;
  }
  
  recurring.push({
    id: Date.now(),
    desc,
    amt,
    freq,
    cat,
    lastApplied: new Date().toISOString(),
    active: true
  });
  
  saveAllData();
  closeModal('rec');
  notify('✅ Ricorrente salvato', 'success');
  addNotification('🔄 Ricorrente creato', desc + ' - €' + amt.toFixed(2), 'info');
  goPage(currentPage);
}

function applyRecurringTransactions() {
  const today = new Date().toDateString();
  
  recurring.forEach(r => {
    if (!r.active) return;
    
    const lastApplied = new Date(r.lastApplied).toDateString();
    let shouldApply = false;
    
    if (r.freq === 'daily' && lastApplied !== today) shouldApply = true;
    if (r.freq === 'weekly' && new Date(r.lastApplied).getTime() < Date.now() - 7*24*60*60*1000) shouldApply = true;
    if (r.freq === 'monthly' && new Date(r.lastApplied).getTime() < Date.now() - 30*24*60*60*1000) shouldApply = true;
    
    if (shouldApply) {
      tx.push({
        id: Date.now(),
        desc: r.desc + ' [Ricorrente]',
        amt: r.amt,
        type: 'expense',
        cat: r.cat,
        date: today
      });
      
      r.lastApplied = new Date().toISOString();
      addNotification('🔄 Ricorrente applicata', r.desc + ' di €' + r.amt.toFixed(2), 'info');
    }
  });
  
  saveAllData();
}

function delRecurring(id) {
  if (!confirm('Eliminare ricorrente?')) return;
  recurring = recurring.filter(r => r.id !== id);
  saveAllData();
  notify('🗑️ Eliminata', 'info');
  goPage(currentPage);
}

// ===== CALCOLI =====
function getBalance() {
  return tx.reduce((s, t) => s + (t.type === 'income' ? t.amt : -t.amt), 0);
}

function getFreeBalance() {
  const balance = getBalance();
  const suggested = goals.reduce((s, g) => s + (g.suggested || 0), 0);
  return balance - suggested;
}

// ===== RENDER =====
function renderUI() {
  goPage(currentPage);
}

function goPage(p) {
  currentPage = p;
  document.querySelectorAll('.nav-item').forEach(e => e.classList.remove('active'));
  event?.target?.classList.add('active');
  
  const titles = {
    dashboard: '📊 Dashboard',
    transazioni: '💸 Transazioni',
    ricorrenti: '🔄 Ricorrenti',
    obiettivi: '🎯 Obiettivi',
    report: '📈 Report',
    gruppi: '👥 Gruppi',
    preventivi: '📋 Preventivi',
    profilo: '👤 Profilo'
  };
  
  document.getElementById('pageTitle').textContent = titles[p];
  
  if (p === 'dashboard') renderDashboard();
  else if (p === 'transazioni') renderTransazioni();
  else if (p === 'ricorrenti') renderRicorrenti();
  else if (p === 'obiettivi') renderObiettivi();
  else if (p === 'report') renderReport();
  else if (p === 'gruppi') renderGruppi();
  else if (p === 'preventivi') renderPreventivi();
  else if (p === 'profilo') renderProfilo();
}

      </div>

        <div class="stat-label">Entrate</div>
        <div class="stat-value" style="color:var(--gr)">€${income.toFixed(2)}</div>
      </div>
      <div class="stat">
        <div class="stat-label">Uscite</div>
        <div class="stat-value" style="color:var(--re)">€${expense.toFixed(2)}</div>
      </div>
    </div>
    
    <div class="card">
      <h3 style="margin-bottom:10px;font-size:12px;font-weight:700">🎯 Obiettivi</h3>
      ${goals.length === 0 ? '<div style="color:var(--tx2);font-size:10px">Nessun obiettivo</div>' : goals.map(g => `
        <div style="margin-bottom:10px">
          <div style="display:flex;justify-content:space-between;margin-bottom:4px">
            <span style="font-weight:600;font-size:11px">${g.name}</span>
            <span style="font-size:10px;color:var(--tx2)">${Math.round((g.saved/g.target)*100)}%</span>
          </div>
          <div style="height:4px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden">
            <div style="height:100%;width:${(g.saved/g.target)*100}%;background:linear-gradient(90deg,var(--ac),var(--ac2))"></div>
          </div>
          <div style="font-size:9px;color:var(--tx3);margin-top:4px">€${g.saved.toFixed(2)}/€${g.target.toFixed(2)} - Mancano: €${(g.target-g.saved).toFixed(2)} - Consigliato: €${g.suggested.toFixed(2)}/mese</div>
        </div>
      `).join('')}
    </div>

          </div>

        </div>
      `).join('')}
    </div>
    
    <button class="btn" style="width:100%" onclick="openModal('tx')">➕ Aggiungi Transazione</button>
  `;
  
  document.getElementById('content').innerHTML = html;

  let html = `
    <button class="btn" style="width:100%;margin-bottom:12px" onclick="openModal('tx')">➕ Aggiungi</button>
    <div class="card">
      <h3 style="margin-bottom:10px;font-size:12px;font-weight:700">💸 Transazioni (${tx.length})</h3>
      ${tx.length === 0 ? '<div style="color:var(--tx2);font-size:10px">Nessuna transazione</div>' : tx.slice().reverse().map((t, i) => `
        <div class="list-item">
          <div style="flex:1">
            <div style="font-weight:600;font-size:11px">${t.desc}</div>
            <div style="font-size:9px;color:var(--tx2)">${t.date}</div>
          </div>
          <div style="color:${t.type === 'income' ? 'var(--gr)' : 'var(--re)'};font-weight:700;margin:0 10px">${t.type === 'income' ? '+' : '-'}€${t.amt.toFixed(2)}</div>
          <button class="btn-sm btn-danger" onclick="delTx(${t.id})">🗑️</button>
        </div>
      `).join('')}
    </div>
  `;
  
  document.getElementById('content').innerHTML = html;

function renderRicorrenti() {
  let html = `
    <button class="btn" style="width:100%;margin-bottom:12px" onclick="openModal('rec')">➕ Nuovo</button>
    <div class="card">
      <h3 style="margin-bottom:10px;font-size:12px;font-weight:700">🔄 Ricorrenti (${recurring.length})</h3>
      ${recurring.length === 0 ? '<div style="color:var(--tx2);font-size:10px">Nessuna ricorrente</div>' : recurring.map(r => `
        <div class="list-item">
          <div style="flex:1">
            <div style="font-weight:600;font-size:11px">${r.desc}</div>
            <div style="font-size:9px;color:var(--tx2)">${r.freq}</div>
          </div>
          <div style="color:var(--ac2);font-weight:700;margin:0 10px">€${r.amt.toFixed(2)}</div>
          <button class="btn-sm btn-danger" onclick="delRecurring(${r.id})">🗑️</button>
        </div>
      `).join('')}
    </div>
  `;
  
  document.getElementById('content').innerHTML = html;
}

function renderObiettivi() {
  let html = `
    <button class="btn" style="width:100%;margin-bottom:12px" onclick="openModal('goal')">➕ Nuovo</button>
    <div class="card">
      <h3 style="margin-bottom:10px;font-size:12px;font-weight:700">🎯 Obiettivi (${goals.length})</h3>
      ${goals.length === 0 ? '<div style="color:var(--tx2);font-size:10px">Nessun obiettivo</div>' : goals.map(g => `
        <div style="padding:10px;border-bottom:1px solid rgba(255,255,255,.08);margin-bottom:10px">
          <div style="display:flex;justify-content:space-between;margin-bottom:8px">
            <div>
              <div style="font-weight:700;font-size:12px">${g.name}</div>
              <div style="font-size:9px;color:var(--tx3);margin-top:2px">Mancano: €${(g.target-g.saved).toFixed(2)}</div>
            </div>
            <button class="btn-sm btn-danger" onclick="delGoal(${g.id})">🗑️</button>
          </div>
          <div style="height:4px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden;margin-bottom:6px">
            <div style="height:100%;width:${(g.saved/g.target)*100}%;background:linear-gradient(90deg,var(--ac),var(--ac2))"></div>
          </div>
          <div style="font-size:9px;color:var(--tx2)">💡 Consigliato: €${g.suggested.toFixed(2)}/mese per ${g.months} mesi</div>
          <div style="font-size:8px;color:var(--tx3);margin-top:2px">€${g.saved.toFixed(2)}/€${g.target.toFixed(2)} (${Math.round((g.saved/g.target)*100)}%)</div>
        </div>
      `).join('')}
    </div>
  `;
  
  document.getElementById('content').innerHTML = html;
}

function renderReport() {
  const byCategory = {};
  tx.forEach(t => {
    if (t.type === 'expense') {
      byCategory[t.cat] = (byCategory[t.cat] || 0) + t.amt;
    }
  });
  
  const total = Object.values(byCategory).reduce((s, v) => s + v, 0);
  
  let html = '<div class="card"><h3 style="margin-bottom:12px;font-size:12px;font-weight:700">📈 Report Spese per Categoria</h3>';
  
  Object.entries(byCategory).forEach(([cat, amt]) => {
    const cat_data = CATS.find(c => c.id === cat);
    const pct = (amt / total) * 100;
    html += `
      <div style="margin-bottom:10px">
        <div style="display:flex;justify-content:space-between;margin-bottom:4px">
          <span style="font-weight:600;font-size:11px">${cat_data?.emoji} ${cat_data?.name}</span>
          <span style="font-size:10px;color:var(--tx2)">€${amt.toFixed(2)} (${Math.round(pct)}%)</span>
        </div>
        <div style="height:4px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden">
          <div style="height:100%;width:${pct}%;background:linear-gradient(90deg,var(--ac),var(--ac2))"></div>
        </div>
      </div>
    `;
  });
  
  html += '</div>';
  document.getElementById('content').innerHTML = html;
}

function renderGruppi() {
  let html = '<div class="card"><h3 style="margin-bottom:10px;font-size:12px;font-weight:700">👥 Gruppi</h3>';
  html += '<div style="color:var(--tx2);font-size:10px">Feature in sviluppo</div></div>';
  document.getElementById('content').innerHTML = html;
}

function renderPreventivi() {
  let html = '<div class="card"><h3 style="margin-bottom:10px;font-size:12px;font-weight:700">📋 Preventivi</h3>';
  html += '<div style="color:var(--tx2);font-size:10px">Feature in sviluppo</div></div>';
  document.getElementById('content').innerHTML = html;
}

function renderProfilo() {
  let html = `
    <div class="logo-container">
      <div style="text-align:center">
        ${profile.logo ? `<img src="${profile.logo}" style="max-width:200px;max-height:120px">` : '<div style="color:var(--tx2);font-size:10px">Nessun logo</div>'}
      </div>
    </div>
    
    <div class="card">
      <h3 style="margin-bottom:12px;font-size:12px;font-weight:700">🏢 Dati Azienda</h3>
      <div class="form-group">
        <label class="form-label">Nome</label>
        <input type="text" id="profName" class="form-input" value="${profile.name || ''}">
      </div>
      <div class="form-group">
        <label class="form-label">P.IVA</label>
        <input type="text" id="profPiva" class="form-input" value="${profile.piva || ''}">
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" id="profEmail" class="form-input" value="${profile.email || ''}">
      </div>
      <div class="form-group">
        <label class="form-label">Telefono</label>
        <input type="tel" id="profPhone" class="form-input" value="${profile.phone || ''}">
      </div>
      <div class="form-group">
        <label class="form-label">Logo</label>
        <input type="file" id="profLogo" class="form-input" accept="image/*" onchange="uploadLogo()">
      </div>
      <button class="btn" style="width:100%;margin-top:12px" onclick="saveProfile()">💾 Salva</button>
    </div>
    
    <div class="card">
      <h3 style="margin-bottom:12px;font-size:12px;font-weight:700">🔔 Notifiche</h3>
      <label style="display:flex;gap:8px;margin-bottom:8px">
        <input type="checkbox" id="notifLowBalance" ${notifSettings.lowBalance !== false ? 'checked' : ''}>
        <span style="font-size:11px">Avvisa se saldo basso (&lt;€100)</span>
      </label>
      <label style="display:flex;gap:8px;margin-bottom:8px">
        <input type="checkbox" id="notifRecurring" ${notifSettings.recurring !== false ? 'checked' : ''}>
        <span style="font-size:11px">Avvisa ricorrenti in scadenza</span>
      </label>
      <label style="display:flex;gap:8px">
        <input type="checkbox" id="notifGoals" ${notifSettings.goals !== false ? 'checked' : ''}>
        <span style="font-size:11px">Avvisa obiettivi raggiungimento</span>
      </label>
      <button class="btn" style="width:100%;margin-top:12px" onclick="saveNotifSettings()">💾 Salva Impostazioni</button>
    </div>
  `;
  
  document.getElementById('content').innerHTML = html;
}

function saveProfile() {
  profile = {
    name: document.getElementById('profName').value,
    piva: document.getElementById('profPiva').value,
    email: document.getElementById('profEmail').value,
    phone: document.getElementById('profPhone').value,
    logo: profile.logo || ''
  };
  
  saveAllData();
  notify('✅ Profilo salvato', 'success');
}

function uploadLogo() {
  const file = document.getElementById('profLogo').files[0];
  if (!file) return;
  
  const reader = new FileReader();
  reader.onload = (e) => {
    profile.logo = e.target.result;
    saveAllData();
    renderProfilo();
    notify('✅ Logo caricato', 'success');
  };
  
  reader.readAsDataURL(file);
}

function saveNotifSettings() {
  notifSettings = {
    lowBalance: document.getElementById('notifLowBalance').checked,
    recurring: document.getElementById('notifRecurring').checked,
    goals: document.getElementById('notifGoals').checked
  };
  
  localStorage.setItem('fp_notif_settings_'+user.id, JSON.stringify(notifSettings));
  notify('✅ Impostazioni salvate', 'success');
}

// ===== MODALS =====
function openModal(name) {
  if (name === 'tx') {
    fillSelectCategories();
    fillSelectGoals();
    document.getElementById('txObiettivoSelect').style.display = document.getElementById('txObbiettivo').checked ? 'block' : 'none';
  }
  document.getElementById('modal'+name.charAt(0).toUpperCase()+name.slice(1)).classList.add('show');
}

function closeModal(name) {
  document.getElementById('modal'+name.charAt(0).toUpperCase()+name.slice(1)).classList.remove('show');
}

function fillSelectCategories() {
  const sel = document.getElementById('txCat');
  if (sel.options.length === 1) {
    CATS.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c.id;
      opt.textContent = c.emoji + ' ' + c.name;
      sel.appendChild(opt);
    });
  }
  
  const sel2 = document.getElementById('recCat');
  if (sel2.options.length === 1) {
    CATS.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c.id;
      opt.textContent = c.emoji + ' ' + c.name;
      sel2.appendChild(opt);
    });
  }
}

function fillSelectGoals() {
  const sel = document.getElementById('txObiettivo');
  sel.innerHTML = '<option value="">-- Scegli obiettivo --</option>';
  goals.forEach(g => {
    const opt = document.createElement('option');
    opt.value = g.id;
    opt.textContent = g.name + ' (mancano €' + (g.target - g.saved).toFixed(2) + ')';
    sel.appendChild(opt);
  });
}

// ===== SERVICE WORKER =====
function registerServiceWorker() {
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').catch(e => console.warn('SW error:', e));
  }
}

// ===== LISTENERS =====
document.getElementById('txObbiettivo')?.addEventListener('change', function() {
  document.getElementById('txObiettivoSelect').style.display = this.checked ? 'block' : 'none';
});

// Chiudi modals con tasti ESC
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    document.querySelectorAll('.modal.show').forEach(m => m.classList.remove('show'));
  }
});

// Toggle settings
function toggleSettings() {
  goPage('profilo');
}
