<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kazka — Repo Cleaner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#050912;--bg2:#090f1e;--bg3:#0d1528;--b1:rgba(255,255,255,.07);--b2:rgba(255,255,255,.13);--ac:#7B68EE;--ac2:#00E5FF;--gr:#00F0A0;--re:#FF3355;--ye:#FFD166;--tx:#EEF2FF;--tx2:#7A85A8;--tx3:#3A4268;--grad:linear-gradient(135deg,#7B68EE,#00E5FF);--r:14px}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;padding:2rem 1rem}
h1{font-family:'Syne',sans-serif;font-size:1.8rem;font-weight:800;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:.25rem}
h2{font-size:1.05rem;font-weight:600;color:var(--tx2);margin-bottom:1.5rem}
.card{background:var(--bg2);border:1px solid var(--b1);border-radius:var(--r);padding:1.25rem;margin-bottom:1rem}
.file-list{list-style:none;max-height:500px;overflow-y:auto}
.file-item{display:flex;align-items:center;gap:.75rem;padding:.5rem .75rem;border-bottom:1px solid var(--b1);font-size:.85rem}
.file-item:last-child{border-bottom:none}
.file-item .cb{width:17px;height:17px;accent-color:var(--ac);cursor:pointer;flex-shrink:0}
.file-path{flex:1;font-family:monospace;font-size:.78rem;color:var(--tx);word-break:break-all}
.file-size{flex:0 0 70px;font-size:.72rem;color:var(--tx3);text-align:right}
.file-status{flex:0 0 90px;font-size:.72rem;text-align:right}
.badge{display:inline-block;padding:.12rem .45rem;border-radius:99px;font-size:.65rem;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.badge-sup{background:rgba(255,51,85,.15);color:var(--re)}
.badge-ess{background:rgba(0,240,160,.15);color:var(--gr)}
.badge-opt{background:rgba(255,209,102,.15);color:var(--ye)}
.badge-unknown{background:rgba(122,133,168,.15);color:var(--tx2)}
.btn{padding:.55rem 1.2rem;border-radius:var(--r);font-weight:600;font-size:.85rem;cursor:pointer;border:none;transition:opacity .15s;display:inline-flex;align-items:center;gap:.5rem}
.btn:hover{opacity:.85}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-primary{background:var(--grad);color:#fff}
.btn-danger{background:var(--re);color:#fff}
.btn-outline{background:transparent;border:1px solid var(--b2);color:var(--tx2)}
.toolbar{display:flex;gap:.625rem;flex-wrap:wrap;margin:1rem 0}
.summary{display:flex;gap:1rem;flex-wrap:wrap;margin-bottom:1rem}
.stat{padding:1rem;background:var(--bg3);border-radius:var(--r);text-align:center;flex:1;min-width:90px}
.stat-value{font-size:1.4rem;font-weight:700;font-family:'Syne',sans-serif}
.stat-label{font-size:.7rem;color:var(--tx2);margin-top:.2rem}
#output{background:var(--bg3);border:1px solid var(--b1);border-radius:var(--r);padding:1rem;font-family:monospace;font-size:.75rem;white-space:pre-wrap;color:var(--tx2);max-height:300px;overflow:auto;margin-top:.5rem}
.toast{position:fixed;bottom:2rem;right:2rem;background:var(--bg2);border:1px solid var(--b2);border-radius:var(--r);padding:.85rem 1.25rem;font-size:.85rem;box-shadow:0 4px 24px rgba(0,0,0,.4);z-index:999;transform:translateY(120%);transition:transform .3s}
.toast.show{transform:translateY(0)}
.toast.ok{border-color:var(--gr)}
.toast.err{border-color:var(--re)}
.hidden{display:none!important}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem}
@media(max-width:640px){.grid{grid-template-columns:1fr;}}
label{font-size:.82rem;color:var(--tx2);display:block;margin-bottom:.3rem}
input,select{width:100%;padding:.6rem .75rem;border-radius:var(--rs);border:1px solid var(--b1);background:var(--bg3);color:var(--tx);font-size:.85rem;font-family:inherit}
input:focus{outline:none;border-color:var(--ac)}
.spin{animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.progress{height:4px;background:var(--bg3);border-radius:4px;overflow:hidden;margin:.5rem 0}
.progress-bar{height:100%;background:var(--grad);width:0;transition:width .3s;border-radius:4px}
</style>
</head>
<body>

<h1>KAZKA Repo Cleaner</h1>
<h2>Pulisci il repository direttamente da browser — genera una PR su GitHub</h2>

<div class="grid">
  <div class="card">
    <label for="repo">Repository (owner/name)</label>
    <input id="repo" placeholder="adamomic371-star/appfinance" value="">
  </div>
  <div class="card">
    <label for="token">GitHub Token <span style="color:var(--tx3);font-size:.72rem">(repo scope)</span></label>
    <input id="token" type="password" placeholder="ghp_... o github_pat_...">
  </div>
</div>

<div class="toolbar">
  <button class="btn btn-primary" id="btn-load" onclick="loadRepo()">Carica file dal repo</button>
  <button class="btn btn-outline" id="btn-sup" onclick="markSuperfluous()" disabled>Segna superflui</button>
  <button class="btn btn-outline" onclick="deselectAll()" disabled id="btn-deselect">Deseleziona</button>
  <button class="btn btn-danger" id="btn-pr" onclick="createPR()" disabled>✎ Crea PR pulizia</button>
</div>

<div class="summary" id="summary"></div>

<div class="card">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem">
    <strong style="font-size:.9rem" id="file-count">File — carica il repo</strong>
    <div style="display:flex;gap:.35rem">
      <input id="search" type="text" placeholder="Cerca..." style="max-width:160px;padding:.35rem .6rem;font-size:.78rem" oninput="render()">
      <select id="filter-select" style="max-width:130px;padding:.35rem .6rem;font-size:.78rem" onchange="render()">
        <option value="all">Tutti</option>
        <option value="superfluous">Solo superflui</option>
        <option value="essential">Solo essenziali</option>
        <option value="unknown">Da valutare</option>
      </select>
    </div>
  </div>
  <ul class="file-list" id="file-list"></ul>
</div>

<div class="card">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem">
    <strong style="font-size:.9rem">Log operazioni</strong>
    <button class="btn btn-outline" onclick="clearLog()" style="padding:.25rem .6rem;font-size:.72rem">Pulisci</button>
  </div>
  <pre id="output">Avvia caricando il repository.</pre>
</div>

<div id="toast" class="toast"></div>

<script>
let files = [];
let selected = {};
let owner = '', repo = '';
let baseSha = '';

function autoDetectRepo() {
  const repoInput = document.getElementById('repo');
  if (!repoInput.value) {
    // Prova a estrarre da URL GitHub Pages
    const m = location.hostname === 'localhost' || location.hostname === '127.0.0.1'
      ? null : location.pathname.match(/^\/([^\/]+)\/([^\/]+)\//);
    if (m) repoInput.value = `${m[1]}/${m[2]}`;
  }
}

function log(msg, type) {
  const el = document.getElementById('output');
  const prefix = type === 'ok' ? '✓' : type === 'err' ? '✗' : type === 'info' ? '→' : ' ';
  el.textContent += `\n${prefix} ${msg}`;
  el.scrollTop = el.scrollHeight;
}

function clearLog() {
  document.getElementById('output').textContent = 'Log pulito.';
}

function toast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast ' + type + ' show';
  setTimeout(() => t.classList.remove('show'), 2500);
}

async function loadRepo() {
  const repoVal = document.getElementById('repo').value.trim();
  const token = document.getElementById('token').value.trim();
  if (!repoVal || !repoVal.includes('/')) return toast('Inserisci owner/repo', 'err');
  if (!token) return toast('Inserisci il GitHub Token', 'err');

  [owner, repo] = repoVal.split('/');
  const btn = document.getElementById('btn-load');
  btn.disabled = true; btn.textContent = '⏳ Caricamento...';

  try {
    const headers = { Authorization: `token ${token}`, Accept: 'application/vnd.github.v3+json' };

    // 1. Prendi l'albero del repo (ricorsivo)
    log(`Caricamento ${owner}/${repo}...`, 'info');
    const branchRes = await fetch(`https://api.github.com/repos/${owner}/${repo}/git/refs/heads/main`, { headers });
    if (!branchRes.ok) {
      // Prova master
      const branchRes2 = await fetch(`https://api.github.com/repos/${owner}/${repo}/git/refs/heads/master`, { headers });
      if (!branchRes2.ok) throw new Error(`Repo non trovato: ${branchRes.status}`);
      baseSha = (await branchRes2.json()).object.sha;
    } else {
      baseSha = (await branchRes.json()).object.sha;
    }

    const treeRes = await fetch(`https://api.github.com/repos/${owner}/${repo}/git/trees/${baseSha}?recursive=1`, { headers });
    if (!treeRes.ok) throw new Error(`Errore albero: ${treeRes.status}`);
    const tree = await treeRes.json();

    files = tree.tree
      .filter(item => item.type === 'blob' && !item.path.startsWith('.git'))
      .map(item => {
        const path = item.path;
        const ext = path.split('.').pop().toLowerCase();
        const name = path.split('/').pop();
        // Classificazione euristiche
        let status = 'unknown';
        if (/^\.(gitignore|github)/.test(path) || path === 'index.html' || path === '404.html' || path === 'manifest.json' || path === 'sw.js' || path === 'database.rules.json' || path === 'privacy.html' || path === 'termini.html' || path === 'package.json' || path === 'tsconfig.json' || path.startsWith('app/index') || path.startsWith('admin/index') || path.startsWith('assets/icon') || path.startsWith('tests/') || path.startsWith('.github/')) {
          status = 'essential';
        } else if (/^capacitor|^cleaner\/clean-repo|^app\/app\.html$|^admin\.html$/.test(path)) {
          status = 'superfluous';
        } else if (path === 'cleaner.html' || path.startsWith('github/') || path.startsWith('modules/') || path.startsWith('test/') || path.startsWith('js/')) {
          status = 'superfluous';
        }
        return { path, size: item.size, status, name };
      });

    // Inizializza selected
    files.forEach(f => { selected[f.path] = (f.status === 'superfluous'); });

    enableButtons(true);
    render();
    log(`Caricati ${files.length} file`, 'ok');
    toast(`Caricati ${files.length} file`, 'ok');
  } catch (e) {
    log(`Errore: ${e.message}`, 'err');
    toast(`Errore: ${e.message}`, 'err');
  } finally {
    btn.disabled = false; btn.textContent = 'Carica file dal repo';
  }
}

function enableButtons(on) {
  ['btn-sup','btn-deselect','btn-pr'].forEach(id => document.getElementById(id).disabled = !on);
}

function setFilter(f) {
  filter = f;
  document.querySelectorAll('#tabs .tab').forEach(t => t.classList.toggle('active', t.dataset.filter === f));
  render();
}

function render() {
  const list = document.getElementById('file-list');
  const search = document.getElementById('search').value.toLowerCase();
  const filter = document.getElementById('filter-select').value;
  list.innerHTML = '';

  let counts = { essential: 0, superfluous: 0, optional: 0, unknown: 0, total: files.length };
  let visible = 0;

  files.forEach(f => {
    counts[f.status] = counts[f.status] || 0;
    counts[f.status]++;
    if (filter !== 'all' && f.status !== filter) return;
    if (search && !f.path.toLowerCase().includes(search)) return;
    visible++;

    const li = document.createElement('li');
    li.className = 'file-item';
    li.innerHTML = `
      <input type="checkbox" class="cb" ${selected[f.path] ? 'checked' : ''} onchange="sel('${f.path.replace(/'/g,"\\'")}')">
      <span class="file-path">${f.path}</span>
      <span class="file-size">${f.size < 1024 ? f.size + ' B' : (f.size/1024).toFixed(1) + ' KB'}</span>
      <span class="file-status"><span class="badge ${badgeFor(f.status)}">${labelFor(f.status)}</span></span>
    `;
    list.appendChild(li);
  });

  document.getElementById('summary').innerHTML = `
    <div class="stat"><div class="stat-value" style="color:var(--gr)">${counts.essential||0}</div><div class="stat-label">Essenziali</div></div>
    <div class="stat"><div class="stat-value" style="color:var(--re)">${counts.superfluous||0}</div><div class="stat-label">Superflui</div></div>
    <div class="stat"><div class="stat-value" style="color:var(--ye)">${counts.optional||0}</div><div class="stat-label">Opzionali</div></div>
    <div class="stat"><div class="stat-value">${counts.total}</div><div class="stat-label">Totale</div></div>
  `;
  document.getElementById('file-count').textContent = `File — ${visible} mostrati su ${files.length}`;
}

function badgeFor(s) {
  if (s === 'superfluous') return 'badge-sup';
  if (s === 'essential') return 'badge-ess';
  if (s === 'optional') return 'badge-opt';
  return 'badge-unknown';
}
function labelFor(s) {
  if (s === 'superfluous') return 'Superfluo';
  if (s === 'essential') return 'Essenziale';
  if (s === 'optional') return 'Opzionale';
  return 'Da valutare';
}

function sel(path) { selected[path] = !selected[path]; updateCounter(); }

function updateCounter() {
  // solo per feedback visivo
}

function markSuperfluous() {
  files.forEach(f => {
    if (f.status === 'superfluous') selected[f.path] = true;
  });
  render();
  toast('Superflui selezionati', 'ok');
}

function deselectAll() {
  files.forEach(f => { selected[f.path] = false; });
  render();
}

async function createPR() {
  const token = document.getElementById('token').value.trim();
  const toDelete = files.filter(f => selected[f.path]);
  if (!toDelete.length) return toast('Nessun file selezionato', 'err');

  const btn = document.getElementById('btn-pr');
  btn.disabled = true; btn.innerHTML = '⏳ Creazione PR...';
  log(`Avvio pulizia: ${toDelete.length} file da rimuovere...`, 'info');

  try {
    const headers = { Authorization: `token ${token}`, Accept: 'application/vnd.github.v3+json' };
    const branchName = `cleanup/remove-${toDelete.length}-files-${Date.now()}`;

    // 1. Prendi commit SHA di main
    const refRes = await fetch(`https://api.github.com/repos/${owner}/${repo}/git/refs/heads/main`, { headers });
    if (!refRes.ok) throw new Error(`Impossibile leggere main: ${refRes.status}`);
    const ref = await refRes.json();
    const mainSha = ref.object.sha;

    // 2. Crea branch
    log(`Creazione branch ${branchName}...`, 'info');
    const branchRes = await fetch(`https://api.github.com/repos/${owner}/${repo}/git/refs`, {
      method: 'POST',
      headers,
      body: JSON.stringify({ ref: `refs/heads/${branchName}`, sha: mainSha })
    });
    if (!branchRes.ok) {
      const err = await branchRes.json();
      throw new Error(`Crea branch: ${err.message || branchRes.status}`);
    }
    log(`Branch ${branchName} creato`, 'ok');

    // 3. Leggi l'albero corrente del nuovo branch
    const treeRes = await fetch(`https://api.github.com/repos/${owner}/${repo}/git/trees/${branchName}?recursive=1`, { headers });
    const tree = await treeRes.json();

    // 4. Filtra: rimuovi dall'albero i file selezionati
    const pathsToDelete = new Set(toDelete.map(f => f.path));
    const remainingTree = tree.tree.filter(item => !pathsToDelete.has(item.path));

    // 5. Crea nuovo albero
    log(`Creazione nuovo albero senza i file selezionati...`, 'info');
    const newTreeRes = await fetch(`https://api.github.com/repos/${owner}/${repo}/git/trees`, {
      method: 'POST',
      headers,
      body: JSON.stringify({
        base_tree: tree.sha,
        tree: remainingTree.map(item => ({
          path: item.path,
          mode: item.mode,
          type: item.type,
          sha: item.sha
        }))
      })
    });
    if (!newTreeRes.ok) {
      const err = await newTreeRes.json();
      throw new Error(`Crea albero: ${err.message || newTreeRes.status}`);
    }
    const newTree = await newTreeRes.json();

    // 6. Crea commit
    log(`Creazione commit...`, 'info');
    const commitMsg = `chore: rimossi ${toDelete.length} file superflui

File rimossi:
${toDelete.map(f => `- ${f.path}`).join('\n')}

Generato da KAZKA Repo Cleaner.`;
    const commitRes = await fetch(`https://api.github.com/repos/${owner}/${repo}/git/commits`, {
      method: 'POST',
      headers,
      body: JSON.stringify({
        message: commitMsg,
        tree: newTree.sha,
        parents: [mainSha]
      })
    });
    if (!commitRes.ok) {
      const err = await commitRes.json();
      throw new Error(`Crea commit: ${err.message || commitRes.status}`);
    }
    const commit = await commitRes.json();

    // 7. Aggiorna il branch
    await fetch(`https://api.github.com/repos/${owner}/${repo}/git/refs/heads/${branchName}`, {
      method: 'PATCH',
      headers,
      body: JSON.stringify({ sha: commit.sha, force: false })
    });

    log(`Commit ${commit.sha.substring(0, 7)} creato`, 'ok');

    // 8. Crea PR
    log(`Creazione PR...`, 'info');
    const prRes = await fetch(`https://api.github.com/repos/${owner}/${repo}/pulls`, {
      method: 'POST',
      headers,
      body: JSON.stringify({
        title: `Pulizia: rimossi ${toDelete.length} file superflui`,
        body: `**File rimossi:**\n${toDelete.map(f => `- \`${f.path}\` (${f.size < 1024 ? f.size + ' B' : (f.size/1024).toFixed(1) + ' KB'})`).join('\n')}\n\nGenerato automaticamente da [KAZKA Repo Cleaner](https://${owner}.github.io/${repo}/cleaner.html).`,
        head: branchName,
        base: 'main'
      })
    });
    if (!prRes.ok) {
      const err = await prRes.json();
      throw new Error(`Crea PR: ${err.message || prRes.status}`);
    }
    const pr = await prRes.json();

    log(`PR creata: ${pr.html_url}`, 'ok');
    toast(`PR creata!`, 'ok');

    // Mostra link
    document.getElementById('output').textContent += `\n\n🔗 ${pr.html_url}\n📌 Revisiona e mergia la PR su GitHub.`;

  } catch (e) {
    log(`ERRORE: ${e.message}`, 'err');
    toast(`Errore: ${e.message}`, 'err');
  } finally {
    btn.disabled = false; btn.innerHTML = '✎ Crea PR pulizia';
  }
}

// Init
autoDetectRepo();
</script>
</body>
</html>
