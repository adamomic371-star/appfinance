<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Axiom — Pagina non trovata</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--ac:#2563EB;--ac2:#06B6D4;--re:#EF4444;--bg:#080612;--tx:#EEF2FF;--tx2:#7A85A8;--r:14px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:2rem;position:relative}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(37,99,235,.12),transparent),radial-gradient(ellipse 60% 50% at 80% 90%,rgba(6,182,212,.08),transparent);pointer-events:none;z-index:0}
.logo{font-family:'Syne',sans-serif;font-size:1.4rem;font-weight:800;background:linear-gradient(135deg,var(--ac),var(--ac2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:2rem;position:relative;z-index:1}
.code{font-family:'Syne',sans-serif;font-size:clamp(3rem,15vw,6rem);font-weight:800;background:linear-gradient(135deg,var(--ac),var(--ac2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1;position:relative;z-index:1}
h1{font-size:1.5rem;font-weight:700;margin:.75rem 0 .5rem;position:relative;z-index:1}
p{color:var(--tx2);margin-bottom:2rem;position:relative;z-index:1}
.btn{display:inline-block;padding:.875rem 2rem;background:linear-gradient(135deg,var(--ac),#06B6D4);color:#fff;border-radius:var(--r);font-weight:700;font-size:1rem;text-decoration:none;transition:opacity .2s,transform .2s,box-shadow .2s;position:relative;z-index:1;box-shadow:0 4px 20px rgba(37,99,235,.25)}
.btn:hover{opacity:.9;transform:translateY(-2px);box-shadow:0 6px 30px rgba(37,99,235,.35)}
@media(max-width:480px){body{padding:1.5rem}.code{font-size:clamp(2.5rem,12vw,4rem)}h1{font-size:1.2rem}p{font-size:.9rem}.btn{width:100%;padding:.75rem 1rem;font-size:.9rem}}
</style>
</head>
<body>
<div>
  <div class="logo">⚡ Axiom</div>
  <div class="code">404</div>
  <h1>Pagina non trovata</h1>
  <p>La pagina che cerchi non esiste o è stata spostata.</p>
  <a href="/appfinance/" class="btn">Torna alla home →</a>
</div>
<script>
  // Redirect SPA: se è una route dell'app reindirizza
  const path = window.location.pathname;
  if(path.includes('/app/') || path.includes('/admin/')) {
    const base = path.split('/').slice(0,2).join('/');
    window.location.replace('/' + base + path);
  }
</script>
</body>
</html>
