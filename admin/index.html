<!DOCTYPE html>
<html lang='it'>
<head>
<meta charset='UTF-8'>
<meta name='viewport' content='width=device-width, initial-scale=1.0'>
<title>KAZKA - Pannello Amministrativo</title>
<link rel='preconnect' href='https://fonts.googleapis.com'>
<link href='https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Syne:wght@400;500;600;700;800&display=swap' rel='stylesheet'>
<script src='https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js'></script>
<script src='https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js'></script>
<script src='https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js'></script>
<script src='https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js'></script>
<script src='https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js'></script>
<script src='https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js'></script>
<script src='https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js'></script>
<script src='https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js'></script>
<script src='https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js'></script>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #080612;
  --bg2: #0F1130;
  --bg3: #181B3D;
  --bg4: #212450;
  --primary: #EF4444;
  --secondary: #2563EB;
  --success: #34D399;
  --warning: #FBBF24;
  --orange: #FB923C;
  --tx: #F8FAFC;
  --tx2: #94A3B8;
  --tx3: #64748B;
  --tx4: #475569;
  --b1: rgba(239,68,68,.08);
  --b2: rgba(239,68,68,.15);
  --gradient: linear-gradient(135deg, #EF4444, #06B6D4);
  --font: 'DM Sans', sans-serif;
  --heading: 'Syne', sans-serif;
  --radius: 12px;
  --shadow: 0 8px 32px rgba(0,0,0,0.4);
  --card1: #0F1130;
  --card2: #181B3D;
  --card3: #212450;
  --text: #F8FAFC;
  --text2: #94A3B8;
  --text3: #64748B;
  --border: rgba(255,255,255,0.06);
}
[data-theme="light"] {
  --bg: #F1F5F9;
  --bg2: #FFFFFF;
  --bg3: #F8FAFC;
  --bg4: #E2E8F0;
  --tx: #0F172A;
  --tx2: #475569;
  --tx3: #64748B;
  --tx4: #94A3B8;
  --b1: rgba(239,68,68,.08);
  --b2: rgba(239,68,68,.15);
  --card1: #FFFFFF;
  --card2: #F8FAFC;
  --card3: #E2E8F0;
  --text: #0F172A;
  --text2: #475569;
  --text3: #64748B;
  --border: rgba(0,0,0,0.06);
  --shadow: 0 8px 32px rgba(0,0,0,0.08);
}
html { font-size: 15px; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  transition: background 0.3s, color 0.3s;
}
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg2); }
::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--tx3); }
a { color: var(--text); text-decoration: none; }
input, select, textarea, button { font-family: var(--font); outline: none; }
.hidden { display: none !important; }
.flex { display: flex; }
.flex-c { display: flex; align-items: center; }
.flex-b { display: flex; justify-content: space-between; align-items: center; }
.flex-g { gap: 12px; }
.grid { display: grid; gap: 16px; }
.login-screen {
  position: fixed; inset: 0; z-index: 9999;
  display: flex; align-items: center; justify-content: center;
  background: var(--bg);
  overflow: hidden;
}
.login-screen::before {
  content: ''; position: absolute; top: -50%; left: -50%;
  width: 200%; height: 200%;
  background: radial-gradient(ellipse at 20% 50%, rgba(239,68,68,0.12) 0%, transparent 50%),
              radial-gradient(ellipse at 80% 50%, rgba(6,182,212,0.08) 0%, transparent 50%);
  animation: loginGlow 8s ease-in-out infinite alternate;
}
.login-screen::after {
  content: ''; position: absolute; top: -50%; left: -50%;
  width: 200%; height: 200%;
  background: radial-gradient(ellipse at 50% 0%, rgba(239,68,68,0.06) 0%, transparent 40%);
  animation: loginGlow2 10s ease-in-out infinite alternate;
}
@keyframes loginGlow { 0% { transform: translate(0,0) rotate(0deg); } 100% { transform: translate(2%,2%) rotate(3deg); } }
@keyframes loginGlow2 { 0% { transform: translate(0,0) rotate(0deg); } 100% { transform: translate(-2%,-1%) rotate(-3deg); } }
.login-card {
  position: relative; z-index: 1;
  background: rgba(15,17,48,0.85);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 48px 40px;
  width: 420px; max-width: 92vw;
  box-shadow: var(--shadow);
}
.login-title { text-align: center; margin-bottom: 32px; }
.login-title h1 {
  font-family: var(--heading); font-size: 2.4rem; font-weight: 800;
  background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: -0.03em;
}
.login-title p { color: var(--tx2); font-size: 0.9rem; margin-top: 6px; letter-spacing: 0.3px; }
.form-group { margin-bottom: 18px; }
.form-group label { display: block; font-size: 0.82rem; color: var(--tx2); margin-bottom: 6px; font-weight: 500; }
.form-group input, .form-group select, .form-group textarea {
  width: 100%; padding: 12px 16px;
  background: rgba(24,27,61,0.8); border: 1px solid var(--border);
  border-radius: 10px; color: var(--text); font-size: 0.9rem;
  transition: border 0.2s;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus {
  border-color: var(--primary); background: rgba(33,36,80,0.6);
}
.form-group textarea { min-height: 100px; resize: vertical; }
.btn {
  padding: 12px 24px; border: none; border-radius: 10px;
  font-size: 0.9rem; font-weight: 600; cursor: pointer;
  transition: all 0.25s; display: inline-flex; align-items: center; gap: 8px;
  justify-content: center;
}
.btn:active { transform: scale(0.97); }
.btn-primary { background: var(--gradient); color: #fff; }
.btn-primary:hover { opacity: 0.9; box-shadow: 0 4px 20px rgba(239,68,68,0.3); }
.btn-secondary { background: var(--bg4); color: var(--text); }
.btn-secondary:hover { background: var(--bg3); }
.btn-success { background: var(--success); color: #080612; }
.btn-success:hover { opacity: 0.85; }
.btn-warning { background: var(--warning); color: #080612; }
.btn-danger { background: var(--primary); color: #fff; }
.btn-danger:hover { opacity: 0.85; }
.btn-ghost { background: transparent; color: var(--tx2); border: 1px solid var(--border); }
.btn-ghost:hover { border-color: var(--tx2); }
.btn-sm { padding: 8px 14px; font-size: 0.8rem; border-radius: 8px; }
.btn-xs { padding: 4px 10px; font-size: 0.7rem; border-radius: 6px; }
.btn-google {
  width: 100%; background: rgba(255,255,255,0.06); color: var(--text);
  border: 1px solid var(--border); margin-top: 12px;
}
.btn-google:hover { background: rgba(255,255,255,0.1); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
.demo-creds {
  margin-top: 20px; padding: 14px 18px;
  background: rgba(33,36,80,0.4); border-radius: 10px;
  border: 1px dashed var(--border);
}
.demo-creds p { font-size: 0.78rem; color: var(--tx2); }
.demo-creds code { color: var(--warning); font-size: 0.82rem; }
.error-msg { color: var(--primary); font-size: 0.82rem; margin-top: 8px; text-align: center; min-height: 20px; }
