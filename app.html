<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kazka">
<title>Kazka – Smart Finance</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<link rel="manifest" href="manifest.json">
<style>
:root{--bg:#070b18;--bg2:#0d1225;--s1:rgba(255,255,255,.04);--b1:rgba(255,255,255,.08);--ac:#6c63ff;--ac2:#00d4ff;--gr:#00e5a0;--re:#ff4f6d;--tx:#f0f4ff;--tx2:#8892b0;--tx3:#4a5580}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:'Outfit',sans-serif;overflow:hidden}
body.light{--bg:#f0f2f8;--bg2:#ffffff;--tx:#1a1f3a;--tx2:#5a6080;--tx3:#9aa0bc}

/* SPLASH */
#splash{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1000}
#splash.hidden{display:none}
.spl-ico{font-size:72px;margin-bottom:20px;animation:bounce 1s infinite}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
.spl-title{font-size:32px;font-weight:800;margin-bottom:8px;background:linear-gradient(135deg,#fff,var(--ac2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.spl-sub{font-size:14px;color:var(--tx2);margin-bottom:40px}
.spl-bar{width:200px;height:3px;background:var(--s1);border-radius:10px;overflow:hidden}
.spl-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--ac),var(--ac2));animation:fill 2.5s ease forwards}
@keyframes fill{to{width:100%}}
.spl-txt{font-size:11px;color:var(--tx3);margin-top:12px}

/* LAYOUT */
#app{display:flex;height:100vh}
#app.hidden{display:none}
.sidebar{width:240px;background:var(--bg2);border-right:1px solid var(--b1);padding:16px;overflow-y:auto}
.sb-title{font-size:14px;font-weight:800;margin-bottom:20px;background:linear-gradient(135deg,#fff,var(--ac2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav{display:flex;flex-direction:column;gap:4px}
.ni{padding:10px;border-radius:10px;cursor:pointer;font-size:12px;color:var(--tx2);transition:all .2s}
.ni:hover{background:var(--s1);color:var(--tx)}
.ni.active{background:linear-gradient(135deg,rgba(108,99,255,.15),rgba(0,212,255,.08));color:var(--tx);border:1px solid rgba(108,99,255,.2)}

.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:var(--bg2);border-bottom:1px solid var(--b1);height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;flex-shrink:0}
.topbar h1{font-size:16px;font-weight:800}

.sync-badge{position:fixed;top:70px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,rgba(0,229,160,.9),rgba(0,212,255,.8));color:#070b18;padding:8px 16px;border-radius:20px;font-size:11px;font-weight:700;z-index:500;opacity:0;transition:opacity .3s;pointer-events:none;box-shadow:0 4px 12px rgba(0,229,160,.3)}
.sync-badge.show{opacity:1}

.content{flex:1;overflow-y:auto;padding:16px}

/* CARDS */
.card{background:var(--s1);border:1px solid var(--b1);border-radius:12px;padding:14px;margin-bottom:12px;animation:slide .3s ease}
@keyframes slide{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.card-title{font-size:12px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:6px}

.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:10px;margin-bottom:14px}
.stat{background:var(--s1);border:1px solid var(--b1);border-radius:10px;padding:10px;text-align:center;animation:slide .3s ease}
.stat-lbl{font-size:9px;color:var(--tx2);font-weight:700;text-transform:uppercase;margin-bottom:6px}
.stat-val{font-size:16px;font-weight:800}

.ir{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--b1);font-size:11px}
.ir:last-child{border-bottom:none}
.ir-ico{width:28px;height:28px;border-radius:8px;background:var(--s1);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ir-info{flex:1;min-width:0}
.ir-name{font-weight:600}
.ir-cat{font-size:9px;color:var(--tx3);margin-top:2px}
.ir-amt{font-weight:700;white-space:nowrap}

/* BUTTONS */
.btn{padding:8px 12px;background:linear-gradient(135deg,var(--ac),var(--ac2));border:none;border-radius:8px;color:#fff;font-size:11px;font-weight:700;cursor:pointer;font-family:'Outfit',sans-serif;transition:all .2s}
.btn:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(108,99,255,.3)}
.btn-sm{padding:4px 8px;background:var(--s1);border:1px solid var(--b1);border-radius:6px;color:var(--tx2);cursor:pointer;font-size:10px;font-family:'Outfit',sans-serif;transition:all .2s}
.btn-sm:hover{background:var(--b1)}
.btn-danger{background:rgba(255,79,109,.1);color:var(--re);border:1px solid rgba(255,79,109,.2)}

/* MODAL */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:flex-end;z-index:500;animation:bg .3s ease}
@keyframes bg{from{opacity:0}to{opacity:1}}
.modal.active{display:flex}
.modal-sheet{background:var(--bg2);border:1px solid var(--b1);border-radius:16px 16px 0 0;padding:16px;width:100%;max-height:85vh;overflow-y:auto;animation:up .3s ease}
@keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}

.form-group{margin-bottom:10px}
.form-label{font-size:9px;color:var(--tx2);font-weight:700;text-transform:uppercase;margin-bottom:4px;display:block}
.form-input{width:100%;padding:8px;background:var(--s1);border:1px solid var(--b1);border-radius:8px;color:var(--tx);font-size:11px;font-family:'Outfit',sans-serif}
.form-input:focus{outline:none;border-color:var(--ac);box-shadow:0 0 0 2px rgba(108,99,255,.2)}

.form-actions{display:flex;gap:8px;margin-top:12px}
.btn-save{flex:1;padding:9px;background:linear-gradient(135deg,var(--ac),var(--ac2));border:none;border-radius:8px;color:#fff;font-weight:700;font-size:11px;cursor:pointer;font-family:'Outfit',sans-serif}
.btn-cancel{flex:1;padding:9px;background:var(--s1);border:1px solid var(--b1);border-radius:8px;color:var(--tx2);cursor:pointer;font-family:'Outfit',sans-serif}

.notif{position:fixed;bottom:16px;right:16px;background:rgba(13,18,37,.95);border:1px solid var(--b1);border-radius:10px;padding:10px 14px;font-size:10px;font-weight:600;z-index:999;display:none;animation:nslide .3s ease;max-width:300px}
@keyframes nslide{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}

@media(max-width:640px){
  .sidebar{display:none}
  .stat-grid{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>

<div id="splash">
  <div class="spl-ico">💰</div>
  <div class="spl-title">Kazka</div>
  <div class="spl-sub">Smart Finance</div>
  <div class="spl-bar"><div class="spl-fill"></div></div>
  <div class="spl-txt">Caricamento...</div>
</div>

<div id="app" class="hidden">
  <div class="sidebar">
    <div class="sb-title">💰 Kazka</div>
    <nav class="nav" id="nav"></nav>
  </div>

  <div class="main">
    <div class="topbar">
      <h1 id="page-title">Dashboard</h1>
      <button class="btn" onclick="manualSync()" style="background:rgba(0,212,255,.2);border:1px solid rgba(0,212,255,.3);color:#00d4ff;font-size:10px;padding:6px 10px">🔄 Sync</button>
    </div>
    <div class="sync-badge" id="syncBadge">⏳ Sincronizzando...</div>
    <div class="content" id="content"></div>
  </div>
</div>

<div class="notif" id="notif"></div>

<!-- MODALS -->
<div class="modal" id="modal-tx">
  <div class="modal-sheet">
    <div style="display:flex;justify-content:space-between;margin-bottom:12px">
      <div style="font-size:13px;font-weight:800">💸 Transazione</div>
      <button onclick="closeModal('tx')" style="background:none;border:none;color:var(--tx2);font-size:18px;cursor:pointer">✕</button>
    </div>
    <div class="form-group"><label class="form-label">Descrizione</label><input type="text" id="tx-desc" class="form-input"></div>
    <div class="form-group"><label class="form-label">Importo €</label><input type="number" id="tx-amt" class="form-input" step="0.01"></div>
    <div class="form-group"><label class="form-label">Tipo</label><select id="tx-type" class="form-input"><option value="income">Entrata</option><option value="expense">Uscita</option></select></div>
    <div class="form-group"><label class="form-label">Categoria</label><select id="tx-cat" class="form-input"></select></div>
    <div class="form-actions"><button class="btn-save" onclick="saveTx()">Salva</button><button class="btn-cancel" onclick="closeModal('tx')">Annulla</button></div>
  </div>
</div>

<div class="modal" id="modal-goal">
  <div class="modal-sheet">
    <div style="display:flex;justify-content:space-between;margin-bottom:12px">
      <div style="font-size:13px;font-weight:800">🎯 Obiettivo</div>
      <button onclick="closeModal('goal')" style="background:none;border:none;color:var(--tx2);font-size:18px;cursor:pointer">✕</button>
    </div>
    <div class="form-group"><label class="form-label">Nome</label><input type="text" id="goal-name" class="form-input"></div>
    <div class="form-group"><label class="form-label">Target €</label><input type="number" id="goal-target" class="form-input" step="0.01"></div>
    <div class="form-group"><label class="form-label">Mensile €</label><input type="number" id="goal-monthly" class="form-input" step="0.01"></div>
    <div class="form-actions"><button class="btn-save" onclick="saveGoal()">Salva</button><button class="btn-cancel" onclick="closeModal('goal')">Annulla</button></div>
  </div>
</div>

<div class="modal" id="modal-bill">
  <div class="modal-sheet">
    <div style="display:flex;justify-content:space-between;margin-bottom:12px">
      <div style="font-size:13px;font-weight:800">📄 Bolletta</div>
      <button onclick="closeModal('bill')" style="background:none;border:none;color:var(--tx2);font-size:18px;cursor:pointer">✕</button>
    </div>
    <div class="form-group"><label class="form-label">Nome</label><input type="text" id="bill-name" class="form-input"></div>
    <div class="form-group"><label class="form-label">Importo €</label><input type="number" id="bill-amt" class="form-input" step="0.01"></div>
    <div class="form-group"><label class="form-label">Scadenza</label><input type="date" id="bill-due" class="form-input"></div>
    <div class="form-group"><label class="form-label"><input type="checkbox" id="bill-paid"> Pagata</label></div>
    <div class="form-actions"><button class="btn-save" onclick="saveBill()">Salva</button><button class="btn-cancel" onclick="closeModal('bill')">Annulla</button></div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
// ===== CONFIG & GLOBALS =====
const FB={apiKey:"AIzaSyCMPawrAL5tT_bH6YEcNe_UEEyIwLIgHIQ",databaseURL:"https://financeapp-556ae-default-rtdb.europe-west1.firebasedatabase.app",projectId:"financeapp-556ae"};

const CATS=[{id:'food',name:'🍕 Cibo'},{id:'home',name:'🏠 Casa'},{id:'transport',name:'🚗 Trasporti'},{id:'health',name:'💊 Salute'},{id:'fun',name:'🎮 Svago'},{id:'shopping',name:'🛍️ Shopping'},{id:'work',name:'💼 Lavoro'},{id:'travel',name:'✈️ Viaggi'},{id:'other',name:'📦 Altro'}];
const NAV=[{id:'dash',name:'📊 Dashboard'},{id:'tx',name:'💸 Transazioni'},{id:'goals',name:'🎯 Obiettivi'},{id:'bills',name:'📄 Bollette'}];

let db,user,mode='personal';
let tx=[],goals=[],bills=[];
let syncPending=false,syncTimer=null;

// ===== INIT =====
window.addEventListener('load',()=>{
  try{firebase.initializeApp(FB);db=firebase.database();}catch(e){}
  
  autoLogin();
  setTimeout(()=>{
    document.getElementById('splash').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    buildNav();
    buildCats();
    goPage('dash');
  },2500);
});

function autoLogin(){
  const uid=localStorage.getItem('uid')||'user_'+Math.random().toString(36).substr(2,9);
  user={id:uid};
  localStorage.setItem('uid',uid);
  
  loadData();
  if(db&&user)loadFromFirebase();
}

function buildNav(){
  document.getElementById('nav').innerHTML=NAV.map(n=>`<div class="ni" onclick="goPage('${n.id}')">${n.name}</div>`).join('');
}

function buildCats(){
  document.getElementById('tx-cat').innerHTML=CATS.map(c=>`<option value="${c.id}">${c.name}</option>`).join('');
}

function loadData(){
  tx=JSON.parse(localStorage.getItem('tx')||'[]');
  goals=JSON.parse(localStorage.getItem('goals')||'[]');
  bills=JSON.parse(localStorage.getItem('bills')||'[]');
}

function saveData(){
  localStorage.setItem('tx',JSON.stringify(tx));
  localStorage.setItem('goals',JSON.stringify(goals));
  localStorage.setItem('bills',JSON.stringify(bills));
}

function loadFromFirebase(){
  if(!db||!user)return;
  const uid=user.id;
  
  db.ref(`users/${uid}/tx`).on('value',s=>{
    const data=s.val()||[];
    if(Array.isArray(data)&&data.length>0){tx=data;saveData();}
  });
  
  db.ref(`users/${uid}/goals`).on('value',s=>{
    const data=s.val()||[];
    if(Array.isArray(data)&&data.length>0){goals=data;saveData();}
  });
  
  db.ref(`users/${uid}/bills`).on('value',s=>{
    const data=s.val()||[];
    if(Array.isArray(data)&&data.length>0){bills=data;saveData();}
  });
}

// ===== SYNC SYSTEM =====
function autoSync(){
  if(!db||!user||syncPending)return;
  if(syncTimer)clearTimeout(syncTimer);
  syncTimer=setTimeout(performAutoSync,1000);
}

async function performAutoSync(){
  if(syncPending||!db||!user)return;
  syncPending=true;
  
  try{
    const badge=document.getElementById('syncBadge');
    if(badge){badge.classList.add('show');badge.textContent='⏳ Sincronizzando...';}
    
    const uid=user.id;
    await db.ref(`users/${uid}/tx`).set(tx);
    await db.ref(`users/${uid}/goals`).set(goals);
    await db.ref(`users/${uid}/bills`).set(bills);
    
    if(badge){
      badge.textContent='✅ Sincronizzato';
      setTimeout(()=>badge.classList.remove('show'),2000);
    }
  }catch(e){
    console.error('Sync error:',e);
  }finally{
    syncPending=false;
  }
}

function manualSync(){
  autoSync();
  notify('🔄 Sincronizzando...');
}

// ===== UI =====
function goPage(p){
  document.querySelectorAll('.ni').forEach(e=>e.classList.remove('active'));
  event.target?.classList.add('active');
  
  const titles={dash:'Dashboard',tx:'Transazioni',goals:'Obiettivi',bills:'Bollette'};
  document.getElementById('page-title').textContent=titles[p];
  
  if(p==='dash')renderDash();
  else if(p==='tx')renderTx();
  else if(p==='goals')renderGoals();
  else if(p==='bills')renderBills();
}

function renderDash(){
  const bal=tx.reduce((s,t)=>s+(t.type==='income'?t.amount:-t.amount),0);
  const inc=tx.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0);
  const exp=tx.filter(t=>t.type==='expense').reduce((s,t)=>s+t.amount,0);
  const billsUnpaid=bills.filter(b=>!b.paid).reduce((s,b)=>s+b.amount,0);
  const free=bal-billsUnpaid;
  
  const html=`
    <div class="stat-grid">
      <div class="stat"><div class="stat-lbl">Saldo</div><div class="stat-val" style="color:var(--gr)">€${bal.toFixed(2)}</div></div>
      <div class="stat"><div class="stat-lbl">Liberi</div><div class="stat-val" style="color:var(--ac2)">€${free.toFixed(2)}</div></div>
      <div class="stat"><div class="stat-lbl">Entrate</div><div class="stat-val" style="color:var(--gr)">€${inc.toFixed(2)}</div></div>
      <div class="stat"><div class="stat-lbl">Uscite</div><div class="stat-val" style="color:var(--re)">€${exp.toFixed(2)}</div></div>
    </div>
    <div class="card">
      <div class="card-title">💸 Ultimi Movimenti</div>
      ${tx.length===0?'<div style="padding:20px;text-align:center;color:var(--tx2)">Nessun movimento</div>':
      tx.slice(-5).reverse().map(t=>`
        <div class="ir">
          <div class="ir-ico">${CATS.find(c=>c.id===t.cat)?.name?.split(' ')[0]||'📦'}</div>
          <div class="ir-info">
            <div class="ir-name">${t.desc}</div>
            <div class="ir-cat">${t.date}</div>
          </div>
          <div class="ir-amt" style="color:${t.type==='income'?'var(--gr)':'var(--re)'}">${t.type==='income'?'+':'-'}€${t.amount.toFixed(2)}</div>
        </div>
      `).join('')}
    </div>
  `;
  document.getElementById('content').innerHTML=html;
}

function renderTx(){
  const html=`
    <button class="btn" onclick="openModal('tx')" style="width:100%;margin-bottom:12px">➕ Aggiungi Transazione</button>
    <div class="card">
      <div class="card-title">💸 Transazioni (${tx.length})</div>
      ${tx.length===0?'<div style="padding:20px;text-align:center;color:var(--tx2)">Nessuna</div>':
      tx.slice().reverse().map((t,i)=>`
        <div class="ir">
          <div class="ir-ico">${CATS.find(c=>c.id===t.cat)?.name?.split(' ')[0]||'📦'}</div>
          <div class="ir-info">
            <div class="ir-name">${t.desc}</div>
            <div class="ir-cat">${t.date}</div>
          </div>
          <div class="ir-amt" style="color:${t.type==='income'?'var(--gr)':'var(--re)'}">${t.type==='income'?'+':'-'}€${t.amount.toFixed(2)}</div>
          <button class="btn-sm btn-danger" onclick="delTx(${i})">🗑️</button>
        </div>
      `).join('')}
    </div>
  `;
  document.getElementById('content').innerHTML=html;
}

function renderGoals(){
  const html=`
    <button class="btn" onclick="openModal('goal')" style="width:100%;margin-bottom:12px">➕ Nuovo Obiettivo</button>
    <div class="card">
      <div class="card-title">🎯 Obiettivi (${goals.length})</div>
      ${goals.length===0?'<div style="padding:20px;text-align:center;color:var(--tx2)">Nessun obiettivo</div>':
      goals.map((g,i)=>{
        const pct=Math.min(100,Math.round((g.saved||0)/g.target*100));
        return `
        <div style="padding:10px;border-bottom:1px solid var(--b1)">
          <div style="display:flex;justify-content:space-between;margin-bottom:6px">
            <strong style="font-size:11px">${g.name}</strong>
            <button class="btn-sm btn-danger" onclick="delGoal(${i})">🗑️</button>
          </div>
          <div style="height:4px;background:var(--s1);border-radius:2px;overflow:hidden;margin-bottom:6px">
            <div style="height:100%;width:${pct}%;background:linear-gradient(90deg,var(--ac),var(--ac2))"></div>
          </div>
          <div style="font-size:9px;color:var(--tx3)">€${(g.saved||0).toFixed(2)}/€${g.target.toFixed(2)} (${pct}%)</div>
        </div>
        `;
      }).join('')}
    </div>
  `;
  document.getElementById('content').innerHTML=html;
}

function renderBills(){
  const html=`
    <button class="btn" onclick="openModal('bill')" style="width:100%;margin-bottom:12px">➕ Nuova Bolletta</button>
    <div class="card">
      <div class="card-title">📄 Bollette</div>
      ${bills.length===0?'<div style="padding:20px;text-align:center;color:var(--tx2)">Nessuna bolletta</div>':
      bills.map((b,i)=>`
        <div class="ir" style="background:${b.paid?'rgba(0,229,160,.08)':'rgba(255,79,109,.08)'};padding:10px;border-radius:8px;margin-bottom:6px">
          <div class="ir-ico">${b.paid?'✅':'📄'}</div>
          <div class="ir-info" style="flex:1">
            <div class="ir-name">${b.name}</div>
            <div class="ir-cat">Scade: ${b.due}</div>
          </div>
          <div class="ir-amt" style="color:${b.paid?'var(--gr)':'var(--re)'}">€${b.amount.toFixed(2)}</div>
          ${!b.paid?`<button class="btn-sm" onclick="markBillPaid(${i})" style="background:rgba(0,229,160,.1);color:var(--gr);border:1px solid rgba(0,229,160,.2)">Pagata</button>`:''}
          <button class="btn-sm btn-danger" onclick="delBill(${i})">🗑️</button>
        </div>
      `).join('')}
    </div>
  `;
  document.getElementById('content').innerHTML=html;
}

// ===== CRUD =====
function saveTx(){
  const desc=document.getElementById('tx-desc').value.trim();
  const amt=parseFloat(document.getElementById('tx-amt').value);
  const type=document.getElementById('tx-type').value;
  const cat=document.getElementById('tx-cat').value;
  
  if(!desc||!amt||amt<=0){notify('❌ Compila campi');return}
  
  tx.push({id:Date.now(),desc,amount:amt,type,cat,date:new Date().toISOString().split('T')[0]});
  saveData();
  closeModal('tx');
  document.getElementById('tx-desc').value='';
  document.getElementById('tx-amt').value='';
  notify('✅ Transazione aggiunta');
  autoSync();
  renderDash();
}

function delTx(i){
  tx.splice(i,1);
  saveData();
  autoSync();
  notify('🗑️ Eliminata');
  renderTx();
}

function saveGoal(){
  const name=document.getElementById('goal-name').value.trim();
  const target=parseFloat(document.getElementById('goal-target').value);
  const monthly=parseFloat(document.getElementById('goal-monthly').value);
  
  if(!name||!target||!monthly){notify('❌ Compila campi');return}
  
  goals.push({id:Date.now(),name,target,monthly,saved:0});
  saveData();
  closeModal('goal');
  notify('✅ Obiettivo creato');
  autoSync();
  renderGoals();
}

function delGoal(i){
  goals.splice(i,1);
  saveData();
  autoSync();
  notify('🗑️ Eliminato');
  renderGoals();
}

function saveBill(){
  const name=document.getElementById('bill-name').value.trim();
  const amt=parseFloat(document.getElementById('bill-amt').value);
  const due=document.getElementById('bill-due').value;
  const paid=document.getElementById('bill-paid').checked;
  
  if(!name||!amt||!due){notify('❌ Compila campi');return}
  
  bills.push({id:Date.now(),name,amount:amt,due,paid:paid||false});
  saveData();
  closeModal('bill');
  notify('✅ Bolletta aggiunta');
  autoSync();
  renderBills();
}

function delBill(i){
  bills.splice(i,1);
  saveData();
  autoSync();
  notify('🗑️ Eliminata');
  renderBills();
}

function markBillPaid(i){
  bills[i].paid=true;
  saveData();
  autoSync();
  notify('✅ Pagata!');
  renderBills();
  renderDash();
}

// ===== HELPERS =====
function openModal(m){
  document.getElementById('modal-'+m).classList.add('active');
}

function closeModal(m){
  document.getElementById('modal-'+m).classList.remove('active');
}

function notify(msg){
  const n=document.getElementById('notif');
  n.textContent=msg;
  n.style.display='block';
  setTimeout(()=>n.style.display='none',2500);
}
</script>
