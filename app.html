<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <meta name="theme-color" content="#0a0f1a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Kazka">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title>Kazka · Finanza intelligente</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* ===== RESET & VARIABILI ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    :root {
      --bg: #0a0f1a;
      --bg-surface: #141b2b;
      --bg-surface-hover: #1e273a;
      --border: #2a344a;
      --border-strong: #3e4a66;
      --text-primary: #ffffff;
      --text-secondary: #cbd5e1;
      --text-tertiary: #94a3b8;
      --text-muted: #64748b;
      --accent: #7c6fff;
      --accent-light: #9a8fff;
      --accent-glow: rgba(124, 111, 255, 0.35);
      --success: #00e5a0;
      --success-bg: rgba(0, 229, 160, 0.15);
      --warning: #fbbf24;
      --warning-bg: rgba(251, 191, 36, 0.15);
      --danger: #ff6b6b;
      --danger-bg: rgba(255, 107, 107, 0.15);
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-xl: 24px;
      --space-xs: 4px;
      --space-sm: 8px;
      --space-md: 12px;
      --space-lg: 16px;
      --space-xl: 20px;
      --space-2xl: 24px;
      --space-3xl: 32px;
      --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
      --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.4);
      --shadow-lg: 0 8px 24px rgba(0, 0, 0, 0.5);
      --shadow-glow: 0 4px 24px var(--accent-glow);
      --header-height: 64px;
      --sidebar-width: 260px;
    }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      font-size: 14px;
      -webkit-font-smoothing: antialiased;
    }
    /* ===== BOTTONI ===== */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 16px;
      border: none;
      border-radius: var(--radius-md);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      text-decoration: none;
      line-height: 1;
      white-space: nowrap;
      background: transparent;
      color: inherit;
    }
    .btn-primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-light));
      color: white;
      box-shadow: var(--shadow-glow);
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 28px var(--accent-glow); }
    .btn-secondary {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      color: var(--text-secondary);
    }
    .btn-secondary:hover {
      background: var(--bg-surface-hover);
      border-color: var(--border-strong);
      color: var(--text-primary);
    }
    .btn-outline {
      border: 1px solid var(--border);
      color: var(--text-secondary);
    }
    .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
    .btn-success {
      background: var(--success-bg);
      color: var(--success);
      border: 1px solid rgba(0, 229, 160, 0.2);
    }
    .btn-danger {
      background: var(--danger-bg);
      color: var(--danger);
      border: 1px solid rgba(255, 107, 107, 0.2);
    }
    .btn-sm { padding: 6px 12px; font-size: 12px; border-radius: var(--radius-sm); }
    .btn-block { width: 100%; }
    /* ===== LAYOUT ===== */
    #app {
      display: flex;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      position: relative;
    }
    /* SIDEBAR DESKTOP */
    .sidebar {
      width: var(--sidebar-width);
      background: var(--bg-surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      padding: var(--space-xl) 0;
    }
    .sidebar-header {
      padding: 0 var(--space-lg) var(--space-lg);
      border-bottom: 1px solid var(--border);
      margin-bottom: var(--space-lg);
    }
    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 20px;
      font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--accent-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .sidebar-user {
      padding: var(--space-md) var(--space-lg);
      background: var(--bg);
      border-radius: var(--radius-md);
      margin: 0 var(--space-lg) var(--space-lg);
      border: 1px solid var(--border);
    }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px var(--space-lg);
      margin: 2px var(--space-md);
      border-radius: var(--radius-md);
      color: var(--text-secondary);
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }
    .nav-item:hover {
      background: var(--bg-surface-hover);
      color: var(--text-primary);
    }
    .nav-item.active {
      background: linear-gradient(135deg, var(--accent), var(--accent-light));
      color: white;
      box-shadow: var(--shadow-glow);
    }
    .nav-item i { width: 20px; text-align: center; }
    /* MAIN */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .topbar {
      height: var(--header-height);
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border);
      padding: 0 var(--space-xl);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .page-title { font-size: 18px; font-weight: 700; }
    .page-subtitle { font-size: 12px; color: var(--text-tertiary); margin-top: 2px; }
    .topbar-actions { display: flex; align-items: center; gap: var(--space-md); }
    .content {
      flex: 1;
      overflow-y: auto;
      padding: var(--space-xl);
    }
    /* ===== DRAWER MOBILE ===== */
    .drawer-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(4px);
      z-index: 900;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    .drawer-overlay.open {
      opacity: 1;
      pointer-events: all;
    }
    .drawer {
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      width: 280px;
      background: var(--bg-surface);
      border-right: 1px solid var(--border);
      transform: translateX(-100%);
      transition: transform 0.3s ease;
      z-index: 1000;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      padding: var(--space-xl) 0;
    }
    .drawer.open {
      transform: translateX(0);
    }
    .drawer-header {
      padding: 0 var(--space-lg) var(--space-lg);
      border-bottom: 1px solid var(--border);
      margin-bottom: var(--space-lg);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .drawer-close {
      background: none;
      border: none;
      color: var(--text-tertiary);
      font-size: 20px;
      cursor: pointer;
    }
    .drawer-user {
      padding: var(--space-md) var(--space-lg);
      background: var(--bg);
      border-radius: var(--radius-md);
      margin: 0 var(--space-lg) var(--space-lg);
      border: 1px solid var(--border);
    }
    /* ===== CARD ===== */
    .card {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: var(--space-xl);
      margin-bottom: var(--space-xl);
    }
    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--space-lg);
    }
    .card-title {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 600;
      font-size: 15px;
    }
    .card-title i { color: var(--accent); }
    /* ===== GRIGLIE ===== */
    .grid-2, .grid-3, .grid-4 {
      display: grid;
      gap: var(--space-lg);
      margin-bottom: var(--space-xl);
    }
    .grid-2 { grid-template-columns: repeat(2, 1fr); }
    .grid-3 { grid-template-columns: repeat(3, 1fr); }
    .grid-4 { grid-template-columns: repeat(4, 1fr); }
    .stat-card {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: var(--space-lg);
    }
    .stat-label {
      font-size: 12px;
      color: var(--text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }
    .stat-value {
      font-size: 26px;
      font-weight: 800;
      line-height: 1.2;
    }
    .stat-value.positive { color: var(--success); }
    .stat-value.negative { color: var(--danger); }
    /* ===== LISTE ===== */
    .item-row {
      display: flex;
      align-items: center;
      padding: var(--space-md) 0;
      border-bottom: 1px solid var(--border);
    }
    .item-row:last-child { border-bottom: none; }
    .item-icon {
      width: 36px;
      height: 36px;
      border-radius: var(--radius-sm);
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: var(--space-md);
      color: var(--text-secondary);
    }
    .item-content { flex: 1; }
    .item-title { font-weight: 600; margin-bottom: 2px; }
    .item-subtitle { font-size: 11px; color: var(--text-tertiary); }
    .item-amount { font-weight: 700; }
    .amount-positive { color: var(--success); }
    .amount-negative { color: var(--danger); }
    /* ===== BADGE ===== */
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 4px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      background: var(--bg);
      color: var(--text-secondary);
      border: 1px solid var(--border);
    }
    .badge-success {
      background: var(--success-bg);
      color: var(--success);
      border-color: rgba(0, 229, 160, 0.2);
    }
    .badge-warning {
      background: var(--warning-bg);
      color: var(--warning);
      border-color: rgba(251, 191, 36, 0.2);
    }
    .badge-danger {
      background: var(--danger-bg);
      color: var(--danger);
      border-color: rgba(255, 107, 107, 0.2);
    }
    /* ===== FORM ===== */
    .input-group { margin-bottom: var(--space-lg); }
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--text-secondary);
    }
    input, select, textarea {
      width: 100%;
      padding: 10px 12px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      color: var(--text-primary);
      font-size: 14px;
      font-family: inherit;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }
    /* ===== MODAL ===== */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    .modal-overlay.active {
      opacity: 1;
      pointer-events: all;
    }
    .modal {
      background: var(--bg-surface);
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-xl);
      width: 90%;
      max-width: 500px;
      max-height: 85vh;
      overflow-y: auto;
      padding: var(--space-2xl);
      transform: translateY(20px);
      transition: transform 0.3s;
    }
    .modal-overlay.active .modal { transform: translateY(0); }
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--space-xl);
    }
    .modal-close {
      background: none;
      border: none;
      font-size: 20px;
      cursor: pointer;
      color: var(--text-tertiary);
    }
    /* ===== TOAST ===== */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--bg-surface);
      border: 1px solid var(--border-strong);
      border-radius: var(--radius-md);
      padding: 12px 20px;
      color: var(--text-primary);
      font-weight: 500;
      box-shadow: var(--shadow-lg);
      z-index: 2000;
      display: none;
    }
    /* ===== RESPONSIVE ===== */
    @media (max-width: 768px) {
      .sidebar { display: none; }
      .topbar { padding: 0 var(--space-lg); }
      .content { padding: var(--space-lg); }
      .grid-4, .grid-3 { grid-template-columns: repeat(2, 1fr); }
      .hamburger {
        display: block !important;
        background: none;
        border: none;
        color: var(--text-primary);
        font-size: 20px;
        cursor: pointer;
        margin-right: var(--space-md);
      }
    }
    @media (max-width: 480px) {
      .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
      .topbar-actions .btn span { display: none; }
      .topbar-actions .btn i { margin: 0; }
      .hamburger { font-size: 18px; }
    }
    .hamburger { display: none; }
    .hidden { display: none !important; }
    .flex { display: flex; }
    .items-center { align-items: center; }
    .justify-between { justify-content: space-between; }
    .gap-2 { gap: 8px; }
    .w-full { width: 100%; }
    .text-center { text-align: center; }
    .mt-4 { margin-top: 16px; }
    .mb-4 { margin-bottom: 16px; }
  </style>
</head>
<body>

<!-- SPLASH SCREEN (opzionale) -->
<div id="splash" class="hidden">Caricamento...</div>

<!-- LOGIN SCREEN -->
<div id="loginScreen" class="hidden">
  <div style="max-width: 400px; margin: 50px auto; padding: var(--space-2xl); background: var(--bg-surface); border-radius: var(--radius-xl); border: 1px solid var(--border);">
    <h2 class="text-center" style="margin-bottom: 24px;">Accedi a Kazka</h2>
    <div class="input-group">
      <label>Email</label>
      <input type="email" id="loginEmail" placeholder="tu@email.it">
    </div>
    <div class="input-group">
      <label>Password</label>
      <input type="password" id="loginPassword" placeholder="••••••••">
    </div>
    <button class="btn btn-primary btn-block" onclick="handleLogin()">Accedi</button>
    <p class="text-center" style="margin-top: 16px; color: var(--text-tertiary);">
      Demo: usa qualsiasi email (min 6 caratteri)
    </p>
  </div>
</div>

<!-- APP PRINCIPALE -->
<div id="app" class="hidden">
  <!-- SIDEBAR DESKTOP -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <i class="fas fa-chart-pie"></i> KAZKA
      </div>
    </div>
    <div class="sidebar-user" id="sidebarUser">
      <div class="text-sm font-medium" id="sidebarName">Caricamento...</div>
      <div class="text-xs text-muted" id="sidebarPlan">Free</div>
    </div>
    <nav id="sidebarNav">
      <!-- Verrà popolato via JS -->
    </nav>
    <div style="margin-top: auto; padding: var(--space-lg);">
      <button class="btn btn-outline w-full" onclick="handleLogout()">
        <i class="fas fa-sign-out-alt"></i> Esci
      </button>
    </div>
  </aside>

  <!-- DRAWER MOBILE (overlay + pannello) -->
  <div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
  <div class="drawer" id="drawer">
    <div class="drawer-header">
      <div class="sidebar-logo">
        <i class="fas fa-chart-pie"></i> KAZKA
      </div>
      <button class="drawer-close" onclick="closeDrawer()"><i class="fas fa-times"></i></button>
    </div>
    <div class="drawer-user" id="drawerUser">
      <div class="text-sm font-medium" id="drawerName">Caricamento...</div>
      <div class="text-xs text-muted" id="drawerPlan">Free</div>
    </div>
    <nav id="drawerNav">
      <!-- Verrà popolato via JS -->
    </nav>
    <div style="margin-top: auto; padding: var(--space-lg);">
      <button class="btn btn-outline w-full" onclick="handleLogout(); closeDrawer();">
        <i class="fas fa-sign-out-alt"></i> Esci
      </button>
    </div>
  </div>

  <!-- MAIN -->
  <main class="main">
    <header class="topbar">
      <div style="display: flex; align-items: center;">
        <button class="hamburger" id="hamburgerBtn" onclick="toggleDrawer()">
          <i class="fas fa-bars"></i>
        </button>
        <div>
          <h1 class="page-title" id="pageTitle">Dashboard</h1>
          <div class="page-subtitle" id="pageSubtitle">Panoramica</div>
        </div>
      </div>
      <div class="topbar-actions" id="topbarActions">
        <button class="btn btn-secondary btn-sm" id="themeToggle" onclick="toggleTheme()">
          <i class="fas fa-moon"></i>
        </button>
        <button class="btn btn-secondary btn-sm" id="notifBell" onclick="goToPage('notifiche')">
          <i class="fas fa-bell"></i>
          <span class="badge badge-danger hidden" id="notifBadge">0</span>
        </button>
        <button class="btn btn-primary btn-sm" onclick="openAddModal()">
          <i class="fas fa-plus"></i> <span>Nuovo</span>
        </button>
      </div>
    </header>

    <div class="content" id="content"></div>
  </main>
</div>

<!-- MODALE GENERICO -->
<div class="modal-overlay" id="genericModal">
  <div class="modal" id="modalContent"></div>
</div>

<!-- TOAST NOTIFICHE -->
<div class="toast" id="toast"></div>

<!-- FIREBASE SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
  // ==================== CONFIGURAZIONE FIREBASE ====================
  const firebaseConfig = {
    apiKey: "AIzaSyCMPawrAL5tT_bH6YEcNe_UEEyIwLIgHIQ",
    authDomain: "financeapp-556ae.firebaseapp.com",
    databaseURL: "https://financeapp-556ae-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "financeapp-556ae",
    storageBucket: "financeapp-556ae.appspot.com",
    appId: "1:181987533980:web:41c5032990ccede17eb959"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  // ==================== STATO GLOBALE ====================
  let currentUser = null;
  let allUsers = [];
  let transactions = [];
  let recurring = [];
  let bills = [];
  let utilities = [];
  let trips = [];
  let groups = [];
  let notifs = [];
  let goals = [];
  let budgets = {};
  // Business
  let bizTx = [];
  let clients = [];
  let quotes = [];
  let projects = [];
  let expenseNotes = [];
  let appMode = 'personal'; // 'personal' o 'business'

  // ==================== UTILS ====================
  function notify(msg, type = 'info') {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.style.display = 'block';
    toast.style.background = type === 'error' ? 'var(--danger-bg)' : 'var(--bg-surface)';
    toast.style.color = type === 'error' ? 'var(--danger)' : 'var(--text-primary)';
    setTimeout(() => { toast.style.display = 'none'; }, 3000);
  }

  function formatEuro(amount) {
    return '€' + Number(amount || 0).toFixed(2);
  }

  function formatDate(iso) {
    if (!iso) return '';
    return new Date(iso).toLocaleDateString('it-IT');
  }

  // ==================== GESTIONE LOGIN ====================
  async function handleLogin() {
    const email = document.getElementById('loginEmail').value.trim();
    const pass = document.getElementById('loginPassword').value;
    
    if (!email || pass.length < 6) {
      notify('Inserisci email e password (min 6 caratteri)', 'error');
      return;
    }

    try {
      const snapshot = await db.ref('users').once('value');
      const users = snapshot.val() || {};
      let found = null;
      
      for (let id in users) {
        if (users[id].email === email) {
          found = { id, ...users[id] };
          break;
        }
      }

      if (!found) {
        const newId = 'u_' + email.replace(/[^a-z0-9]/gi, '_').toLowerCase();
        const newUser = {
          email,
          name: email.split('@')[0],
          plan: 'free',
          role: 'user',
          createdAt: new Date().toISOString()
        };
        await db.ref('users/' + newId).set(newUser);
        found = { id: newId, ...newUser };
        notify('Account creato! Benvenuto in Kazka', 'success');
      }

      currentUser = found;
      localStorage.setItem('kazka_user', JSON.stringify({ id: found.id, name: found.name, plan: found.plan }));
      
      document.getElementById('loginScreen').classList.add('hidden');
      document.getElementById('app').classList.remove('hidden');
      document.getElementById('sidebarName').textContent = found.name;
      document.getElementById('drawerName').textContent = found.name;
      
      await loadUserData(found.id);
      buildNav();
      renderPage('dashboard');
      
    } catch (error) {
      notify('Errore di connessione: ' + error.message, 'error');
    }
  }

  function handleLogout() {
    if (confirm('Uscire dall\'account?')) {
      localStorage.removeItem('kazka_user');
      currentUser = null;
      document.getElementById('app').classList.add('hidden');
      document.getElementById('loginScreen').classList.remove('hidden');
      document.getElementById('loginEmail').value = '';
      document.getElementById('loginPassword').value = '';
    }
  }

  // ==================== CARICAMENTO DATI DA FIREBASE ====================
  async function loadUserData(uid) {
    try {
      const snap = await db.ref('users/' + uid).once('value');
      const data = snap.val() || {};

      transactions = Object.entries(data.transactions || {}).map(([id, d]) => ({ id, ...d }));
      recurring = Object.entries(data.recurring || {}).map(([id, d]) => ({ id, ...d }));
      bills = Object.entries(data.bills || {}).map(([id, d]) => ({ id, ...d }));
      utilities = Object.entries(data.utilities || {}).map(([id, d]) => ({ id, ...d }));
      trips = Object.entries(data.trips || {}).map(([id, d]) => ({ id, ...d }));
      goals = Object.entries(data.goals || {}).map(([id, d]) => ({ id, ...d }));
      budgets = data.budgets || {};
      
      bizTx = Object.entries(data.biz?.transactions || {}).map(([id, d]) => ({ id, ...d }));
      clients = Object.entries(data.biz?.clients || {}).map(([id, d]) => ({ id, ...d }));
      quotes = Object.entries(data.biz?.quotes || {}).map(([id, d]) => ({ id, ...d }));
      projects = Object.entries(data.biz?.projects || {}).map(([id, d]) => ({ id, ...d }));
      expenseNotes = Object.entries(data.biz?.expenseNotes || {}).map(([id, d]) => ({ id, ...d }));

      const groupsSnap = await db.ref('groups').once('value');
      const allGroups = Object.entries(groupsSnap.val() || {}).map(([id, d]) => ({ id, ...d }));
      groups = allGroups.filter(g => g.creatorId === uid || (g.members && g.members[uid]));

      notify('Dati caricati da Firebase');
    } catch (e) {
      notify('Errore caricamento dati', 'error');
    }
  }

  function buildNav() {
    const items = appMode === 'business' ? navItems.business : navItems.personal;
    const sidebarNav = document.getElementById('sidebarNav');
    const drawerNav = document.getElementById('drawerNav');
    
    sidebarNav.innerHTML = '';
    drawerNav.innerHTML = '';
    
    items.forEach(item => {
      sidebarNav.innerHTML += `
        <div class="nav-item" onclick="goToPage('${item.id}')">
          <i class="fas ${item.icon}"></i> ${item.label}
        </div>
      `;
      drawerNav.innerHTML += `
        <div class="nav-item" onclick="goToPage('${item.id}'); closeDrawer();">
          <i class="fas ${item.icon}"></i> ${item.label}
        </div>
      `;
    });
  }

  function setMode(mode) {
    appMode = mode;
    buildNav();
    goToPage(mode === 'business' ? 'biz_dashboard' : 'dashboard');
  }

  // ==================== ROUTER ====================
  function goToPage(page) {
    document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
    const activeEls = Array.from(document.querySelectorAll('.nav-item')).filter(el => 
      el.textContent.includes(page === 'dashboard' ? 'Dashboard' : 
                             page === 'transazioni' ? 'Movimenti' : 
                             page === 'biz_dashboard' ? 'Dashboard' : page)
    );
    activeEls.forEach(el => el.classList.add('active'));

    document.getElementById('pageTitle').textContent = 
      page === 'dashboard' ? 'Dashboard' :
      page === 'transazioni' ? 'Movimenti' :
      page === 'ricorrenti' ? 'Ricorrenti' :
      page === 'bollette' ? 'Bollette' :
      page === 'viaggi' ? 'Viaggi' :
      page === 'obiettivi' ? 'Obiettivi' :
      page === 'gruppi' ? 'Gruppi' :
      page === 'report' ? 'Report' :
      page === 'notifiche' ? 'Notifiche' :
      page === 'profilo' ? 'Profilo' :
      page === 'biz_dashboard' ? 'Dashboard Aziendale' :
      page === 'biz_primanota' ? 'Prima Nota' :
      page === 'biz_clienti' ? 'Clienti' :
      page === 'biz_preventivi' ? 'Preventivi' :
      page === 'biz_progetti' ? 'Progetti' :
      page === 'biz_spese' ? 'Note Spese' :
      page === 'biz_scadenzario' ? 'Scadenziario' :
      page === 'biz_iva' ? 'IVA Tracker' : page;

    renderPage(page);
  }

  // ==================== RENDERING PAGINE ====================
  function renderPage(page) {
    const container = document.getElementById('content');
    
    if (page === 'dashboard') renderDashboard(container);
    else if (page === 'transazioni') renderTransactions(container);
    else if (page === 'ricorrenti') renderRecurring(container);
    else if (page === 'bollette') renderBills(container);
    else if (page === 'viaggi') renderTrips(container);
    else if (page === 'obiettivi') renderGoals(container);
    else if (page === 'gruppi') renderGroups(container);
    else if (page === 'report') renderReport(container);
    else if (page === 'notifiche') renderNotifiche(container);
    else if (page === 'profilo') renderProfile(container);
    else if (page === 'biz_dashboard') renderBizDashboard(container);
    else if (page === 'biz_primanota') renderBizPrimanota(container);
    else if (page === 'biz_clienti') renderBizClienti(container);

    else if (page === 'biz_progetti') renderBizProgetti(container);
    else if (page === 'biz_spese') renderBizSpese(container);
    else if (page === 'biz_scadenzario') renderBizScadenzario(container);
    else if (page === 'biz_iva') renderBizIva(container);
    else container.innerHTML = '<div class="card">Pagina in costruzione</div>';

  // ==================== MODAL (placeholder) ====================
  function openAddModal() {
    notify('Funzionalità in arrivo!', 'info');
  }
  function openTransactionModal() { notify('Aggiungi transazione (presto disponibile)'); }
  function openRecurringModal() { notify('Aggiungi ricorrente (presto)'); }
  function openBillModal() { notify('Aggiungi bolletta (presto)'); }
  function openTripModal() { notify('Aggiungi viaggio (presto)'); }
  function openGoalModal() { notify('Aggiungi obiettivo (presto)'); }
  function openGroupModal() { notify('Crea gruppo (presto)'); }
  function openBizTxModal() { notify('Nuovo movimento aziendale (presto)'); }
  function openClientModal() { notify('Nuovo cliente (presto)'); }
  function openQuoteModal() { notify('Nuovo preventivo (presto)'); }
  function openProjectModal() { notify('Nuovo progetto (presto)'); }
  function openExpenseNoteModal() { notify('Nuova nota spese (presto)'); }
  function editTransaction(id) { notify('Modifica transazione ' + id); }
  function toggleRecurring(id) { notify('Toggle ricorrente ' + id); }
  function markBillPaid(id) { notify('Bolletta pagata ' + id); }
  function addToGoal(id) { notify('Aggiungi a obiettivo ' + id); }
  function editGoal(id) { notify('Modifica obiettivo ' + id); }
  function goToGroup(id) { notify('Vai al gruppo ' + id); }
  function clearAllNotifs() { notify('Notifiche cancellate'); }

  function toggleMode() {
    appMode = appMode === 'personal' ? 'business' : 'personal';
    buildNav();
    goToPage(appMode === 'business' ? 'biz_dashboard' : 'dashboard');
  }

  function toggleTheme() {
    document.body.classList.toggle('light');
    const icon = document.querySelector('#themeToggle i');
    if (icon) icon.className = document.body.classList.contains('light') ? 'fas fa-sun' : 'fas fa-moon';
  }

  // ==================== DRAWER FUNCTIONS ====================
  function toggleDrawer() {
    const drawer = document.getElementById('drawer');
    const overlay = document.getElementById('drawerOverlay');
    drawer.classList.toggle('open');
    overlay.classList.toggle('open');
  }

  function closeDrawer() {
    document.getElementById('drawer').classList.remove('open');
    document.getElementById('drawerOverlay').classList.remove('open');
  }

  // ==================== AVVIO ====================
  window.addEventListener('load', async () => {
    const saved = localStorage.getItem('kazka_user');
    if (saved) {
      try {
        currentUser = JSON.parse(saved);
        document.getElementById('loginScreen').classList.add('hidden');
        document.getElementById('app').classList.remove('hidden');
        document.getElementById('sidebarName').textContent = currentUser.name;
        document.getElementById('drawerName').textContent = currentUser.name;
        await loadUserData(currentUser.id);
        buildNav();
        renderPage('dashboard');
      } catch (e) {
        localStorage.removeItem('kazka_user');
        document.getElementById('loginScreen').classList.remove('hidden');
      }
    } else {
      document.getElementById('loginScreen').classList.remove('hidden');
    }
  });

  // Esponi funzioni globali
  window.goToPage = goToPage;
  window.handleLogin = handleLogin;
  window.handleLogout = handleLogout;
  window.toggleTheme = toggleTheme;
  window.toggleMode = toggleMode;
  window.openAddModal = openAddModal;
  window.openTransactionModal = openTransactionModal;
  window.openRecurringModal = openRecurringModal;
  window.openBillModal = openBillModal;
  window.openTripModal = openTripModal;
  window.openGoalModal = openGoalModal;
  window.openGroupModal = openGroupModal;
  window.openBizTxModal = openBizTxModal;
  window.openClientModal = openClientModal;
  window.openQuoteModal = openQuoteModal;
  window.openProjectModal = openProjectModal;
  window.openExpenseNoteModal = openExpenseNoteModal;
  window.editTransaction = editTransaction;
  window.toggleRecurring = toggleRecurring;
  window.markBillPaid = markBillPaid;
  window.addToGoal = addToGoal;
  window.editGoal = editGoal;
  window.goToGroup = goToGroup;
  window.clearAllNotifs = clearAllNotifs;
  window.toggleDrawer = toggleDrawer;
  window.closeDrawer = closeDrawer;

  // ==================== PWA INSTALL ====================
  let deferredPrompt;
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    // Mostra un piccolo avviso che l'app è installabile (opzionale)
    setTimeout(() => {
      if (confirm('Installa Kazka sul tuo dispositivo per un accesso più rapido!')) {
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(() => { deferredPrompt = null; });
      }
    }, 2000);
  });

  // Service Worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js').then(reg => {
      console.log('Service Worker registrato', reg);
    }).catch(err => {
      console.log('Service Worker errore', err);
    });
  }
</script>
