      <stop offset="0%" style="stop-color:#7c6fff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00e5ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Vertical stem -->
  <rect x="45" y="25" width="8" height="70" rx="4" fill="url(#grad1)"/>
