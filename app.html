<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Kazka - Smart Finance Assistant</title>

  <!-- FONTS -->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#6c63ff">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="icon" href="icon-192.png">

  <!-- STYLES -->
  <link rel="stylesheet" href="modules/02-styles.css">
  <link rel="stylesheet" href="modules/16-login-styles.css">
</head>
<body>
  <!-- SPLASH SCREEN -->
  <div id="splash">
    <div class="splash-logo" id="splashLogo"></div>
    <div class="splash-text">Kazka</div>
    <div class="splash-text" style="font-size: 14px; color: #8892b0; font-family: 'Outfit', sans-serif; font-weight: 400;">Smart Finance Assistant</div>
  </div>

  <!-- LOGIN SCREEN -->
  <div id="loginScreen">
    <div class="login-container">
      <div class="login-header">
        <span class="login-logo">💰</span>
        <div class="login-title">Kazka</div>
        <div class="login-subtitle">Smart Finance Assistant</div>
      </div>

      <!-- LOGIN FORM -->
      <div id="loginForm">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="loginEmail" placeholder="tuo@email.com" autocomplete="email">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="loginPassword" placeholder="••••••" autocomplete="current-password">
        </div>
        <button type="button" id="loginBtn" class="login-btn">Accedi</button>
      </div>

      <!-- REGISTER FORM -->
      <div id="registerForm">
        <div class="form-group">
          <label>Nome</label>
          <input type="text" id="registerName" placeholder="Il tuo nome" autocomplete="name">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="registerEmail" placeholder="tuo@email.com" autocomplete="email">
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="registerPassword" placeholder="Min 6 caratteri" autocomplete="new-password">
        </div>
        <button type="button" id="registerBtn" class="login-btn">Registrati</button>
      </div>

      <div class="form-toggle">
        Non hai un account? <button type="button" id="toggleForm">Registrati</button>
      </div>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="app">
    <div class="topbar" id="topbarEl"></div>
    <div id="modeSwitcherContainer"></div>
    <div id="content"></div>
  </div>

  <!-- ============================================ -->
  <!-- FIREBASE SDK — DEVE ESSERE PRIMO DI TUTTO   -->
  <!-- ============================================ -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

  <!-- FIREBASE INIT (var db = globale, visibile da tutti i moduli) -->
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCMPawrAL5tT_bH6YEcNe_UEEyIwLIgHIQ",
      authDomain: "financeapp-556ae.firebaseapp.com",
      databaseURL: "https://financeapp-556ae-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "financeapp-556ae",
      storageBucket: "financeapp-556ae.appspot.com",
      appId: "1:181987533980:web:41c5032990ccede17eb959"
    };
    try {
      const _app = firebase.initializeApp(firebaseConfig);
      var db = firebase.database();
      console.log('✅ Firebase SDK + db inizializzati');
    } catch(e) {
      console.error('❌ Firebase init error:', e);
      var db = null;
    }
  </script>

  <!-- ============================================ -->
  <!-- MODULI JAVASCRIPT (ordine importante!)       -->
  <!-- ============================================ -->

  <!-- 1. CONFIGURATION & GLOBAL STATE -->
  <script src="modules/01-config.js"></script>

  <!-- 2. UTILITIES -->
  <script src="modules/05-utils.js"></script>

  <!-- 3. DATA MANAGEMENT -->
  <script src="modules/06-goals.js"></script>
  <script src="modules/08-transactions.js"></script>
  <script src="modules/09-recurring.js"></script>
  <script src="modules/10-profile.js"></script>
  <script src="modules/11-groups.js"></script>
  <script src="modules/12-budget.js"></script>
  <script src="modules/13-reports.js"></script>

  <!-- 4. FIREBASE & SYNC & AUTH -->
  <script src="modules/04-firebase.js"></script>
  <script src="modules/07-sync.js"></script>
  <script src="modules/14-auth.js"></script>
  <script src="modules/17-admin.js"></script>

  <!-- 5. UI & LOGIN -->
  <script src="modules/03-ui.js"></script>
  <script src="modules/15-login-ui.js"></script>

  <!-- 6. INITIALIZATION (ultimo — usa tutte le funzioni precedenti) -->
  <script src="modules/99-init.js"></script>

  <!-- SERVICE WORKER -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/appfinance/sw.js')
          .then(reg => console.log('✅ SW registered'))
          .catch(err => console.log('SW registration failed:', err));
      });
    }
  </script>

  <!-- SUPPRESS CHROME EXTENSION ERRORS -->
  <script>
    window.addEventListener('error', (e) => {
      if (e.message && (
        e.message.includes('Could not establish connection') ||
        e.message.includes('chrome-extension')
      )) {
        return true; // suppress
      }
    });
    console.log('✅ Kazka app ready');
  </script>
</body>
</html>
