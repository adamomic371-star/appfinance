<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Kazka — Migrazione Dati</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Segoe UI',sans-serif;background:#070b18;color:#f0f4ff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .card{background:#0d1225;border:1px solid rgba(108,99,255,.3);border-radius:20px;padding:32px;max-width:640px;width:100%}
  h1{font-size:22px;font-weight:800;margin-bottom:6px;background:linear-gradient(135deg,#6c63ff,#00d4ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  .sub{color:#8892b0;font-size:14px;margin-bottom:28px}
  .step{background:#131929;border-radius:12px;padding:16px 20px;margin-bottom:12px;border:1px solid rgba(255,255,255,.06)}
  .step-title{font-size:13px;font-weight:700;color:#8892b0;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
  .log{background:#070b18;border-radius:10px;padding:16px;font-family:monospace;font-size:13px;max-height:280px;overflow-y:auto;line-height:1.8;margin-top:16px;border:1px solid rgba(255,255,255,.05)}
  .log-line{display:flex;gap:8px;align-items:flex-start}
  .log-line.ok .icon{color:#00e5a0}
  .log-line.warn .icon{color:#ffd166}
  .log-line.err .icon{color:#ff4f6d}
  .log-line.info .icon{color:#6c63ff}
  .btn{display:inline-flex;align-items:center;gap:8px;padding:13px 28px;background:linear-gradient(135deg,#6c63ff,#00d4ff);color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;width:100%;justify-content:center;margin-top:4px;transition:all .2s}
  .btn:hover{opacity:.9;transform:translateY(-1px)}
  .btn:disabled{opacity:.4;cursor:not-allowed;transform:none}
  .btn.danger{background:linear-gradient(135deg,#ff4f6d,#ff9f43)}
  .progress{height:6px;background:#131929;border-radius:10px;overflow:hidden;margin-top:16px}
  .progress-bar{height:100%;background:linear-gradient(90deg,#6c63ff,#00d4ff);border-radius:10px;transition:width .4s;width:0%}
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:16px}
  .stat{background:#070b18;border-radius:10px;padding:12px;text-align:center;border:1px solid rgba(255,255,255,.05)}
  .stat-val{font-size:24px;font-weight:800;color:#6c63ff}
  .stat-lbl{font-size:11px;color:#8892b0;margin-top:4px}
  .badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
  .badge.green{background:rgba(0,229,160,.15);color:#00e5a0}
  .badge.red{background:rgba(255,79,109,.15);color:#ff4f6d}
  .badge.yellow{background:rgba(255,209,102,.15);color:#ffd166}
  .divider{border:none;border-top:1px solid rgba(255,255,255,.06);margin:20px 0}
</style>
</head>
<body>
<div class="card">
  <h1>💾 Kazka — Migrazione Dati</h1>
  <p class="sub">Sposta i tuoi dati dalla vecchia struttura piatta alla nuova struttura per-utente</p>

  <div class="step">
    <div class="step-title">📊 Step 1 — Analisi database</div>
    <button class="btn" id="btnAnalyze" onclick="analyze()">🔍 Analizza database</button>
    <div class="stats" id="statsBox" style="display:none">
      <div class="stat"><div class="stat-val" id="statTx">0</div><div class="stat-lbl">Transazioni</div></div>
      <div class="stat"><div class="stat-val" id="statBills">0</div><div class="stat-lbl">Bollette/Utenze</div></div>
      <div class="stat"><div class="stat-val" id="statOther">0</div><div class="stat-lbl">Viaggi/Ricorrenti</div></div>
    </div>
  </div>

  <div class="step">
    <div class="step-title">🚀 Step 2 — Migrazione</div>
    <button class="btn" id="btnMigrate" onclick="migrate()" disabled>▶ Avvia migrazione</button>
    <div class="progress" id="progressBox" style="display:none"><div class="progress-bar" id="progressBar"></div></div>
  </div>

  <div class="step">
    <div class="step-title">🗑️ Step 3 — Pulizia (opzionale)</div>
    <button class="btn danger" id="btnClean" onclick="cleanup()" disabled>🗑️ Elimina vecchi dati (dopo aver verificato)</button>
  </div>

  <hr class="divider">
  <div class="log" id="log"><div class="log-line info"><span class="icon">ℹ</span><span>Pronto. Clicca "Analizza database" per iniziare.</span></div></div>
</div>

<script>
const FB = {
  apiKey: "AIzaSyCMPawrAL5tT_bH6YEcNe_UEEyIwLIgHIQ",
  authDomain: "financeapp-556ae.firebaseapp.com",
  projectId: "financeapp-556ae",
  databaseURL: "https://financeapp-556ae-default-rtdb.europe-west1.firebasedatabase.app",
  storageBucket: "financeapp-556ae.firebasestorage.app",
  messagingSenderId: "181987533980",
  appId: "1:181987533980:web:41c5032990ccede17eb959"
};

firebase.initializeApp(FB);
const db = firebase.database();

let analysisData = {};
let migrationDone = false;

function log(msg, type='info') {
  const icons = {ok:'✅', warn:'⚠️', err:'❌', info:'ℹ️'};
  const div = document.getElementById('log');
  const line = document.createElement('div');
  line.className = 'log-line ' + type;
  line.innerHTML = `<span class="icon">${icons[type]||'•'}</span><span>${msg}</span>`;
  div.appendChild(line);
  div.scrollTop = div.scrollHeight;
}

function setProgress(pct) {
  document.getElementById('progressBar').style.width = pct + '%';
}

async function analyze() {
  document.getElementById('btnAnalyze').disabled = true;
  log('Connessione a Firebase...', 'info');
  
  try {
    // Read old flat structure
    const [txSnap, billsSnap, utilSnap, tripsSnap, recSnap, usersSnap] = await Promise.all([
      db.ref('transactions').once('value'),
      db.ref('bills').once('value'),
      db.ref('utilities').once('value'),
      db.ref('trips').once('value'),
      db.ref('recurring').once('value'),
      db.ref('users').once('value'),
    ]);

    const txData = txSnap.val() || {};
    const billsData = billsSnap.val() || {};
    const utilData = utilSnap.val() || {};
    const tripsData = tripsSnap.val() || {};
    const recData = recSnap.val() || {};
    const usersData = usersSnap.val() || {};

    const txArr = Object.entries(txData).map(([id,d])=>({...d,id}));
    const billsArr = Object.entries(billsData).map(([id,d])=>({...d,id}));
    const utilArr = Object.entries(utilData).map(([id,d])=>({...d,id}));
    const tripsArr = Object.entries(tripsData).map(([id,d])=>({...d,id}));
    const recArr = Object.entries(recData).map(([id,d])=>({...d,id}));
    const usersArr = Object.entries(usersData).map(([id,d])=>({...d,id}));

    analysisData = { txArr, billsArr, utilArr, tripsArr, recArr, usersArr };

    log(`Trovati ${txArr.length} transazioni nella vecchia struttura`, txArr.length > 0 ? 'ok' : 'warn');
    log(`Trovate ${billsArr.length} bollette + ${utilArr.length} utenze`, 'ok');
    log(`Trovati ${tripsArr.length} viaggi, ${recArr.length} ricorrenti`, 'ok');
    log(`Trovati ${usersArr.length} utenti nel database`, 'ok');

    // Show which userId each transaction belongs to
    const userIds = [...new Set(txArr.map(t=>t.userId).filter(Boolean))];
    log(`Transazioni appartengono a ${userIds.length} utente/i: ${userIds.join(', ')}`, 'info');

    // Show stats
    document.getElementById('statTx').textContent = txArr.length;
    document.getElementById('statBills').textContent = billsArr.length + utilArr.length;
    document.getElementById('statOther').textContent = tripsArr.length + recArr.length;
    document.getElementById('statsBox').style.display = 'grid';

    if (txArr.length === 0 && billsArr.length === 0 && tripsArr.length === 0) {
      log('Nessun dato vecchio trovato. La migrazione non è necessaria!', 'warn');
      document.getElementById('btnAnalyze').disabled = false;
    } else {
      log('Analisi completata! Clicca "Avvia migrazione" per procedere.', 'ok');
      document.getElementById('btnMigrate').disabled = false;
    }

  } catch(e) {
    log('Errore connessione: ' + e.message, 'err');
    document.getElementById('btnAnalyze').disabled = false;
  }
}

async function migrate() {
  document.getElementById('btnMigrate').disabled = true;
  document.getElementById('progressBox').style.display = 'block';
  setProgress(0);

  const { txArr, billsArr, utilArr, tripsArr, recArr, usersArr } = analysisData;

  let total = txArr.length + billsArr.length + utilArr.length + tripsArr.length + recArr.length;
  let done = 0;

  function progress() {
    done++;
    setProgress(Math.round((done / total) * 100));
  }

  log('🚀 Avvio migrazione...', 'info');

  // Helper: get uid from userId field (already is the uid)
  function getUid(item) {
    return item.userId || null;
  }

  let ok = 0, skipped = 0, errors = 0;

  // Migrate transactions
  log(`Migro ${txArr.length} transazioni...`, 'info');
  for (const tx of txArr) {
    const uid = getUid(tx);
    if (!uid) { log(`Transazione ${tx.id} senza userId — saltata`, 'warn'); skipped++; progress(); continue; }
    try {
      const { id, userId, ...data } = tx;
      await db.ref(`users/${uid}/transactions/${id}`).set(data);
      ok++;
    } catch(e) { log(`Errore tx ${tx.id}: ${e.message}`, 'err'); errors++; }
    progress();
  }

  // Migrate bills
  log(`Migro ${billsArr.length} bollette...`, 'info');
  for (const bill of billsArr) {
    const uid = getUid(bill);
    if (!uid) { skipped++; progress(); continue; }
    try {
      const { id, userId, ...data } = bill;
      await db.ref(`users/${uid}/bills/${id}`).set(data);
      ok++;
    } catch(e) { errors++; }
    progress();
  }

  // Migrate utilities
  log(`Migro ${utilArr.length} utenze...`, 'info');
  for (const util of utilArr) {
    const uid = getUid(util);
    if (!uid) { skipped++; progress(); continue; }
    try {
      const { id, userId, ...data } = util;
      await db.ref(`users/${uid}/utilities/${id}`).set(data);
      ok++;
    } catch(e) { errors++; }
    progress();
  }

  // Migrate trips
  log(`Migro ${tripsArr.length} viaggi...`, 'info');
  for (const trip of tripsArr) {
    const uid = getUid(trip);
    if (!uid) { skipped++; progress(); continue; }
    try {
      const { id, userId, ...data } = trip;
      await db.ref(`users/${uid}/trips/${id}`).set(data);
      ok++;
    } catch(e) { errors++; }
    progress();
  }

  // Migrate recurring
  log(`Migro ${recArr.length} ricorrenti...`, 'info');
  for (const rec of recArr) {
    const uid = getUid(rec);
    if (!uid) { skipped++; progress(); continue; }
    try {
      const { id, userId, ...data } = rec;
      await db.ref(`users/${uid}/recurring/${id}`).set(data);
      ok++;
    } catch(e) { errors++; }
    progress();
  }

  setProgress(100);
  log(`✅ Migrazione completata: ${ok} record migrati, ${skipped} saltati, ${errors} errori`, ok > 0 ? 'ok' : 'warn');

  if (errors === 0) {
    log('Tutto ok! Puoi ora cliccare "Elimina vecchi dati" per pulire il vecchio database.', 'ok');
    document.getElementById('btnClean').disabled = false;
  } else {
    log('Ci sono stati degli errori. Controlla prima di pulire.', 'warn');
    document.getElementById('btnClean').disabled = false;
  }

  migrationDone = true;
}

async function cleanup() {
  if (!migrationDone) { log('Completa prima la migrazione!', 'warn'); return; }
  if (!confirm('Sei sicuro? Verranno eliminati i dati dalla vecchia struttura piatta.\nI dati sono già stati copiati nella nuova struttura.')) return;

  document.getElementById('btnClean').disabled = true;
  log('🗑️ Pulizia vecchi nodi...', 'info');

  try {
    await Promise.all([
      db.ref('transactions').remove(),
      db.ref('bills').remove(),
      db.ref('utilities').remove(),
      db.ref('trips').remove(),
      db.ref('recurring').remove(),
    ]);
    log('Vecchi nodi eliminati: transactions, bills, utilities, trips, recurring', 'ok');
    log('✅ Database pulito e ottimizzato!', 'ok');
  } catch(e) {
    log('Errore pulizia: ' + e.message, 'err');
    document.getElementById('btnClean').disabled = false;
  }
}
</script>
</body>
</html>
