<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kazka — Auto Cleaner</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:monospace; background:#070b18; color:#e8eeff; min-height:100vh;
  display:flex; flex-direction:column; align-items:center; justify-content:center; padding:24px; }

.card { background:#0d1225; border:1px solid rgba(255,255,255,.08); border-radius:16px;
  padding:32px; width:100%; max-width:520px; }

h1 { font-size:22px; font-weight:900; margin-bottom:4px;
  background:linear-gradient(135deg,#6c63ff,#00d4ff);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
.sub { font-size:11px; color:#7a849e; margin-bottom:28px; }

.info-row { display:flex; justify-content:space-between; font-size:11px; margin-bottom:6px; }
.info-row span:first-child { color:#7a849e; }
.info-row span:last-child { color:#e8eeff; font-weight:700; }

.divider { height:1px; background:rgba(255,255,255,.06); margin:16px 0; }

.btn { width:100%; padding:13px; border-radius:10px; border:none; cursor:pointer;
  font-family:monospace; font-size:13px; font-weight:700; transition:all .2s; margin-top:20px; }
.btn-go { background:linear-gradient(135deg,#ff4f6d,#ff9f43); color:#fff;
  box-shadow:0 4px 20px rgba(255,79,109,.3); }
.btn-go:hover { transform:translateY(-1px); box-shadow:0 6px 28px rgba(255,79,109,.45); }
.btn-go:disabled { opacity:.4; cursor:not-allowed; transform:none; box-shadow:none; }

#log { margin-top:16px; background:#070b18; border:1px solid rgba(255,255,255,.06);
  border-radius:9px; padding:14px; font-size:10px; max-height:240px; overflow-y:auto;
  display:none; line-height:2; }
.ok   { color:#00e5a0; }
.err  { color:#ff4f6d; }
.info { color:#7a849e; }

#summary { margin-top:12px; font-size:12px; color:#7a849e; text-align:center; display:none; }
#summary strong { color:#00e5a0; }

.progress { height:4px; background:rgba(255,255,255,.06); border-radius:20px; margin-top:16px; overflow:hidden; display:none; }
.progress-fill { height:100%; background:linear-gradient(90deg,#ff4f6d,#ff9f43); border-radius:20px; width:0%; transition:width .3s; }
</style>
</head>
<body>
<div class="card">
  <h1>Kazka Cleaner</h1>
  <p class="sub">Elimina automaticamente i file obsoleti dalla repo</p>

  <div class="info-row"><span>Repository</span><span>adamomic371-star/appfinance</span></div>
  <div class="info-row"><span>Branch</span><span>main</span></div>
  <div class="info-row" id="fileCount"><span>File da eliminare</span><span>—</span></div>

  <div class="divider"></div>

  <div class="progress" id="progress"><div class="progress-fill" id="fill"></div></div>
  <button class="btn btn-go" id="btn" onclick="start()">🗑️ Scansiona e pulisci</button>

  <div id="log"></div>
  <div id="summary"></div>
</div>

<script>
const OWNER  = 'adamomic371-star';
const REPO   = 'appfinance';
const BRANCH = 'main';
const TOKEN  = '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';

const JUNK_PATTERNS = [
  p => p === 'modules/app.html',
  p => p === 'firebase-config.js',
  p => p === 'github-cleaner.html',
  p => p === 'kazka-cleaner.html',
  p => /^README.*\.md$/i.test(p.split('/').pop()),
  p => /^SETUP.*\.md$/i.test(p.split('/').pop()),
  p => p.startsWith('modules/modules/'),
  p => /^modules\/\d{2}-/.test(p),
  p => p === 'modules/99-init.js',
  p => p === 'modules/kazka-symbol.svg',
  p => p === 'modules/kazka-text.svg',
];

function isJunk(path) { return JUNK_PATTERNS.some(fn => fn(path)); }

async function gh(endpoint, opts = {}) {
  const r = await fetch('https://api.github.com' + endpoint, {
    headers: { Authorization: 'Bearer ' + TOKEN, Accept: 'application/vnd.github.v3+json', ...opts.headers },
    ...opts
  });
  if (!r.ok) throw new Error(r.status + ' ' + r.statusText);
  return r.json();
}

function log(msg, cls='info') {
  const el = document.getElementById('log');
  el.style.display = 'block';
  el.innerHTML += `<span class="${cls}">${msg}</span>\n`;
  el.scrollTop = el.scrollHeight;
}

function setProgress(done, total) {
  document.getElementById('progress').style.display = 'block';
  document.getElementById('fill').style.width = Math.round(done/total*100) + '%';
}

async function start() {
  const btn = document.getElementById('btn');
  btn.disabled = true;
  btn.textContent = '⏳ Scansione in corso...';

  try {
    log('📡 Connessione a GitHub...');
    const branchData = await gh(`/repos/${OWNER}/${REPO}/branches/${BRANCH}`);
    const tree = await gh(`/repos/${OWNER}/${REPO}/git/trees/${branchData.commit.commit.tree.sha}?recursive=1`);

    const junk = tree.tree.filter(f => f.type === 'blob' && isJunk(f.path));

    document.getElementById('fileCount').querySelector('span:last-child').textContent = junk.length;

    if (junk.length === 0) {
      log('✅ Nessun file obsoleto trovato — repo già pulita!', 'ok');
      btn.textContent = '✅ Già pulita';
      return;
    }

    log(`🔍 Trovati ${junk.length} file da eliminare`);
    btn.textContent = `🗑️ Elimino ${junk.length} file...`;

    let ok = 0, fail = 0;
    for (let i = 0; i < junk.length; i++) {
      const f = junk[i];
      setProgress(i, junk.length);
      try {
        await gh(`/repos/${OWNER}/${REPO}/contents/${f.path}`, {
          method: 'DELETE',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: `chore: remove obsolete file ${f.path}`, sha: f.sha, branch: BRANCH })
        });
        ok++;
        log(`✓ ${f.path}`, 'ok');
      } catch(e) {
        fail++;
        log(`✕ ${f.path} — ${e.message}`, 'err');
      }
      await new Promise(r => setTimeout(r, 350));
    }

    setProgress(junk.length, junk.length);

    const summary = document.getElementById('summary');
    summary.style.display = 'block';
    summary.innerHTML = fail === 0
      ? `<strong>✅ ${ok} file eliminati con successo.</strong> Repo pulita!`
      : `<strong>${ok} eliminati</strong> · <span style="color:#ff4f6d">${fail} errori</span>`;

    btn.textContent = fail === 0 ? '✅ Completato' : `⚠️ ${ok}/${junk.length} eliminati`;

  } catch(e) {
    log(`❌ Errore: ${e.message}`, 'err');
    btn.disabled = false;
    btn.textContent = '🗑️ Riprova';
  }
}
</script>
</body>
</html>
